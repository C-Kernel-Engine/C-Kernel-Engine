><tspan x="80.0" dy="0">surface tokens</tspan></text><text x="80.0" y="696.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">markers</tspan></text></g><g class="artifact-panel"><rect x="893.0" y="574.0" width="811.0" height="196.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="913.0" y="608.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Emission Result</tspan></text><text x="913.0" y="634.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Connect the rule choice to the final</tspan><tspan x="913.0" dy="15.0">emitted pieces or lookup path.</tspan></text><text x="917.0" y="678.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">piece emit</tspan></text><text x="917.0" y="696.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">lookup</tspan></text></g><g class="footer-note"><rect x="56.0" y="974.0" width="1648.0" height="48" rx="16" fill="#f8efe0" fill-opacity="0.94" stroke="#d8c7ad" stroke-width="1"/><text x="76.0" y="1003.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Sentencepiece Space Handling belongs in the broader contract because the model needs dense technical layouts, not only charts and posters.</tspan></text></g></svg>