<svg width="1760" height="820" viewBox="0 0 1760 820" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3ede3"/><stop offset="100%" stop-color="#fbf7f0"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fffaf2"/><stop offset="100%" stop-color="#f8efe0"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(23,33,43,0.14)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter></defs><rect x="0" y="0" width="1760" height="820" fill="url(#bgGrad)"/><rect x="56.0" y="56.0" width="1648.0" height="112" rx="22" fill="#fffaf2" fill-opacity="0.18" stroke="#d8c7ad" stroke-width="1.2"/><rect x="74.0" y="72.0" width="220" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="130.0" fill="#17212b" font-size="30" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">IR Artifact Lineage</tspan></text><text x="80.0" y="160.0" fill="#64748b" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Show how each stage introduces a more executable representation.</tspan></text><g class="flow-node"><rect x="56.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#fffaf2" fill-opacity="0.94" stroke="#ffb400" stroke-width="1.6"/><rect x="74.0" y="402.0" width="96" height="24" rx="12" fill="#ffb400" fill-opacity="0.14" stroke="#ffb400" stroke-width="1"/><text x="122.0" y="418.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="122.0" dy="0">STAGE</tspan></text><text x="74.0" y="444.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">Template</tspan></text><text x="74.0" y="470.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">Begin from a reusable high-level model</tspan><tspan x="74.0" dy="15.0">template.</tspan></text></g><g class="flow-node"><rect x="400.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#fffaf2" fill-opacity="0.94" stroke="#ffb400" stroke-width="1.6"/><rect x="418.0" y="402.0" width="96" height="24" rx="12" fill="#ffb400" fill-opacity="0.14" stroke="#ffb400" stroke-width="1"/><text x="466.0" y="418.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="466.0" dy="0">STAGE</tspan></text><text x="418.0" y="444.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">IR1 Forward</tspan></text><text x="418.0" y="470.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Expand the template into explicit forward</tspan><tspan x="418.0" dy="15.0">operators.</tspan></text></g><g class="flow-node"><rect x="744.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#fffaf2" fill-opacity="0.94" stroke="#ffb400" stroke-width="1.6"/><rect x="762.0" y="402.0" width="96" height="24" rx="12" fill="#ffb400" fill-opacity="0.14" stroke="#ffb400" stroke-width="1"/><text x="810.0" y="418.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="810.0" dy="0">STAGE</tspan></text><text x="762.0" y="444.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">IR2 Backward</tspan></text><text x="762.0" y="470.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Attach gradients, saves, and training-only</tspan><tspan x="762.0" dy="15.0">structure.</tspan></text></g><g class="flow-node"><rect x="1088.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#fffaf2" fill-opacity="0.94" stroke="#ffb400" stroke-width="1.6"/><rect x="1106.0" y="402.0" width="96" height="24" rx="12" fill="#ffb400" fill-opacity="0.14" stroke="#ffb400" stroke-width="1"/><text x="1154.0" y="418.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1154.0" dy="0">STAGE</tspan></text><text x="1106.0" y="444.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Layout + Plan</tspan></text><text x="1106.0" y="470.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Assign buffers, memory layout, and</tspan><tspan x="1106.0" dy="15.0">execution order.</tspan></text></g><g class="flow-node"><rect x="1432.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#fffaf2" fill-opacity="0.94" stroke="#ffd66b" stroke-width="1.6"/><rect x="1450.0" y="402.0" width="96" height="24" rx="12" fill="#ffd66b" fill-opacity="0.14" stroke="#ffd66b" stroke-width="1"/><text x="1498.0" y="418.0" fill="#ffd66b" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1498.0" dy="0">OUTCOME</tspan></text><text x="1450.0" y="444.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">Generated Runtime</tspan></text><text x="1450.0" y="470.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">The final artifact contains compiled</tspan><tspan x="1450.0" dy="15.0">execution logic plus staged metadata.</tspan></text></g><g class="flow-connectors"><path d="M 336.0 454.0 C 368.0 454.0, 368.0 454.0, 392.0 454.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="368.0" y="446.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">expand</tspan></text><path d="M 680.0 454.0 C 712.0 454.0, 712.0 454.0, 736.0 454.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="712.0" y="446.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="712.0" dy="0">differentiate</tspan></text><path d="M 1024.0 454.0 C 1056.0 454.0, 1056.0 454.0, 1080.0 454.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="1056.0" y="446.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1056.0" dy="0">allocate</tspan></text><path d="M 1368.0 454.0 C 1400.0 454.0, 1400.0 454.0, 1424.0 454.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="1400.0" y="446.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1400.0" dy="0">emit</tspan></text></g><rect x="56.0" y="748.0" width="1648.0" height="44" rx="14" fill="#f8efe0" fill-opacity="0.92" stroke="#d8c7ad" stroke-width="1"/><text x="76.0" y="776.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">This is a graph-family replacement for many lineage and lowering diagrams in docs/site/assets.</tspan></text></svg>