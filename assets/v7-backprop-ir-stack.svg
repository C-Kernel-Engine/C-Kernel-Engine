<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061221"/>
      <stop offset="1" stop-color="#081a2b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2940"/>
      <stop offset="1" stop-color="#0b1f33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb400"/>
      <stop offset="1" stop-color="#07adf8"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#001" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#79c8f7"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>
  <rect x="44" y="40" width="1512" height="900" rx="16" fill="#0a1a2a" stroke="#23415e"/>

  <text x="86" y="98" fill="#ffb400" font-size="44" font-family="Segoe UI, Arial" font-weight="700">v7 Backprop IR Pipeline</text>
  <text x="86" y="132" fill="#9fb8cd" font-size="22" font-family="Segoe UI, Arial">init -> template/manifest -> IR1 -> IR2 -> layout -> codegen -> libtrain -> train loop + oracle</text>

  <rect x="82" y="168" width="1436" height="10" rx="5" fill="url(#accent)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="214" width="232" height="170" rx="14" fill="url(#card)" stroke="#2d5d84"/>
    <text x="112" y="252" fill="#ffb400" font-size="28" font-family="Segoe UI, Arial" font-weight="700">1) Init</text>
    <text x="112" y="286" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">xavier or normal init</text>
    <text x="112" y="314" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">dims and heads</text>
    <text x="112" y="342" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">template choice</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="366" y="214" width="258" height="170" rx="14" fill="url(#card)" stroke="#2d5d84"/>
    <text x="388" y="252" fill="#ffb400" font-size="28" font-family="Segoe UI, Arial" font-weight="700">2) Inputs</text>
    <text x="388" y="286" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">weights.bump</text>
    <text x="388" y="314" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">weights_manifest.json</text>
    <text x="388" y="342" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">template (built-in or custom)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="668" y="214" width="268" height="170" rx="14" fill="url(#card)" stroke="#2d5d84"/>
    <text x="690" y="252" fill="#ffb400" font-size="28" font-family="Segoe UI, Arial" font-weight="700">3) IR1</text>
    <text x="690" y="286" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">forward graph only</text>
    <text x="690" y="314" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">weight vs activation tags</text>
    <text x="690" y="342" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">save_for_backward contract</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="980" y="214" width="268" height="170" rx="14" fill="url(#card)" stroke="#2d5d84"/>
    <text x="1002" y="252" fill="#ffb400" font-size="28" font-family="Segoe UI, Arial" font-weight="700">4) IR2</text>
    <text x="1002" y="286" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">reverse traversal</text>
    <text x="1002" y="314" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">grad fanout accumulation</text>
    <text x="1002" y="342" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">backward kernel binding</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1292" y="214" width="226" height="170" rx="14" fill="url(#card)" stroke="#2d5d84"/>
    <text x="1314" y="252" fill="#ffb400" font-size="28" font-family="Segoe UI, Arial" font-weight="700">5) Layout + Audit</text>
    <text x="1314" y="286" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">layout_train.json</text>
    <text x="1314" y="314" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">sections and offsets</text>
    <text x="1314" y="342" fill="#dbeaf5" font-size="19" font-family="Segoe UI, Arial">audit and canaries</text>
  </g>

  <line x1="322" y1="299" x2="354" y2="299" stroke="#79c8f7" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="624" y1="299" x2="656" y2="299" stroke="#79c8f7" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="936" y1="299" x2="968" y2="299" stroke="#79c8f7" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1248" y1="299" x2="1280" y2="299" stroke="#79c8f7" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="438" width="684" height="214" rx="14" fill="url(#card)" stroke="#2d5d84"/>
    <text x="116" y="478" fill="#07adf8" font-size="30" font-family="Segoe UI, Arial" font-weight="700">Generated Runtime (C)</text>
    <text x="116" y="514" fill="#dbeaf5" font-size="21" font-family="Segoe UI, Arial">generated_train_runtime_v7.c</text>
    <text x="116" y="544" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">- forward_step / backward_step / optimizer_step</text>
    <text x="116" y="572" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">- contiguous memory references from layout offsets</text>
    <text x="116" y="600" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">- memory diagnostics and canary checks in strict mode</text>
    <text x="116" y="630" fill="#9fb8cd" font-size="18" font-family="Segoe UI, Arial">Codegen remains intentionally dumb: emit only what lowered IR already decided.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="438" width="708" height="214" rx="14" fill="url(#card)" stroke="#2d5d84"/>
    <text x="836" y="478" fill="#5dd39e" font-size="30" font-family="Segoe UI, Arial" font-weight="700">Operator Loop</text>
    <text x="836" y="514" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">cks-v7-run train --backend ck</text>
    <text x="836" y="542" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">- executes generated C runtime path</text>
    <text x="836" y="570" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">- writes loss, grad, parity, memory diagnostic artifacts</text>
    <text x="836" y="598" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">cks-v7-run train --backend both</text>
    <text x="836" y="626" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">- CK remains primary, PyTorch runs as oracle reference</text>
  </g>

  <line x1="774" y1="544" x2="798" y2="544" stroke="#79c8f7" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="708" width="1428" height="184" rx="14" fill="url(#card)" stroke="#2d5d84"/>
    <text x="116" y="748" fill="#ffb400" font-size="30" font-family="Segoe UI, Arial" font-weight="700">Output Artifacts for Visualizer</text>
    <text x="116" y="784" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">ir1_train_forward.json, ir2_train_backward.json, layout_train.json, layout_train_audit.json</text>
    <text x="116" y="812" fill="#dbeaf5" font-size="20" font-family="Segoe UI, Arial">generated_train_runtime_summary_v7.json, train_e2e_latest.json, training_loss_curve.json, training_parity.json, memory_diagnostic_latest.json</text>
    <text x="116" y="848" fill="#9fb8cd" font-size="19" font-family="Segoe UI, Arial">open_ir_visualizer.py --generate --run /path/to/run --html-only</text>
  </g>
</svg>
