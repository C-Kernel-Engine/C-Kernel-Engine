<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420">
  <defs>
    <linearGradient id="tplHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4aa3ff"/>
      <stop offset="100%" style="stop-color:#6fb7ff"/>
    </linearGradient>
    <linearGradient id="tplAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb400"/>
      <stop offset="100%" style="stop-color:#ffc933"/>
    </linearGradient>
    <marker id="arrowTpl" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb400"/>
    </marker>
  </defs>

  <rect width="980" height="420" fill="#232323"/>

  <text x="490" y="32" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffb400" text-anchor="middle">Templates to IR (v6.6)</text>
  <text x="490" y="52" font-family="Inter, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">Templates describe architecture. IR resolves ops, buffers, and kernels.</text>

  <g transform="translate(40, 90)">
    <rect width="240" height="120" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="240" height="30" rx="10" fill="url(#tplHeader)"/>
    <text x="120" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Template JSON</text>
    <text x="120" y="60" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">qwen2.json / qwen3.json / gemma3.json</text>
    <text x="120" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Header + Body + Footer ops</text>
    <text x="120" y="100" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Flags: qk_norm, qkv_bias, rope</text>
  </g>

  <g transform="translate(295, 150)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowTpl)"/>
  </g>

  <g transform="translate(365, 90)">
    <rect width="250" height="120" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="250" height="30" rx="10" fill="url(#tplAccent)"/>
    <text x="125" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">IR1 Builder</text>
    <text x="125" y="60" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Template ops to kernel families</text>
    <text x="125" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Dataflow edges and op IDs</text>
    <text x="125" y="100" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Quant summary aware</text>
  </g>

  <g transform="translate(635, 150)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowTpl)"/>
  </g>

  <g transform="translate(705, 90)">
    <rect width="235" height="120" rx="10" fill="#2a2a2a" stroke="#47b475" stroke-width="3"/>
    <rect width="235" height="30" rx="10" fill="#47b475"/>
    <text x="117" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">IR1 Output</text>
    <text x="117" y="60" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Graph ops + dataflow</text>
    <text x="117" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Kernel IDs resolved</text>
    <text x="117" y="100" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Ready for lowering</text>
  </g>

  <g transform="translate(40, 250)">
    <rect width="900" height="130" rx="12" fill="#1f1f1f" stroke="#333" stroke-width="2"/>
    <text x="30" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffb400">Key idea</text>
    <text x="30" y="58" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0">Templates are architecture, not kernel selection. IR chooses kernels from registry based on quant + flags.</text>
    <text x="30" y="82" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0">No model-specific if/else chains are allowed in codegen.</text>
  </g>
</svg>
