<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420">
  <defs>
    <linearGradient id="ampHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb400"/>
      <stop offset="100%" style="stop-color:#ffc933"/>
    </linearGradient>
    <linearGradient id="ampAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#47b475"/>
      <stop offset="100%" style="stop-color:#5cc98a"/>
    </linearGradient>
    <marker id="arrowAmp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb400"/>
    </marker>
  </defs>

  <rect width="980" height="420" fill="#232323"/>

  <text x="490" y="32" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffb400" text-anchor="middle">Kernel AMP Strategy (v6.6)</text>
  <text x="490" y="52" font-family="Inter, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">Per-op selection based on quant summary, template flags, and kernel registry</text>

  <g transform="translate(40, 90)">
    <rect width="210" height="110" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="210" height="30" rx="10" fill="url(#ampHeader)"/>
    <text x="105" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Inputs</text>
    <text x="105" y="58" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">quant_summary</text>
    <text x="105" y="78" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">template.flags</text>
    <text x="105" y="98" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">kernel registry</text>
  </g>

  <g transform="translate(270, 120)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowAmp)"/>
  </g>

  <g transform="translate(340, 90)">
    <rect width="250" height="110" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="250" height="30" rx="10" fill="url(#ampHeader)"/>
    <text x="125" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">AMP Policy</text>
    <text x="125" y="58" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Choose activation dtype</text>
    <text x="125" y="78" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">FP32 vs Q8_0 contract</text>
    <text x="125" y="98" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Logits override flags</text>
  </g>

  <g transform="translate(610, 120)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowAmp)"/>
  </g>

  <g transform="translate(680, 90)">
    <rect width="260" height="110" rx="10" fill="#2a2a2a" stroke="#47b475" stroke-width="3"/>
    <rect width="260" height="30" rx="10" fill="url(#ampAccent)"/>
    <text x="130" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Selected Kernels</text>
    <text x="130" y="58" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">gemm / gemv / qkv / rope</text>
    <text x="130" y="78" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">fp32 or q8 activation path</text>
    <text x="130" y="98" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">decode vs prefill variants</text>
  </g>

  <g transform="translate(40, 240)">
    <rect width="900" height="140" rx="12" fill="#1f1f1f" stroke="#333" stroke-width="2"/>
    <text x="30" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffb400">Example decisions</text>

    <rect x="20" y="50" width="270" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="155" y="75" font-family="Inter, sans-serif" font-size="11" fill="#c7c7c7" text-anchor="middle">Qwen2/Qwen3</text>
    <text x="155" y="95" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">Q8 activations in gemv/gemm</text>
    <text x="155" y="112" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">Prefer contract kernels</text>

    <rect x="315" y="50" width="270" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="450" y="75" font-family="Inter, sans-serif" font-size="11" fill="#c7c7c7" text-anchor="middle">Gemma</text>
    <text x="450" y="95" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">FP32 logits path for parity</text>
    <text x="450" y="112" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">Scale embeddings sqrt(dim)</text>

    <rect x="610" y="50" width="270" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="745" y="75" font-family="Inter, sans-serif" font-size="11" fill="#c7c7c7" text-anchor="middle">Fallback</text>
    <text x="745" y="95" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">If kernel missing, map to gemv/gemm</text>
    <text x="745" y="112" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">No silent hardcoded swaps</text>
  </g>
</svg>
