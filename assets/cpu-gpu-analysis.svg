<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
      .title { font-size: 28px; font-weight: 700; fill: #ffb400; }
      .subtitle { font-size: 14px; fill: #707070; }
    </style>

    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#47b475;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#47b475;stop-opacity:0.05"/>
    </linearGradient>

    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.05"/>
    </linearGradient>

    <linearGradient id="memoryBarCpu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#47b475"/>
      <stop offset="100%" style="stop-color:#2d7a4c"/>
    </linearGradient>

    <linearGradient id="memoryBarGpu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#cc5555"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="600" y="45" class="title" text-anchor="middle">0 × ∞ = 0: The Cost Implication</text>
  <text x="600" y="72" class="subtitle" text-anchor="middle">GPU memory limits FORCE you into expensive multi-GPU purchases</text>

  <!-- Central insight -->
  <rect x="250" y="90" width="700" height="55" rx="8" fill="#2a2a2a" stroke="#ffb400" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="125" font-size="18" font-weight="600" fill="#ffb400" text-anchor="middle">
    "Yes, parallelism works. But now you MUST buy 8 GPUs."
  </text>

  <!-- CPU Section -->
  <g transform="translate(60, 165)">
    <rect width="500" height="550" rx="12" fill="url(#cpuGrad)" stroke="#47b475" stroke-width="2" filter="url(#shadow)"/>

    <!-- Header -->
    <rect x="0" y="0" width="500" height="50" rx="12" fill="#47b475"/>
    <rect x="0" y="40" width="500" height="10" fill="#47b475"/>
    <text x="250" y="33" font-size="20" font-weight="700" fill="#1a1a1a" text-anchor="middle">CPU PATH</text>

    <!-- 70B Model requirement -->
    <g transform="translate(40, 70)">
      <rect x="0" y="0" width="420" height="80" rx="8" fill="#2a2a2a" stroke="#454545"/>
      <text x="210" y="25" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">70B Model Training Requirements</text>
      <text x="20" y="50" font-size="12" fill="#a0a0a0">Weights (FP16):</text>
      <text x="400" y="50" font-size="12" fill="#47b475" text-anchor="end">140 GB</text>
      <text x="20" y="70" font-size="12" fill="#a0a0a0">+ Optimizer states (Adam):</text>
      <text x="400" y="70" font-size="12" fill="#47b475" text-anchor="end">~560 GB total</text>
    </g>

    <!-- Server visualization -->
    <g transform="translate(100, 170)">
      <rect x="0" y="0" width="300" height="100" rx="8" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
      <rect x="0" y="0" width="300" height="30" rx="8" fill="#47b475" opacity="0.3"/>
      <text x="150" y="22" font-size="13" font-weight="600" fill="#ffb400" text-anchor="middle">Single Dual-Socket Server</text>

      <text x="150" y="50" font-size="11" fill="#a0a0a0" text-anchor="middle">2× EPYC 9654 (192 cores)</text>
      <text x="150" y="70" font-size="16" font-weight="700" fill="#47b475" text-anchor="middle">4 TB DDR5 RAM</text>
      <text x="150" y="90" font-size="12" fill="#47b475" text-anchor="middle">Model Fits! (560GB &lt; 4TB)</text>
    </g>

    <!-- Memory bar -->
    <g transform="translate(40, 290)">
      <text x="210" y="0" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Memory Utilization</text>
      <rect x="0" y="15" width="420" height="35" rx="4" fill="#1a1a1a" stroke="#454545"/>
      <rect x="3" y="18" width="60" height="29" rx="3" fill="url(#memoryBarCpu)"/>
      <text x="90" y="40" font-size="11" fill="#47b475">560GB used</text>
      <text x="350" y="40" font-size="11" fill="#707070">3.4TB free</text>
    </g>

    <!-- Cost breakdown -->
    <g transform="translate(40, 360)">
      <rect x="0" y="0" width="420" height="120" rx="8" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
      <text x="210" y="25" font-size="14" font-weight="600" fill="#47b475" text-anchor="middle">Total Cost</text>

      <text x="20" y="55" font-size="12" fill="#a0a0a0">Server (CPUs + RAM + chassis):</text>
      <text x="400" y="55" font-size="12" fill="#47b475" text-anchor="end">$30,000</text>

      <text x="20" y="80" font-size="12" fill="#a0a0a0">Network (100GbE NIC):</text>
      <text x="400" y="80" font-size="12" fill="#47b475" text-anchor="end">$2,000</text>

      <line x1="20" y1="92" x2="400" y2="92" stroke="#454545"/>
      <text x="20" y="112" font-size="14" font-weight="700" fill="#47b475">TOTAL:</text>
      <text x="400" y="112" font-size="18" font-weight="700" fill="#47b475" text-anchor="end">$32,000</text>
    </g>

    <!-- Result -->
    <rect x="40" y="495" width="420" height="40" rx="6" fill="#47b475" filter="url(#glow)"/>
    <text x="250" y="522" font-size="15" font-weight="700" fill="#1a1a1a" text-anchor="middle">1 Server = Done. Start training today.</text>
  </g>

  <!-- GPU Section -->
  <g transform="translate(640, 165)">
    <rect width="500" height="550" rx="12" fill="url(#gpuGrad)" stroke="#ff6b6b" stroke-width="2" filter="url(#shadow)"/>

    <!-- Header -->
    <rect x="0" y="0" width="500" height="50" rx="12" fill="#ff6b6b"/>
    <rect x="0" y="40" width="500" height="10" fill="#ff6b6b"/>
    <text x="250" y="33" font-size="20" font-weight="700" fill="#1a1a1a" text-anchor="middle">GPU PATH</text>

    <!-- 70B Model requirement -->
    <g transform="translate(40, 70)">
      <rect x="0" y="0" width="420" height="80" rx="8" fill="#2a2a2a" stroke="#454545"/>
      <text x="210" y="25" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">70B Model Training Requirements</text>
      <text x="20" y="50" font-size="12" fill="#a0a0a0">Same: Weights + Optimizer:</text>
      <text x="400" y="50" font-size="12" fill="#ff6b6b" text-anchor="end">~560 GB</text>
      <text x="20" y="70" font-size="12" fill="#a0a0a0">H100 VRAM per GPU:</text>
      <text x="400" y="70" font-size="12" fill="#ff6b6b" text-anchor="end">80 GB only!</text>
    </g>

    <!-- GPU Grid (forced to buy 8) -->
    <g transform="translate(50, 170)">
      <text x="200" y="0" font-size="12" font-weight="600" fill="#ff6b6b" text-anchor="middle">FORCED: Need 8× GPUs for 640GB total VRAM</text>

      <g transform="translate(25, 15)">
        <rect x="0" y="0" width="80" height="40" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="40" y="18" font-size="9" fill="#ffb400" text-anchor="middle">H100</text>
        <text x="40" y="32" font-size="8" fill="#a0a0a0" text-anchor="middle">80GB</text>

        <rect x="90" y="0" width="80" height="40" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="130" y="18" font-size="9" fill="#ffb400" text-anchor="middle">H100</text>
        <text x="130" y="32" font-size="8" fill="#a0a0a0" text-anchor="middle">80GB</text>

        <rect x="180" y="0" width="80" height="40" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="220" y="18" font-size="9" fill="#ffb400" text-anchor="middle">H100</text>
        <text x="220" y="32" font-size="8" fill="#a0a0a0" text-anchor="middle">80GB</text>

        <rect x="270" y="0" width="80" height="40" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="310" y="18" font-size="9" fill="#ffb400" text-anchor="middle">H100</text>
        <text x="310" y="32" font-size="8" fill="#a0a0a0" text-anchor="middle">80GB</text>

        <rect x="0" y="50" width="80" height="40" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="40" y="68" font-size="9" fill="#ffb400" text-anchor="middle">H100</text>
        <text x="40" y="82" font-size="8" fill="#a0a0a0" text-anchor="middle">80GB</text>

        <rect x="90" y="50" width="80" height="40" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="130" y="68" font-size="9" fill="#ffb400" text-anchor="middle">H100</text>
        <text x="130" y="82" font-size="8" fill="#a0a0a0" text-anchor="middle">80GB</text>

        <rect x="180" y="50" width="80" height="40" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="220" y="68" font-size="9" fill="#ffb400" text-anchor="middle">H100</text>
        <text x="220" y="82" font-size="8" fill="#a0a0a0" text-anchor="middle">80GB</text>

        <rect x="270" y="50" width="80" height="40" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="310" y="68" font-size="9" fill="#ffb400" text-anchor="middle">H100</text>
        <text x="310" y="82" font-size="8" fill="#a0a0a0" text-anchor="middle">80GB</text>
      </g>
    </g>

    <!-- Memory bar -->
    <g transform="translate(40, 290)">
      <text x="210" y="0" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Memory Utilization (across 8 GPUs)</text>
      <rect x="0" y="15" width="420" height="35" rx="4" fill="#1a1a1a" stroke="#454545"/>
      <rect x="3" y="18" width="368" height="29" rx="3" fill="url(#memoryBarGpu)"/>
      <text x="150" y="40" font-size="11" fill="#1a1a1a">560GB distributed</text>
      <text x="398" y="40" font-size="10" fill="#707070">80GB free</text>
    </g>

    <!-- Cost breakdown -->
    <g transform="translate(40, 360)">
      <rect x="0" y="0" width="420" height="120" rx="8" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2"/>
      <text x="210" y="25" font-size="14" font-weight="600" fill="#ff6b6b" text-anchor="middle">Total Cost</text>

      <text x="20" y="50" font-size="12" fill="#a0a0a0">8× H100 GPUs @ $40K:</text>
      <text x="400" y="50" font-size="12" fill="#ff6b6b" text-anchor="end">$320,000</text>

      <text x="20" y="70" font-size="12" fill="#a0a0a0">DGX chassis + NVLink:</text>
      <text x="400" y="70" font-size="12" fill="#ff6b6b" text-anchor="end">$130,000</text>

      <text x="20" y="90" font-size="12" fill="#a0a0a0">Network + infra:</text>
      <text x="400" y="90" font-size="12" fill="#ff6b6b" text-anchor="end">$30,000</text>

      <line x1="20" y1="100" x2="400" y2="100" stroke="#454545"/>
      <text x="20" y="115" font-size="14" font-weight="700" fill="#ff6b6b">TOTAL:</text>
      <text x="400" y="115" font-size="18" font-weight="700" fill="#ff6b6b" text-anchor="end">$480,000</text>
    </g>

    <!-- Result -->
    <rect x="40" y="495" width="420" height="40" rx="6" fill="#ff6b6b"/>
    <text x="250" y="522" font-size="15" font-weight="700" fill="#1a1a1a" text-anchor="middle">15× more expensive. 12-24 month wait.</text>
  </g>

  <!-- VS Badge -->
  <circle cx="600" cy="440" r="40" fill="#ffb400" filter="url(#shadow)"/>
  <text x="600" y="448" font-size="24" font-weight="700" fill="#1a1a1a" text-anchor="middle">VS</text>

  <!-- Bottom takeaway -->
  <rect x="100" y="735" width="1000" height="50" rx="8" fill="#2a2a2a" stroke="#ffb400" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="768" font-size="18" font-weight="600" fill="#ffb400" text-anchor="middle">
    The "0 × ∞ = 0" principle FORCES expensive GPU purchases. CPUs avoid the trap entirely.
  </text>
</svg>
