<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="55%" stop-color="#2E2E2E"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <linearGradient id="accentOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB400"/>
      <stop offset="100%" stop-color="#FFD24D"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#07ADF8"/>
      <stop offset="100%" stop-color="#66D3FF"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#47B475"/>
      <stop offset="100%" stop-color="#7ED8A3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 44px "Inter", "Segoe UI", sans-serif; fill: #F8F8F8; }
      .subtitle { font: 500 19px "Inter", "Segoe UI", sans-serif; fill: #C5C5C5; }
      .section { font: 700 24px "Inter", "Segoe UI", sans-serif; fill: #F2F2F2; }
      .label { font: 600 18px "Inter", "Segoe UI", sans-serif; fill: #ECECEC; }
      .body { font: 500 15px "Inter", "Segoe UI", sans-serif; fill: #B8B8B8; }
      .small { font: 500 13px "Inter", "Segoe UI", sans-serif; fill: #9B9B9B; }
      .mono { font: 600 13px "JetBrains Mono", "Consolas", monospace; fill: #D6D6D6; }
      .chip { font: 700 12px "Inter", "Segoe UI", sans-serif; fill: #1E1E1E; }
      .triageHead { font: 700 14px "Inter", "Segoe UI", sans-serif; fill: #F3F3F3; }
      .triageBody { font: 500 13px "Inter", "Segoe UI", sans-serif; fill: #BDBDBD; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" rx="24" fill="url(#bgGrad)"/>
  <rect x="28" y="28" width="1544" height="924" rx="20" stroke="#3F3F3F" stroke-width="1.5"/>

  <rect x="64" y="52" width="1472" height="120" rx="16" fill="#2D2D2D" stroke="#464646"/>
  <rect x="64" y="52" width="1472" height="5" fill="url(#accentOrange)"/>
  <text x="96" y="110" class="title">Deep Training Intuition Map</text>
  <text x="96" y="144" class="subtitle">Correctness gates are the floor. Intuition comes from repeated, observable failure-and-recovery loops.</text>

  <rect x="98" y="214" width="145" height="34" rx="17" fill="#FFB400"/>
  <text x="128" y="236" class="chip">CORRECTNESS</text>
  <rect x="264" y="214" width="120" height="34" rx="17" fill="#07ADF8"/>
  <text x="296" y="236" class="chip">INSIGHT</text>
  <rect x="402" y="214" width="138" height="34" rx="17" fill="#47B475"/>
  <text x="434" y="236" class="chip">ADAPTATION</text>

  <g filter="url(#softShadow)">
    <rect x="70" y="270" width="470" height="240" rx="14" fill="#303030" stroke="#4A4A4A"/>
    <rect x="565" y="270" width="470" height="240" rx="14" fill="#303030" stroke="#4A4A4A"/>
    <rect x="1060" y="270" width="470" height="240" rx="14" fill="#303030" stroke="#4A4A4A"/>
  </g>

  <text x="96" y="310" class="section">1) Observe End-to-End</text>
  <text x="96" y="344" class="body">Loss curve -> per-param grads -> IR2 backward ops -> generated C -> kernel dispatch.</text>
  <text x="96" y="374" class="body">When an anomaly appears, you can trace it all the way to the compute path.</text>
  <rect x="96" y="402" width="418" height="88" rx="10" fill="#262626" stroke="#454545"/>
  <text x="112" y="430" class="mono">Surface: loss, parity, replay</text>
  <text x="112" y="453" class="mono">Tensor: grad/activation stats</text>
  <text x="112" y="476" class="mono">Kernel: exact function + ISA path</text>

  <text x="591" y="310" class="section">2) Log Smart, Not Heavy</text>
  <text x="591" y="344" class="body">Use tiny analysis checkpoints often, full resume checkpoints rarely.</text>
  <rect x="591" y="374" width="418" height="116" rx="10" fill="#262626" stroke="#454545"/>
  <text x="607" y="404" class="label">Checkpoint Economics</text>
  <text x="607" y="427" class="small">Raw tensor dump: ~5.7 GB</text>
  <rect x="607" y="438" width="376" height="11" rx="6" fill="#1E1E1E" stroke="#3F3F3F"/>
  <rect x="607" y="438" width="376" height="11" rx="6" fill="url(#accentOrange)"/>
  <text x="607" y="468" class="small">Analysis checkpoint: ~200 KB</text>
  <rect x="607" y="479" width="376" height="11" rx="6" fill="#1E1E1E" stroke="#3F3F3F"/>
  <rect x="607" y="479" width="16" height="11" rx="6" fill="url(#accentBlue)"/>

  <text x="1086" y="310" class="section">3) Learn, Then Adjust</text>
  <text x="1086" y="344" class="body">One knob per run. Compare against baseline at fixed steps.</text>
  <rect x="1086" y="374" width="418" height="116" rx="10" fill="#262626" stroke="#454545"/>
  <text x="1102" y="403" class="mono">knob: lr | init | clipping | warmup</text>
  <text x="1102" y="428" class="mono">observe: waterfall | entropy | deltas</text>
  <text x="1102" y="453" class="mono">decide: keep / rollback / retune</text>
  <text x="1102" y="478" class="mono">log: repeatable failure signature</text>

  <path d="M540 390 C553 390 555 390 565 390" stroke="#666666" stroke-width="2.4" marker-end="url(#mA)"/>
  <path d="M1035 390 C1048 390 1050 390 1060 390" stroke="#666666" stroke-width="2.4" marker-end="url(#mA)"/>

  <defs>
    <marker id="mA" markerWidth="8" markerHeight="8" refX="6.4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#666666"/>
    </marker>
  </defs>

  <rect x="70" y="540" width="1460" height="188" rx="14" fill="#2F2F2F" stroke="#4A4A4A"/>
  <text x="96" y="578" class="section">Cadence: Dense Early, Sparse Later, Event-Triggered Always</text>

  <rect x="96" y="596" width="300" height="110" rx="10" fill="#262626" stroke="#454545"/>
  <text x="114" y="624" class="label">Steps 1-100</text>
  <text x="114" y="649" class="body">Analysis checkpoint every 10 steps</text>
  <text x="114" y="673" class="small">capture volatile startup behavior</text>

  <rect x="416" y="596" width="300" height="110" rx="10" fill="#262626" stroke="#454545"/>
  <text x="434" y="624" class="label">Steps 100-1000</text>
  <text x="434" y="649" class="body">Analysis checkpoint every 50 steps</text>
  <text x="434" y="673" class="small">watch stabilization and drift</text>

  <rect x="736" y="596" width="300" height="110" rx="10" fill="#262626" stroke="#454545"/>
  <text x="754" y="624" class="label">Steps 1000-10000</text>
  <text x="754" y="649" class="body">Analysis checkpoint every 200 steps</text>
  <text x="754" y="673" class="small">long-phase behavior and retention</text>

  <rect x="1056" y="596" width="448" height="110" rx="10" fill="#262626" stroke="#454545"/>
  <text x="1074" y="624" class="label">Event Triggers (independent of interval)</text>
  <text x="1074" y="649" class="body">loss spike > 2x MA | grad norm threshold | dead-parameter alert</text>
  <text x="1074" y="673" class="small">write immediate analysis checkpoint for post-mortem</text>

  <rect x="70" y="754" width="930" height="174" rx="14" fill="#2F2F2F" stroke="#4A4A4A"/>
  <text x="96" y="792" class="section">Curriculum (12 Experiments)</text>
  <text x="96" y="822" class="body">Phase 1 baseline -> Phase 2 controlled breakage -> Phase 3 optimizer dynamics</text>
  <text x="96" y="848" class="body">Phase 4 attention specialization -> Phase 5 Qwen-scale gradient waterfalls</text>
  <rect x="96" y="868" width="878" height="36" rx="8" fill="#262626" stroke="#454545"/>
  <text x="114" y="892" class="mono">Output: failure signatures you recognize instantly (vanish, explode, saturate, dead path).</text>

  <rect x="1028" y="754" width="502" height="174" rx="14" fill="#2F2F2F" stroke="#4A4A4A"/>
  <text x="1054" y="792" class="section">Gradient Triage Loop</text>
  <text x="1054" y="822" class="triageHead">Symptom</text>
  <text x="1178" y="822" class="triageHead">First Action</text>
  <text x="1054" y="846" class="triageBody">waterfall pinch</text>
  <text x="1178" y="846" class="triageBody">check init / residual / norm path</text>
  <text x="1054" y="869" class="triageBody">late loss spike</text>
  <text x="1178" y="869" class="triageBody">reduce LR, extend warmup/decay</text>
  <text x="1054" y="892" class="triageBody">entropy collapse</text>
  <text x="1178" y="892" class="triageBody">inspect QK-norm and attention scale</text>

  <text x="96" y="958" class="small">Use this as a runbook: observe -> isolate -> adjust -> compare -> record.</text>
</svg>
