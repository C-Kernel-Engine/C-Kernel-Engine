<svg width="1760" height="820" viewBox="0 0 1760 820" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#47b475"/><stop offset="100%" stop-color="#79d79d"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#47b475"/></filter></defs><rect x="0" y="0" width="1760" height="820" fill="url(#bgGrad)"/><rect x="56.0" y="56.0" width="1648.0" height="112" rx="22" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="74.0" y="72.0" width="220" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="130.0" fill="#f3f7fc" font-size="30" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Kernel Registry Flow</tspan></text><text x="80.0" y="160.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Track how an abstract IR op resolves into a concrete runtime kernel.</tspan></text><g class="flow-node"><rect x="56.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#47b475" stroke-width="1.6"/><rect x="74.0" y="402.0" width="96" height="24" rx="12" fill="#47b475" fill-opacity="0.14" stroke="#47b475" stroke-width="1"/><text x="122.0" y="418.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="122.0" dy="0">STAGE</tspan></text><text x="74.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">IR Operation</tspan></text><text x="74.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">Start from the canonical operator intent.</tspan></text></g><g class="flow-node"><rect x="400.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#47b475" stroke-width="1.6"/><rect x="418.0" y="402.0" width="96" height="24" rx="12" fill="#47b475" fill-opacity="0.14" stroke="#47b475" stroke-width="1"/><text x="466.0" y="418.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="466.0" dy="0">STAGE</tspan></text><text x="418.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Registry Lookup</tspan></text><text x="418.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Match the op to a supported kernel family.</tspan></text><text x="422.0" y="498.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">attention</tspan></text><text x="422.0" y="516.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">rmsnorm</tspan></text></g><g class="flow-node"><rect x="744.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#47b475" stroke-width="1.6"/><rect x="762.0" y="402.0" width="96" height="24" rx="12" fill="#47b475" fill-opacity="0.14" stroke="#47b475" stroke-width="1"/><text x="810.0" y="418.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="810.0" dy="0">STAGE</tspan></text><text x="762.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Kernel Selector</tspan></text><text x="762.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Choose the implementation for shape and</tspan><tspan x="762.0" dy="15.0">policy.</tspan></text></g><g class="flow-node"><rect x="1088.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#47b475" stroke-width="1.6"/><rect x="1106.0" y="402.0" width="96" height="24" rx="12" fill="#47b475" fill-opacity="0.14" stroke="#47b475" stroke-width="1"/><text x="1154.0" y="418.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1154.0" dy="0">STAGE</tspan></text><text x="1106.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Generated Runtime</tspan></text><text x="1106.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Compile the selected kernel plan into the</tspan><tspan x="1106.0" dy="15.0">runtime artifact.</tspan></text></g><g class="flow-node"><rect x="1432.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#79d79d" stroke-width="1.6"/><rect x="1450.0" y="402.0" width="96" height="24" rx="12" fill="#79d79d" fill-opacity="0.14" stroke="#79d79d" stroke-width="1"/><text x="1498.0" y="418.0" fill="#79d79d" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1498.0" dy="0">OUTCOME</tspan></text><text x="1450.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">Linked Runtime</tspan></text><text x="1450.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">The final runtime uses only registered,</tspan><tspan x="1450.0" dy="15.0">validated kernels.</tspan></text></g><g class="flow-connectors"><path d="M 336.0 454.0 C 368.0 454.0, 368.0 454.0, 392.0 454.0" stroke="#47b475" stroke-width="3" fill="none"/><text x="368.0" y="446.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">resolve</tspan></text><path d="M 680.0 454.0 C 712.0 454.0, 712.0 454.0, 736.0 454.0" stroke="#47b475" stroke-width="3" fill="none"/><text x="712.0" y="446.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="712.0" dy="0">candidates</tspan></text><path d="M 1024.0 454.0 C 1056.0 454.0, 1056.0 454.0, 1080.0 454.0" stroke="#47b475" stroke-width="3" fill="none"/><text x="1056.0" y="446.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1056.0" dy="0">chosen kernel</tspan></text><path d="M 1368.0 454.0 C 1400.0 454.0, 1400.0 454.0, 1424.0 454.0" stroke="#47b475" stroke-width="3" fill="none"/><text x="1400.0" y="446.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1400.0" dy="0">compiled</tspan></text></g><rect x="56.0" y="748.0" width="1648.0" height="44" rx="14" fill="#192638" fill-opacity="0.92" stroke="#334155" stroke-width="1"/><text x="76.0" y="776.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">The registry boundary is one of the clearest deterministic compiler interfaces in the repo.</tspan></text></svg>