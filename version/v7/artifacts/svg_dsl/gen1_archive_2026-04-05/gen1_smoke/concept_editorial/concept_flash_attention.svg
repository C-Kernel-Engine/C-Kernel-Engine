<svg width="1280" height="920" viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter></defs><rect x="0" y="0" width="1280" height="920" fill="url(#bgGrad)"/><g opacity="0.20"><circle cx="1049.6" cy="184.0" r="180" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="2"/><circle cx="1049.6" cy="184.0" r="250" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="1.5"/><circle cx="179.2" cy="754.4" r="120" fill="none" stroke="#ffb400" stroke-width="2"/></g><rect x="56.0" y="56.0" width="1168.0" height="132" rx="26" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="78.0" y="74.0" width="240" height="9" rx="4.5" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="82.0" y="102.0" fill="#ffb400" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Attention Systems</tspan></text><text x="82.0" y="140.0" fill="#f3f7fc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Flash Attention</tspan></text><text x="82.0" y="172.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Exact attention stays exact by tiling memory pressure down to a streaming problem.</tspan></text><rect x="56.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="56.0" y="212.0" width="8" height="226.0" rx="4" fill="#ffb400"/><rect x="78.0" y="232.0" width="527.0" height="28" rx="14" fill="#ffb400" fill-opacity="0.11" stroke="#ffb400" stroke-width="1"/><text x="88.0" y="251.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="88.0" dy="0">Old path</tspan></text><text x="86.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="86.0" dy="0">Materialize the full score matrix and memory</tspan><tspan x="86.0" dy="16.2">explodes with sequence length.</tspan></text><circle cx="92.0" cy="320.0" r="5" fill="#ffb400"/><text x="106.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Scores matrix is O(N^2)</tspan></text><circle cx="92.0" cy="348.0" r="5" fill="#ffb400"/><text x="106.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">HBM becomes the gate</tspan></text><circle cx="92.0" cy="376.0" r="5" fill="#ffb400"/><text x="106.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Latency follows memory traffic</tspan></text><rect x="653.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="653.0" y="212.0" width="8" height="226.0" rx="4" fill="#ffd66b"/><rect x="675.0" y="232.0" width="527.0" height="28" rx="14" fill="#ffd66b" fill-opacity="0.11" stroke="#ffd66b" stroke-width="1"/><text x="685.0" y="251.0" fill="#ffd66b" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="685.0" dy="0">Flash path</tspan></text><text x="683.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="683.0" dy="0">Stream tiles, keep one working set in fast</tspan><tspan x="683.0" dy="16.2">memory, and preserve exactness.</tspan></text><circle cx="689.0" cy="320.0" r="5" fill="#ffd66b"/><text x="703.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Online softmax updates state</tspan></text><circle cx="689.0" cy="348.0" r="5" fill="#ffd66b"/><text x="703.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">One tile in SRAM</tspan></text><circle cx="689.0" cy="376.0" r="5" fill="#ffd66b"/><text x="703.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Same output, smaller memory bill</tspan></text><rect x="56.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="482.0" width="336.0" height="24" rx="12" fill="#ffb400" fill-opacity="0.10"/><text x="84.0" y="500.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="84.0" dy="0">Problem</tspan></text><text x="80.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Memory wall</tspan></text><text x="80.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Long context attention is often</tspan><tspan x="80.0" dy="15.0">bounded by matrix materialization,</tspan><tspan x="80.0" dy="15.0">not arithmetic.</tspan></text><circle cx="84.0" cy="600.0" r="4.5" fill="#ffb400"/><text x="98.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">N grows, matrix squares</tspan></text><circle cx="84.0" cy="624.0" r="4.5" fill="#ffb400"/><text x="98.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">GPU memory fills first</tspan></text><circle cx="84.0" cy="648.0" r="4.5" fill="#ffb400"/><text x="98.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Speedups do not help if it</tspan><tspan x="98.0" dy="13.8">cannot fit</tspan></text><line x1="80.0" y1="646.0" x2="404.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="80.0" y="670.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Capacity fails before FLOPS</tspan><tspan x="80.0" dy="12.5">matter.</tspan></text><rect x="454.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="472.0" y="482.0" width="336.0" height="24" rx="12" fill="#47b475" fill-opacity="0.10"/><text x="482.0" y="500.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="482.0" dy="0">Mechanism</tspan></text><text x="478.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Tile loop</tspan></text><text x="478.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Process Q against streamed K/V</tspan><tspan x="478.0" dy="15.0">tiles and update partial</tspan><tspan x="478.0" dy="15.0">normalization in place.</tspan></text><circle cx="482.0" cy="600.0" r="4.5" fill="#47b475"/><text x="496.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Load one query tile</tspan></text><circle cx="482.0" cy="624.0" r="4.5" fill="#47b475"/><text x="496.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Scan key/value tiles</tspan></text><circle cx="482.0" cy="648.0" r="4.5" fill="#47b475"/><text x="496.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Accumulate exact statistics</tspan></text><line x1="478.0" y1="646.0" x2="802.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="478.0" y="670.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">The loop is structured, not</tspan><tspan x="478.0" dy="12.5">approximate.</tspan></text><rect x="852.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="870.0" y="482.0" width="336.0" height="24" rx="12" fill="#56aefc" fill-opacity="0.10"/><text x="880.0" y="500.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="880.0" dy="0">Payoff</tspan></text><text x="876.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Exact result</tspan></text><text x="876.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">The algorithm changes memory</tspan><tspan x="876.0" dy="15.0">movement while preserving the</tspan><tspan x="876.0" dy="15.0">mathematical answer.</tspan></text><circle cx="880.0" cy="600.0" r="4.5" fill="#56aefc"/><text x="894.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Lower memory footprint</tspan></text><circle cx="880.0" cy="624.0" r="4.5" fill="#56aefc"/><text x="894.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Higher effective throughput</tspan></text><circle cx="880.0" cy="648.0" r="4.5" fill="#56aefc"/><text x="894.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">No approximation tax</tspan></text><line x1="876.0" y1="646.0" x2="1200.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="876.0" y="670.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Systems win without changing</tspan><tspan x="876.0" dy="12.5">semantics.</tspan></text><rect x="56.0" y="714.0" width="1168.0" height="104.0" rx="24" fill="#ffb400" fill-opacity="0.08" stroke="#ffb400" stroke-width="1.2"/><text x="80.0" y="744.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Key takeaway</tspan></text><circle cx="80.0" cy="765.0" r="5" fill="#ffb400"/><text x="94.0" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="94.0" dy="0">Treat attention as a</tspan><tspan x="94.0" dy="13.8">memory problem first.</tspan></text><circle cx="453.3" cy="765.0" r="5" fill="#ffb400"/><text x="467.3" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="467.3" dy="0">Tile the computation</tspan><tspan x="467.3" dy="13.8">before asking for more</tspan><tspan x="467.3" dy="13.8">hardware.</tspan></text><circle cx="826.7" cy="765.0" r="5" fill="#ffb400"/><text x="840.7" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="840.7" dy="0">Compiler-visible structure</tspan><tspan x="840.7" dy="13.8">beats raw SVG trivia.</tspan></text><text x="1200.0" y="798.0" fill="#92a4b8" font-size="10" font-weight="700" text-anchor="end" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1200.0" dy="0">flash_attention</tspan></text></svg>