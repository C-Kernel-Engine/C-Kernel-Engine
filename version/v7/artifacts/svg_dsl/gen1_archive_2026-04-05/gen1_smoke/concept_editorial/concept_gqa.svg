<svg width="1280" height="920" viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#47b475"/><stop offset="100%" stop-color="#79d79d"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#47b475"/></filter></defs><rect x="0" y="0" width="1280" height="920" fill="url(#bgGrad)"/><g opacity="0.9"><line x1="0" y1="0" x2="0" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="64" y1="0" x2="64" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="128" y1="0" x2="128" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="192" y1="0" x2="192" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="256" y1="0" x2="256" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="320" y1="0" x2="320" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="384" y1="0" x2="384" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="448" y1="0" x2="448" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="512" y1="0" x2="512" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="576" y1="0" x2="576" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="640" y1="0" x2="640" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="704" y1="0" x2="704" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="768" y1="0" x2="768" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="832" y1="0" x2="832" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="896" y1="0" x2="896" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="1024" y1="0" x2="1024" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="1088" y1="0" x2="1088" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="1152" y1="0" x2="1152" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="1216" y1="0" x2="1216" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="1280" y1="0" x2="1280" y2="920" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="0" x2="1280" y2="0" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="64" x2="1280" y2="64" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="128" x2="1280" y2="128" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="192" x2="1280" y2="192" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="256" x2="1280" y2="256" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="320" x2="1280" y2="320" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="384" x2="1280" y2="384" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="448" x2="1280" y2="448" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="512" x2="1280" y2="512" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="576" x2="1280" y2="576" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="640" x2="1280" y2="640" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="704" x2="1280" y2="704" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="768" x2="1280" y2="768" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="832" x2="1280" y2="832" stroke="rgba(148,163,184,0.10)" stroke-width="1"/><line x1="0" y1="896" x2="1280" y2="896" stroke="rgba(148,163,184,0.10)" stroke-width="1"/></g><rect x="56.0" y="56.0" width="1168.0" height="132" rx="26" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="78.0" y="74.0" width="240" height="9" rx="4.5" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="82.0" y="102.0" fill="#47b475" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Attention Variants</tspan></text><text x="82.0" y="140.0" fill="#f3f7fc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Grouped Query Attention</tspan></text><text x="82.0" y="172.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Share K/V heads across query groups to cut cache cost without collapsing the whole model into</tspan><tspan x="82.0" dy="18.8">one KV pair.</tspan></text><rect x="56.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="56.0" y="212.0" width="8" height="226.0" rx="4" fill="#47b475"/><rect x="78.0" y="232.0" width="527.0" height="28" rx="14" fill="#47b475" fill-opacity="0.11" stroke="#47b475" stroke-width="1"/><text x="88.0" y="251.0" fill="#47b475" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="88.0" dy="0">MHA baseline</tspan></text><text x="86.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="86.0" dy="0">Every attention head gets its own K/V heads,</tspan><tspan x="86.0" dy="16.2">which maximizes flexibility but grows cache</tspan><tspan x="86.0" dy="16.2">and bandwidth.</tspan></text><circle cx="92.0" cy="320.0" r="5" fill="#47b475"/><text x="106.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Many KV heads</tspan></text><circle cx="92.0" cy="348.0" r="5" fill="#47b475"/><text x="106.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Highest cache cost</tspan></text><circle cx="92.0" cy="376.0" r="5" fill="#47b475"/><text x="106.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Clean mental model</tspan></text><rect x="653.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="653.0" y="212.0" width="8" height="226.0" rx="4" fill="#79d79d"/><rect x="675.0" y="232.0" width="527.0" height="28" rx="14" fill="#79d79d" fill-opacity="0.11" stroke="#79d79d" stroke-width="1"/><text x="685.0" y="251.0" fill="#79d79d" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="685.0" dy="0">GQA compromise</tspan></text><text x="683.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="683.0" dy="0">Queries stay numerous, but K/V heads are</tspan><tspan x="683.0" dy="16.2">shared in groups for a better quality-cost</tspan><tspan x="683.0" dy="16.2">tradeoff.</tspan></text><circle cx="689.0" cy="320.0" r="5" fill="#79d79d"/><text x="703.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Shared KV pairs</tspan></text><circle cx="689.0" cy="348.0" r="5" fill="#79d79d"/><text x="703.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Cache shrinks meaningfully</tspan></text><circle cx="689.0" cy="376.0" r="5" fill="#79d79d"/><text x="703.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Quality often holds</tspan></text><rect x="56.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="482.0" width="336.0" height="24" rx="12" fill="#b576ff" fill-opacity="0.10"/><text x="84.0" y="500.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="84.0" dy="0">Tradeoff</tspan></text><text x="80.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Why not MQA?</tspan></text><text x="80.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Single-KV attention is cheaper</tspan><tspan x="80.0" dy="15.0">still, but can erase too much</tspan><tspan x="80.0" dy="15.0">representational flexibility.</tspan></text><circle cx="84.0" cy="600.0" r="4.5" fill="#b576ff"/><text x="98.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">One KV pair is extreme</tspan></text><circle cx="84.0" cy="624.0" r="4.5" fill="#b576ff"/><text x="98.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">GQA keeps groups</tspan></text><circle cx="84.0" cy="648.0" r="4.5" fill="#b576ff"/><text x="98.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Quality stays steadier</tspan></text><line x1="80.0" y1="646.0" x2="404.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="80.0" y="670.0" fill="#b576ff" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">The sweet spot is not always</tspan><tspan x="80.0" dy="12.5">the cheapest point.</tspan></text><rect x="454.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="472.0" y="482.0" width="336.0" height="24" rx="12" fill="#47b475" fill-opacity="0.10"/><text x="482.0" y="500.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="482.0" dy="0">Mechanics</tspan></text><text x="478.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Shared KV</tspan></text><text x="478.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Multiple query heads point at the</tspan><tspan x="478.0" dy="15.0">same K/V pair, so the cache scales</tspan><tspan x="478.0" dy="15.0">with groups instead of heads.</tspan></text><circle cx="482.0" cy="600.0" r="4.5" fill="#47b475"/><text x="496.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Query heads stay many</tspan></text><circle cx="482.0" cy="624.0" r="4.5" fill="#47b475"/><text x="496.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">KV heads shrink</tspan></text><circle cx="482.0" cy="648.0" r="4.5" fill="#47b475"/><text x="496.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Group wiring stays regular</tspan></text><line x1="478.0" y1="646.0" x2="802.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="478.0" y="670.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">A structural change becomes</tspan><tspan x="478.0" dy="12.5">a memory win.</tspan></text><rect x="852.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="870.0" y="482.0" width="336.0" height="24" rx="12" fill="#ffb400" fill-opacity="0.10"/><text x="880.0" y="500.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="880.0" dy="0">Systems</tspan></text><text x="876.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">KV cache drop</tspan></text><text x="876.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Lower KV cardinality means less</tspan><tspan x="876.0" dy="15.0">memory traffic and smaller serving</tspan><tspan x="876.0" dy="15.0">footprint.</tspan></text><circle cx="880.0" cy="600.0" r="4.5" fill="#ffb400"/><text x="894.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Serving becomes cheaper</tspan></text><circle cx="880.0" cy="624.0" r="4.5" fill="#ffb400"/><text x="894.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Latency pressure drops</tspan></text><circle cx="880.0" cy="648.0" r="4.5" fill="#ffb400"/><text x="894.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Long context is easier</tspan></text><line x1="876.0" y1="646.0" x2="1200.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="876.0" y="670.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Inference cost often follows</tspan><tspan x="876.0" dy="12.5">cache shape.</tspan></text><rect x="56.0" y="714.0" width="1168.0" height="104.0" rx="24" fill="#47b475" fill-opacity="0.08" stroke="#47b475" stroke-width="1.2"/><text x="80.0" y="744.0" fill="#47b475" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Key takeaway</tspan></text><circle cx="80.0" cy="765.0" r="5" fill="#47b475"/><text x="94.0" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="94.0" dy="0">GQA is a systems</tspan><tspan x="94.0" dy="13.8">compromise, not just an</tspan><tspan x="94.0" dy="13.8">architecture fad.</tspan></text><circle cx="453.3" cy="765.0" r="5" fill="#47b475"/><text x="467.3" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="467.3" dy="0">It preserves multiple</tspan><tspan x="467.3" dy="13.8">queries while trimming</tspan><tspan x="467.3" dy="13.8">cache cost.</tspan></text><circle cx="826.7" cy="765.0" r="5" fill="#47b475"/><text x="840.7" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="840.7" dy="0">Shared structure is</tspan><tspan x="840.7" dy="13.8">exactly what the DSL</tspan><tspan x="840.7" dy="13.8">should expose.</tspan></text><text x="1200.0" y="798.0" fill="#92a4b8" font-size="10" font-weight="700" text-anchor="end" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1200.0" dy="0">gqa</tspan></text></svg>