<svg width="1800" height="1280" viewBox="0 0 1800 1280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="C-Kernel-Engine comparison of pairwise and split-half RoPE layouts">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe2"/>
      <stop offset="42%" stop-color="#edf4fb"/>
      <stop offset="100%" stop-color="#f7fbf7"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#11243b"/>
      <stop offset="100%" stop-color="#1c3553"/>
    </linearGradient>
    <linearGradient id="pairCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7eb"/>
      <stop offset="100%" stop-color="#fce8c7"/>
    </linearGradient>
    <linearGradient id="splitCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7ff"/>
      <stop offset="100%" stop-color="#d8ecff"/>
    </linearGradient>
    <linearGradient id="choiceCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f7fb"/>
    </linearGradient>
    <linearGradient id="footer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#102338"/>
      <stop offset="100%" stop-color="#1b3352"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#dde6ee" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0b1726" flood-opacity="0.16"/>
    </filter>
    <marker id="warmArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#cb6e15"/>
    </marker>
    <marker id="coolArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2468a8"/>
    </marker>
    <style>
      .brand { font: 800 16px 'IBM Plex Sans', 'Segoe UI', sans-serif; letter-spacing: 0.16em; text-transform: uppercase; fill: #8fd7ff; }
      .hero-kicker { font: 700 15px 'IBM Plex Sans', 'Segoe UI', sans-serif; letter-spacing: 0.1em; text-transform: uppercase; fill: #f8c777; }
      .hero-title { font: 800 46px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #f7fbff; }
      .hero-sub { font: 500 21px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #d5e4f1; }
      .panel-title { font: 800 31px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #102238; }
      .panel-kicker { font: 700 14px 'IBM Plex Sans', 'Segoe UI', sans-serif; letter-spacing: 0.1em; text-transform: uppercase; }
      .body { font: 500 20px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #33485b; }
      .small { font: 500 17px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #455b70; }
      .mono { font: 700 19px 'IBM Plex Mono', monospace; fill: #13253b; }
      .mono-small { font: 700 15px 'IBM Plex Mono', monospace; fill: #13253b; }
      .badge { font: 700 13px 'IBM Plex Sans', 'Segoe UI', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
      .choice-title { font: 800 22px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #12253b; }
      .choice-body { font: 500 17px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #41566a; }
      .footer-title { font: 800 27px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #f8fbff; }
      .footer-body { font: 500 18px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #dae8f8; }
      .footer-mono { font: 700 17px 'IBM Plex Mono', monospace; fill: #98dbff; }
    </style>
  </defs>

  <rect width="1800" height="1280" fill="url(#bg)"/>
  <rect x="0" y="0" width="1800" height="1280" fill="url(#grid)" opacity="0.32"/>

  <g filter="url(#shadow)">
    <rect x="50" y="42" width="1700" height="182" rx="30" fill="url(#hero)"/>
  </g>
  <rect x="86" y="78" width="214" height="34" rx="17" fill="#16314d" stroke="#2c547b" stroke-width="1.5"/>
  <text x="193" y="100" text-anchor="middle" class="brand">C-Kernel-Engine</text>
  <text x="86" y="144" class="hero-kicker">Parity-first model semantics</text>
  <text x="86" y="190" class="hero-title">Two RoPE layouts use the same angles, but different channel planes</text>
  <text x="86" y="223" class="hero-sub">That one detail decides whether a checkpoint agrees with llama.cpp or drifts immediately after RoPE.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="274" width="760" height="520" rx="30" fill="url(#pairCard)" stroke="#e8b15c" stroke-width="2"/>
    <rect x="980" y="274" width="760" height="520" rx="30" fill="url(#splitCard)" stroke="#8bc0ea" stroke-width="2"/>
  </g>

  <rect x="96" y="308" width="170" height="32" rx="16" fill="#ffd08a"/>
  <text x="181" y="329" text-anchor="middle" class="badge" fill="#7b4303">Llama family</text>
  <text x="96" y="382" class="panel-title">Pairwise / Consecutive rotation</text>
  <text x="96" y="412" class="panel-kicker" fill="#b16517">Index pairing</text>
  <text x="96" y="446" class="mono">(0,1)   (2,3)   (4,5)   (6,7)   ...</text>
  <text x="96" y="486" class="body">Each even/odd pair is one 2D rotation plane.</text>

  <rect x="120" y="530" width="64" height="64" rx="16" fill="#fffdfa" stroke="#e5b364"/>
  <rect x="198" y="530" width="64" height="64" rx="16" fill="#fffdfa" stroke="#e5b364"/>
  <rect x="276" y="530" width="64" height="64" rx="16" fill="#fffdfa" stroke="#e5b364"/>
  <rect x="354" y="530" width="64" height="64" rx="16" fill="#fffdfa" stroke="#e5b364"/>
  <rect x="432" y="530" width="64" height="64" rx="16" fill="#fffdfa" stroke="#e5b364"/>
  <rect x="510" y="530" width="64" height="64" rx="16" fill="#fffdfa" stroke="#e5b364"/>
  <rect x="588" y="530" width="64" height="64" rx="16" fill="#fffdfa" stroke="#e5b364"/>
  <rect x="666" y="530" width="64" height="64" rx="16" fill="#fffdfa" stroke="#e5b364"/>
  <text x="152" y="572" text-anchor="middle" class="mono">0</text>
  <text x="230" y="572" text-anchor="middle" class="mono">1</text>
  <text x="308" y="572" text-anchor="middle" class="mono">2</text>
  <text x="386" y="572" text-anchor="middle" class="mono">3</text>
  <text x="464" y="572" text-anchor="middle" class="mono">4</text>
  <text x="542" y="572" text-anchor="middle" class="mono">5</text>
  <text x="620" y="572" text-anchor="middle" class="mono">6</text>
  <text x="698" y="572" text-anchor="middle" class="mono">7</text>
  <path d="M154 616 C154 658 228 658 228 616" fill="none" stroke="#cb6e15" stroke-width="4" marker-end="url(#warmArrow)"/>
  <path d="M310 616 C310 658 384 658 384 616" fill="none" stroke="#cb6e15" stroke-width="4" marker-end="url(#warmArrow)"/>
  <path d="M466 616 C466 658 540 658 540 616" fill="none" stroke="#cb6e15" stroke-width="4" marker-end="url(#warmArrow)"/>
  <path d="M622 616 C622 658 696 658 696 616" fill="none" stroke="#cb6e15" stroke-width="4" marker-end="url(#warmArrow)"/>

  <rect x="98" y="684" width="322" height="52" rx="18" fill="#fff6e5" stroke="#e4b061"/>
  <text x="120" y="717" class="mono-small">x[2i], x[2i+1]  -> rotate ->  x'[2i], x'[2i+1]</text>
  <text x="96" y="764" class="small">
    <tspan x="96" dy="0">Why engineers end up here: Llama-family training</tspan>
    <tspan x="96" dy="22">code and llama.cpp define the checkpoint this way.</tspan>
  </text>

  <rect x="1016" y="308" width="180" height="32" rx="16" fill="#b8defa"/>
  <text x="1106" y="329" text-anchor="middle" class="badge" fill="#124978">NeoX family</text>
  <text x="1016" y="382" class="panel-title">Split-half / NEOX rotation</text>
  <text x="1016" y="412" class="panel-kicker" fill="#2468a8">Index pairing</text>
  <text x="1016" y="446" class="mono">(0,d/2)   (1,d/2+1)   (2,d/2+2)   ...</text>
  <text x="1016" y="486" class="body">The first half rotates against the second half.</text>

  <rect x="1040" y="530" width="64" height="64" rx="16" fill="#fbfeff" stroke="#8fc0e8"/>
  <rect x="1118" y="530" width="64" height="64" rx="16" fill="#fbfeff" stroke="#8fc0e8"/>
  <rect x="1196" y="530" width="64" height="64" rx="16" fill="#fbfeff" stroke="#8fc0e8"/>
  <rect x="1274" y="530" width="64" height="64" rx="16" fill="#fbfeff" stroke="#8fc0e8"/>
  <rect x="1402" y="530" width="64" height="64" rx="16" fill="#fbfeff" stroke="#8fc0e8"/>
  <rect x="1480" y="530" width="64" height="64" rx="16" fill="#fbfeff" stroke="#8fc0e8"/>
  <rect x="1558" y="530" width="64" height="64" rx="16" fill="#fbfeff" stroke="#8fc0e8"/>
  <rect x="1636" y="530" width="64" height="64" rx="16" fill="#fbfeff" stroke="#8fc0e8"/>
  <text x="1072" y="572" text-anchor="middle" class="mono">0</text>
  <text x="1150" y="572" text-anchor="middle" class="mono">1</text>
  <text x="1228" y="572" text-anchor="middle" class="mono">2</text>
  <text x="1306" y="572" text-anchor="middle" class="mono">3</text>
  <text x="1434" y="572" text-anchor="middle" class="mono">4</text>
  <text x="1512" y="572" text-anchor="middle" class="mono">5</text>
  <text x="1590" y="572" text-anchor="middle" class="mono">6</text>
  <text x="1668" y="572" text-anchor="middle" class="mono">7</text>
  <line x1="1074" y1="616" x2="1430" y2="616" stroke="#2468a8" stroke-width="4" marker-end="url(#coolArrow)"/>
  <line x1="1152" y1="640" x2="1508" y2="640" stroke="#2468a8" stroke-width="4" marker-end="url(#coolArrow)"/>
  <line x1="1230" y1="664" x2="1586" y2="664" stroke="#2468a8" stroke-width="4" marker-end="url(#coolArrow)"/>
  <line x1="1308" y1="688" x2="1664" y2="688" stroke="#2468a8" stroke-width="4" marker-end="url(#coolArrow)"/>

  <rect x="1018" y="712" width="372" height="52" rx="18" fill="#eff7ff" stroke="#90c1e8"/>
  <text x="1040" y="745" class="mono-small">x[i], x[i+half]  -> rotate ->  x'[i], x'[i+half]</text>
  <text x="1016" y="790" class="small">
    <tspan x="1016" dy="0">Why engineers end up here: GPT-NeoX style stacks</tspan>
    <tspan x="1016" dy="22">and derived checkpoint families were trained this way.</tspan>
  </text>

  <rect x="840" y="346" width="120" height="332" rx="28" fill="#162c45" opacity="0.97"/>
  <text x="900" y="410" text-anchor="middle" class="panel-kicker" fill="#a6dfff">Same in both</text>
  <text x="900" y="458" text-anchor="middle" class="mono-small" fill="#f8fbff">angle(pos, i)</text>
  <text x="900" y="484" text-anchor="middle" class="mono-small" fill="#f8fbff">= pos * theta_i</text>
  <text x="900" y="544" text-anchor="middle" class="small" fill="#d8e6f4">
    <tspan x="900" dy="0">Different</tspan>
    <tspan x="900" dy="22">rotation</tspan>
    <tspan x="900" dy="22">planes</tspan>
  </text>
  <text x="900" y="644" text-anchor="middle" class="small" fill="#ffd590">
    <tspan x="900" dy="0">Wrong layout</tspan>
    <tspan x="900" dy="22">means first</tspan>
    <tspan x="900" dy="22">divergence</tspan>
    <tspan x="900" dy="22">right after</tspan>
    <tspan x="900" dy="22">RoPE.</tspan>
  </text>

  <text x="70" y="870" class="panel-title">Why would an ML engineer choose one over the other?</text>
  <text x="70" y="906" class="body">
    <tspan x="70" dy="0">Usually they are not choosing at inference time.</tspan>
    <tspan x="70" dy="26">They inherit the layout from the training stack, checkpoint family, and the runtimes they must interoperate with.</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="958" width="500" height="190" rx="26" fill="url(#choiceCard)" stroke="#dbe5ee"/>
    <rect x="650" y="958" width="500" height="190" rx="26" fill="url(#choiceCard)" stroke="#dbe5ee"/>
    <rect x="1230" y="958" width="500" height="190" rx="26" fill="url(#choiceCard)" stroke="#dbe5ee"/>
  </g>

  <rect x="100" y="984" width="156" height="28" rx="14" fill="#ffe0b0"/>
  <text x="178" y="1003" text-anchor="middle" class="badge" fill="#844b08">Checkpoint fit</text>
  <text x="100" y="1046" class="choice-title">
    <tspan x="100" dy="0">Choose pairwise when the model</tspan>
    <tspan x="100" dy="26">family demands it</tspan>
  </text>
  <text x="100" y="1098" class="choice-body">
    <tspan x="100" dy="0">Llama, Llama 2/3, Nanbeige, and</tspan>
    <tspan x="100" dy="22">llama.cpp-compatible checkpoints</tspan>
    <tspan x="100" dy="22">expect consecutive pairs.</tspan>
  </text>

  <rect x="680" y="984" width="136" height="28" rx="14" fill="#d3eafd"/>
  <text x="748" y="1003" text-anchor="middle" class="badge" fill="#155385">Kernel fit</text>
  <text x="680" y="1046" class="choice-title">
    <tspan x="680" dy="0">Choose split-half when the training</tspan>
    <tspan x="680" dy="26">stack was built that way</tspan>
  </text>
  <text x="680" y="1098" class="choice-body">
    <tspan x="680" dy="0">NeoX-style implementations often</tspan>
    <tspan x="680" dy="22">organize RoPE around half-vectors,</tspan>
    <tspan x="680" dy="22">and checkpoints inherit that contract.</tspan>
  </text>

  <rect x="1260" y="984" width="156" height="28" rx="14" fill="#c9f0d8"/>
  <text x="1338" y="1003" text-anchor="middle" class="badge" fill="#17613d">Engineering rule</text>
  <text x="1260" y="1046" class="choice-title">
    <tspan x="1260" dy="0">Do not treat this as a</tspan>
    <tspan x="1260" dy="26">tuning knob</tspan>
  </text>
  <text x="1260" y="1098" class="choice-body">
    <tspan x="1260" dy="0">It is a semantic compatibility choice.</tspan>
    <tspan x="1260" dy="22">Pick the layout that matches training,</tspan>
    <tspan x="1260" dy="22">templates, and reference runtimes.</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="60" y="1182" width="1680" height="62" rx="24" fill="url(#footer)"/>
  </g>
  <text x="88" y="1222" class="footer-body">CK branding rule of thumb:</text>
  <text x="300" y="1222" class="footer-mono">template family -> rope_qk kernel -> hidden-state parity -> final logits</text>
</svg>
