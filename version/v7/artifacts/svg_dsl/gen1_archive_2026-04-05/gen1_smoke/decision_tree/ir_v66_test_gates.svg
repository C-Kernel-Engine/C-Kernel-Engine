<svg width="1780" height="1360" viewBox="0 0 1780 1360" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter></defs><rect x="0" y="0" width="1780" height="1360" fill="url(#bgGrad)"/><rect x="56.0" y="56.0" width="1668.0" height="112" rx="22" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="74.0" y="72.0" width="220" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="130.0" fill="#f3f7fc" font-size="30" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">IR v66 Test Gates</tspan></text><text x="80.0" y="160.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">A gate ladder is still a decision tree: classify the gate family, choose the correct</tspan><tspan x="80.0" dy="18.8">branch, and only then rerun the full stack.</tspan></text><rect x="802.0" y="204.0" width="176" height="30" rx="15" fill="#ffe0a8" stroke="none"/><text x="890.0" y="224.0" fill="#132537" font-size="12" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="890.0" dy="0">TEST GATE</tspan></text><g class="decision-box"><rect x="680.0" y="250.0" width="420.0" height="126.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#436486" stroke-width="1.4"/><text x="704.0" y="290.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="704.0" dy="0">What gate class failed?</tspan></text><text x="704.0" y="316.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="704.0" dy="0">Choose the lane that matches the first red test family.</tspan></text></g><g class="decision-box"><rect x="232.0" y="440.0" width="420.0" height="186.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#436486" stroke-width="1.4"/><text x="256.0" y="480.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="256.0" dy="0">Fast Structural Gates</tspan></text><text x="256.0" y="506.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="256.0" dy="0">Tokenizer, schema, and compiler-smoke checks failed</tspan><tspan x="256.0" dy="16.2">first.</tspan></text><text x="260.0" y="538.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="260.0" dy="0">tokenizer</tspan></text><text x="260.0" y="558.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="260.0" dy="0">schema</tspan></text><text x="260.0" y="578.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="260.0" dy="0">smoke</tspan></text></g><g class="decision-box"><rect x="680.0" y="440.0" width="420.0" height="186.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#436486" stroke-width="1.4"/><text x="704.0" y="480.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="704.0" dy="0">Model Behavior Gates</tspan></text><text x="704.0" y="506.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="704.0" dy="0">Probe exactness, renderability, or held-out prompts</tspan><tspan x="704.0" dy="16.2">failed.</tspan></text><text x="708.0" y="538.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="708.0" dy="0">probe</tspan></text><text x="708.0" y="558.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="708.0" dy="0">renderable</tspan></text><text x="708.0" y="578.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="708.0" dy="0">holdout</tspan></text></g><g class="decision-box"><rect x="1128.0" y="450.0" width="420.0" height="166.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#436486" stroke-width="1.4"/><text x="1152.0" y="490.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1152.0" dy="0">Numerical Safety Gates</tspan></text><text x="1152.0" y="516.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1152.0" dy="0">Parity or finite-difference checks are the active</tspan><tspan x="1152.0" dy="16.2">blocker.</tspan></text><text x="1156.0" y="548.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="1156.0" dy="0">parity</tspan></text><text x="1156.0" y="568.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="1156.0" dy="0">fd-grad</tspan></text></g><g class="decision-box"><rect x="232.0" y="896.0" width="420.0" height="142.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#ffd66b" stroke-width="1.4"/><text x="256.0" y="936.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="256.0" dy="0">Structure Branch</tspan></text><text x="256.0" y="962.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="256.0" dy="0">Fix the contract, then re-smoke the family before</tspan><tspan x="256.0" dy="16.2">training.</tspan></text></g><g class="decision-box"><rect x="680.0" y="896.0" width="420.0" height="142.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#ffd66b" stroke-width="1.4"/><text x="704.0" y="936.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="704.0" dy="0">Behavior Branch</tspan></text><text x="704.0" y="962.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="704.0" dy="0">Use the probe autopsy to identify the failure class, not</tspan><tspan x="704.0" dy="16.2">just the failing prompt.</tspan></text></g><g class="decision-box"><rect x="1128.0" y="896.0" width="420.0" height="142.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#ffd66b" stroke-width="1.4"/><text x="1152.0" y="936.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1152.0" dy="0">Numerics Branch</tspan></text><text x="1152.0" y="962.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1152.0" dy="0">Do not trust a training result until the numerical path</tspan><tspan x="1152.0" dy="16.2">is green again.</tspan></text></g><g class="decision-box"><rect x="680.0" y="690.0" width="420.0" height="142.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#ffd66b" stroke-width="1.4"/><text x="704.0" y="730.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="704.0" dy="0">Promotion Gate</tspan></text><text x="704.0" y="756.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="704.0" dy="0">Only promote the run after the selected branch and the</tspan><tspan x="704.0" dy="16.2">umbrella gate are both green.</tspan></text></g><g class="tree-connectors"><path d="M 890.0 376.0 C 890.0 408.0, 442.0 408.0, 442.0 432.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="666.0" y="400.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="666.0" dy="0">structure</tspan></text><path d="M 890.0 376.0 C 890.0 408.0, 890.0 408.0, 890.0 432.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="890.0" y="400.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="890.0" dy="0">behavior</tspan></text><path d="M 890.0 376.0 C 890.0 413.0, 1338.0 413.0, 1338.0 442.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="1114.0" y="405.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1114.0" dy="0">numerics</tspan></text><path d="M 890.0 626.0 C 890.0 658.0, 890.0 658.0, 890.0 682.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="890.0" y="650.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="890.0" dy="0">promote</tspan></text></g><rect x="56.0" y="1274.0" width="1668.0" height="52" rx="14" fill="#192638" fill-opacity="0.92" stroke="#334155" stroke-width="1"/><text x="80.0" y="1306.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Decision trees are useful because they keep operational reasoning deterministic.</tspan></text></svg>