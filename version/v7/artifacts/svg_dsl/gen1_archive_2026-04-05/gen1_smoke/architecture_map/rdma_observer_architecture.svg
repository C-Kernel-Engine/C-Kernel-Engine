egoe UI, sans-serif"><tspan x="122.0" dy="0">STAGE</tspan></text><text x="74.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">Transport Layer</tspan></text><text x="74.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">RDMA traffic and completions form the raw</tspan><tspan x="74.0" dy="15.0">event stream.</tspan></text><text x="78.0" y="498.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">queue pairs</tspan></text><text x="78.0" y="516.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">events</tspan></text></g><g class="flow-node"><rect x="400.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#47b475" stroke-width="1.6"/><rect x="418.0" y="402.0" width="96" height="24" rx="12" fill="#47b475" fill-opacity="0.14" stroke="#47b475" stroke-width="1"/><text x="466.0" y="418.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="466.0" dy="0">STAGE</tspan></text><text x="418.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Observer Core</tspan></text><text x="418.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">The observer aggregates and classifies</tspan><tspan x="418.0" dy="15.0">transport behavior into usable signals.</tspan></text><text x="422.0" y="498.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">aggregate</tspan></text><text x="422.0" y="516.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">classify</tspan></text></g><g class="flow-node"><rect x="744.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#47b475" stroke-width="1.6"/><rect x="762.0" y="402.0" width="96" height="24" rx="12" fill="#47b475" fill-opacity="0.14" stroke="#47b475" stroke-width="1"/><text x="810.0" y="418.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="810.0" dy="0">STAGE</tspan></text><text x="762.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Metrics Surface</tspan></text><text x="762.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Collected signals become dashboards,</tspan><tspan x="762.0" dy="15.0">alerts, and replayable traces.</tspan></text><text x="766.0" y="498.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="766.0" dy="0">metrics</tspan></text><text x="766.0" y="516.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="766.0" dy="0">alerts</tspan></text></g><g class="flow-node"><rect x="1088.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#47b475" stroke-width="1.6"/><rect x="1106.0" y="402.0" width="96" height="24" rx="12" fill="#47b475" fill-opacity="0.14" stroke="#47b475" stroke-width="1"/><text x="1154.0" y="418.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1154.0" dy="0">STAGE</tspan></text><text x="1106.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Control Plane</tspan></text><text x="1106.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Operators and automation act on the</tspan><tspan x="1106.0" dy="15.0">observed state with explicit policies.</tspan></text><text x="1110.0" y="498.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1110.0" dy="0">policy</tspan></text><text x="1110.0" y="516.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1110.0" dy="0">actions</tspan></text></g><g class="flow-node"><rect x="1432.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#79d79d" stroke-width="1.6"/><rect x="1450.0" y="402.0" width="96" height="24" rx="12" fill="#79d79d" fill-opacity="0.14" stroke="#79d79d" stroke-width="1"/><text x="1498.0" y="418.0" fill="#79d79d" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1498.0" dy="0">OUTCOME</tspan></text><text x="1450.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">Closed Loop</tspan></text><text x="1450.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">The system stays legible when observations</tspan><tspan x="1450.0" dy="15.0">and control actions stay connected.</tspan></text></g><g class="flow-connectors"><path d="M 336.0 454.0 C 368.0 454.0, 368.0 454.0, 392.0 454.0" stroke="#47b475" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="368.0" y="446.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">observe</tspan></text><path d="M 680.0 454.0 C 712.0 454.0, 712.0 454.0, 736.0 454.0" stroke="#47b475" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="712.0" y="446.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="712.0" dy="0">export</tspan></text><path d="M 1024.0 454.0 C 1056.0 454.0, 1056.0 454.0, 1080.0 454.0" stroke="#47b475" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="1056.0" y="446.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1056.0" dy="0">decide</tspan></text><path d="M 1368.0 454.0 C 1400.0 454.0, 1400.0 454.0, 1424.0 454.0" stroke="#47b475" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="1400.0" y="446.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1400.0" dy="0">adjust</tspan></text></g><rect x="56.0" y="748.0" width="1648.0" height="44" rx="14" fill="#192638" fill-opacity="0.92" stroke="#334155" stroke-width="1"/><text x="76.0" y="776.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Observer architectures are good training seeds because they join measurement, artifacts, and action.</tspan></text></svg>