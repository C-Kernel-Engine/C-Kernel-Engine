ize="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="716.0" dy="0">Matrix smoke failed for a model row or build artifact.</tspan></text><text x="720.0" y="538.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="720.0" dy="0">make v6.6-validate-matrix-smoke</tspan></text><text x="720.0" y="558.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="720.0" dy="0">Inspect model_matrix_report_latest.json</tspan></text></g><g class="decision-box"><rect x="1116.0" y="440.0" width="396.0" height="166.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#436486" stroke-width="1.4"/><text x="1140.0" y="480.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1140.0" dy="0">L3 / L4 fail?</tspan></text><text x="1140.0" y="506.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1140.0" dy="0">Parity matrix or long-decode gate failed.</tspan></text><text x="1144.0" y="538.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="1144.0" dy="0">make v6.6-validate-parity-matrix</tspan></text><text x="1144.0" y="558.0" fill="#8fdfff" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="1144.0" dy="0">make v6.6-validate-longdecode</tspan></text></g><g class="decision-box"><rect x="56.0" y="670.0" width="396.0" height="182.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#ffd66b" stroke-width="1.4"/><text x="80.0" y="710.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Contract Drift Branch</tspan></text><text x="80.0" y="736.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Compare changed script signatures, flags, and kernel</tspan><tspan x="80.0" dy="16.2">maps first.</tspan></text><text x="84.0" y="768.0" fill="#ffb400" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="84.0" dy="0">git diff version/v6.6/scripts</tspan></text><text x="84.0" y="788.0" fill="#ffb400" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="84.0" dy="0">git diff version/v6.6/kernel_maps</tspan></text></g><g class="decision-box"><rect x="480.0" y="670.0" width="396.0" height="182.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#ffd66b" stroke-width="1.4"/><text x="504.0" y="710.0" fill="#f3f7fc" font-size="20" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="504.0" dy="0">Model Row Failure Branch</tspan></text><text x="504.0" y="736.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="504.0" dy="0">Use the failing row note, then rerun the single model</tspan><tspan x="504.0" dy="16.2">command.</tspan></text><text x="508.0" y="768.0" fill="#ffb400" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="508.0" dy="0">validate_model_matrix_v6_6.py --with-smoke</tspan></text><text x="508.0" y="788.0" fill="#ffb400" font-size="12" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="508.0" dy="0">Check cache mismatch, smoke load, and build path</tspan></text></g><g class="decision-box"><rect x="904.0" y="670.0" width="396.0" height="182.0" rx="14" fill="#121b29" fill-opacity="0.92" stroke="#ffd66b" s