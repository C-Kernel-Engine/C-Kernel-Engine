<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ocean depth metaphor showing fast-changing surface tech and stable mathematical foundations">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2a3a"/>
      <stop offset="100%" stop-color="#0f151c"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#123a52"/>
      <stop offset="45%" stop-color="#0f2b3d"/>
      <stop offset="100%" stop-color="#0b1c26"/>
    </linearGradient>
    <linearGradient id="bedrock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1a16"/>
      <stop offset="100%" stop-color="#16120f"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="url(#sky)"/>
  <rect x="0" y="90" width="1200" height="430" fill="url(#ocean)"/>

  <!-- Surface waves -->
  <path d="M0,95 C80,70 160,120 240,95 C320,70 400,120 480,95 C560,70 640,120 720,95 C800,70 880,120 960,95 C1040,70 1120,120 1200,95 L1200,120 L0,120 Z"
        fill="#1b4a67" opacity="0.7"/>
  <path d="M0,105 C100,85 200,125 300,105 C400,85 500,125 600,105 C700,85 800,125 900,105 C1000,85 1100,125 1200,105 L1200,130 L0,130 Z"
        fill="#1d5675" opacity="0.6"/>

  <!-- Surface noise labels -->
  <text x="80" y="78" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">agents</text>
  <text x="165" y="70" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">subagents</text>
  <text x="260" y="82" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">prompts</text>
  <text x="345" y="70" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">contexts</text>
  <text x="430" y="84" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">memory</text>
  <text x="510" y="70" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">modes</text>
  <text x="580" y="84" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">permissions</text>
  <text x="700" y="70" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">tools</text>
  <text x="760" y="84" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">plugins</text>
  <text x="835" y="70" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">skills</text>
  <text x="900" y="84" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">hooks</text>
  <text x="955" y="70" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">MCP/LSP</text>
  <text x="1040" y="84" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">slash cmds</text>
  <text x="1125" y="70" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">workflows</text>
  <text x="1040" y="106" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#bfe8ff">IDE integrations</text>

  <!-- Depth bands -->
  <rect x="80" y="140" width="1040" height="70" rx="12" fill="#16384d" stroke="#2a4a62"/>
  <rect x="80" y="230" width="1040" height="80" rx="12" fill="#132f42" stroke="#244258"/>
  <rect x="80" y="330" width="1040" height="80" rx="12" fill="#102533" stroke="#1f374a"/>
  <rect x="80" y="430" width="1040" height="70" rx="12" fill="url(#bedrock)" stroke="#2b241c"/>

  <!-- Labels -->
  <text x="110" y="182" font-family="Inter, Segoe UI, Arial" font-size="18" fill="#d7ecff">
    Surface churn: model UX, toolchains, eval stacks (changes weekly)
  </text>
  <text x="110" y="276" font-family="Inter, Segoe UI, Arial" font-size="18" fill="#cfe1f1">
    Deep water: kernels, memory layouts, inference contracts (changes yearly)
  </text>
  <text x="110" y="376" font-family="Inter, Segoe UI, Arial" font-size="18" fill="#c7d6e4">
    Bedrock math: stable foundations that rarely change
  </text>

  <!-- Bedrock timeline -->
  <text x="110" y="468" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#e6d6c7">
    Calculus (1665–1687) · Matrix theory / linear algebra (1848–1858) · AI field (1956) · Backprop (1986)
  </text>

  <!-- Accent marks -->
  <circle cx="1040" cy="175" r="6" fill="#6bd1ff" filter="url(#soft)"/>
  <circle cx="1020" cy="265" r="5" fill="#7bdcff" filter="url(#soft)"/>
  <circle cx="1060" cy="360" r="4" fill="#9adfff" filter="url(#soft)"/>
</svg>
