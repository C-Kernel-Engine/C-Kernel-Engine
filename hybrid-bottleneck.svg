<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Inter', sans-serif; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#232323"/>

  <text x="600" y="45" font-size="28" font-weight="700" fill="#ffb400" text-anchor="middle">
    The Hybrid CPU+GPU Trap
  </text>
  <text x="600" y="70" font-size="14" fill="#707070" text-anchor="middle">
    Why "Best of Both Worlds" Often Means Worst of Both
  </text>

  <g transform="translate(80, 120)">
    <rect width="480" height="520" rx="8" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="30" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
      CPU Component
    </text>

    <rect x="60" y="80" width="160" height="140" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
    <text x="140" y="115" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      CPU
    </text>
    <text x="140" y="140" font-size="10" fill="#a0a0a0" text-anchor="middle">
      Holds Model
    </text>
    <text x="140" y="165" font-size="10" fill="#a0a0a0" text-anchor="middle">
      4TB Memory
    </text>
    <text x="140" y="190" font-size="10" fill="#47b475" text-anchor="middle">
      Model Fits!
    </text>

    <rect x="250" y="130" width="90" height="40" rx="4" fill="#2a2a2a" stroke="#ffb400" stroke-width="1.5"/>
    <text x="295" y="153" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      Transfer
    </text>
    <text x="295" y="170" font-size="9" fill="#a0a0a0" text-anchor="middle">
      100 GB/s
    </text>

    <rect x="360" y="80" width="160" height="140" rx="6" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2"/>
    <text x="440" y="115" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      GPU
    </text>
    <text x="440" y="140" font-size="10" fill="#a0a0a0" text-anchor="middle">
      Fast Compute
    </text>
    <text x="440" y="165" font-size="10" fill="#a0a0a0" text-anchor="middle">
      1000 GFLOPS
    </text>
    <text x="440" y="190" font-size="10" fill="#ff6b6b" text-anchor="middle">
      GPU Waits!
    </text>

    <rect x="50" y="310" width="380" height="80" rx="6" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="345" font-size="18" font-weight="600" fill="#ff6b6b" text-anchor="middle">
      BOTTLENECK: Transfer Rate
    </text>
    <text x="240" y="370" font-size="11" fill="#a0a0a0" text-anchor="middle">
      GPU idle waiting for data from CPU
    </text>
  </g>

  <g transform="translate(640, 120)">
    <rect width="480" height="520" rx="8" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="30" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
      CPU-Only Solution
    </text>

    <rect x="60" y="80" width="360" height="140" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
    <text x="240" y="115" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      CPU Cluster
    </text>
    <text x="240" y="140" font-size="10" fill="#a0a0a0" text-anchor="middle">
      Compute + Memory in One
    </text>
    <text x="240" y="165" font-size="10" fill="#a0a0a0" text-anchor="middle">
      4TB RAM per Node
    </text>
    <text x="240" y="190" font-size="10" fill="#47b475" text-anchor="middle">
      No Transfer Bottleneck!
    </text>

    <rect x="60" y="270" width="360" height="70" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="305" font-size="18" font-weight="600" fill="#47b475" text-anchor="middle">
      SIMPLE & FAST
    </text>
    <text x="240" y="330" font-size="11" fill="#a0a0a0" text-anchor="middle">
      No data movement needed
    </text>

    <rect x="50" y="410" width="380" height="80" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="445" font-size="18" font-weight="600" fill="#47b475" text-anchor="middle">
      NO BOTTLENECK
    </text>
    <text x="240" y="470" font-size="11" fill="#a0a0a0" text-anchor="middle">
      Everything stays in memory
    </text>
  </g>

  <rect x="150" y="730" width="900" height="50" rx="6" fill="#2a2a2a" stroke="#ffb400" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="760" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
    Hybrid = "As fast as CPU" + Double complexity + Double cost
  </text>
</svg>
