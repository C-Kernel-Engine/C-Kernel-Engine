<svg width="1280" height="920" viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3ede3"/><stop offset="100%" stop-color="#fbf7f0"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fffaf2"/><stop offset="100%" stop-color="#f8efe0"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(23,33,43,0.14)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter></defs><rect x="0" y="0" width="1280" height="920" fill="url(#bgGrad)"/><g opacity="0.9"><line x1="0" y1="0" x2="0" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="64" y1="0" x2="64" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="128" y1="0" x2="128" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="192" y1="0" x2="192" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="256" y1="0" x2="256" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="320" y1="0" x2="320" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="384" y1="0" x2="384" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="448" y1="0" x2="448" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="512" y1="0" x2="512" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="576" y1="0" x2="576" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="640" y1="0" x2="640" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="704" y1="0" x2="704" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="768" y1="0" x2="768" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="832" y1="0" x2="832" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="896" y1="0" x2="896" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1024" y1="0" x2="1024" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1088" y1="0" x2="1088" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1152" y1="0" x2="1152" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1216" y1="0" x2="1216" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1280" y1="0" x2="1280" y2="920" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="0" x2="1280" y2="0" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="64" x2="1280" y2="64" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="128" x2="1280" y2="128" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="192" x2="1280" y2="192" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="256" x2="1280" y2="256" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="320" x2="1280" y2="320" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="384" x2="1280" y2="384" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="448" x2="1280" y2="448" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="512" x2="1280" y2="512" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="576" x2="1280" y2="576" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="640" x2="1280" y2="640" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="704" x2="1280" y2="704" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="768" x2="1280" y2="768" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="832" x2="1280" y2="832" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="896" x2="1280" y2="896" stroke="rgba(114,95,72,0.10)" stroke-width="1"/></g><rect x="56.0" y="56.0" width="1168.0" height="132" rx="26" fill="#fffaf2" fill-opacity="0.18" stroke="#d8c7ad" stroke-width="1.2"/><rect x="78.0" y="74.0" width="240" height="9" rx="4.5" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="82.0" y="102.0" fill="#ffb400" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Learning Loop</tspan></text><text x="82.0" y="140.0" fill="#17212b" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Iteration Philosophy</tspan></text><text x="82.0" y="172.0" fill="#64748b" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Use experiments to expose the bottleneck, then promote the lesson into the contract instead of</tspan><tspan x="82.0" dy="18.8">endlessly patching symptoms.</tspan></text><rect x="56.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="56.0" y="212.0" width="8" height="226.0" rx="4" fill="#ffb400"/><rect x="78.0" y="232.0" width="527.0" height="28" rx="14" fill="#ffb400" fill-opacity="0.11" stroke="#ffb400" stroke-width="1"/><text x="88.0" y="251.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="88.0" dy="0">Diagnosis phase</tspan></text><text x="86.0" y="284.0" fill="#17212b" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="86.0" dy="0">Narrow experiments are valuable when they</tspan><tspan x="86.0" dy="16.2">teach you what the representation or</tspan><tspan x="86.0" dy="16.2">curriculum is missing.</tspan></text><circle cx="92.0" cy="320.0" r="5" fill="#ffb400"/><text x="106.0" y="324.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Probe one failure</tspan></text><circle cx="92.0" cy="348.0" r="5" fill="#ffb400"/><text x="106.0" y="352.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Learn one constraint</tspan></text><circle cx="92.0" cy="376.0" r="5" fill="#ffb400"/><text x="106.0" y="380.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Do not overfit the patch</tspan></text><rect x="653.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="653.0" y="212.0" width="8" height="226.0" rx="4" fill="#ffd66b"/><rect x="675.0" y="232.0" width="527.0" height="28" rx="14" fill="#ffd66b" fill-opacity="0.11" stroke="#ffd66b" stroke-width="1"/><text x="685.0" y="251.0" fill="#ffd66b" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="685.0" dy="0">Scaling phase</tspan></text><text x="683.0" y="284.0" fill="#17212b" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="683.0" dy="0">Once the lesson is stable, fold it into the</tspan><tspan x="683.0" dy="16.2">broader contract and train on the larger</tspan><tspan x="683.0" dy="16.2">coherent surface.</tspan></text><circle cx="689.0" cy="320.0" r="5" fill="#ffd66b"/><text x="703.0" y="324.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Freeze the contract</tspan></text><circle cx="689.0" cy="348.0" r="5" fill="#ffd66b"/><text x="703.0" y="352.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Scale the clean corpus</tspan></text><circle cx="689.0" cy="376.0" r="5" fill="#ffd66b"/><text x="703.0" y="380.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Harden the eval</tspan></text><rect x="56.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="482.0" width="336.0" height="24" rx="12" fill="#ffb400" fill-opacity="0.10"/><text x="84.0" y="500.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="84.0" dy="0">Loop</tspan></text><text x="80.0" y="534.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Experiment as sensor</tspan></text><text x="80.0" y="564.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Small runs are most useful when</tspan><tspan x="80.0" dy="15.0">they classify the bottleneck</tspan><tspan x="80.0" dy="15.0">instead of pretending to be the</tspan><tspan x="80.0" dy="15.0">final recipe.</tspan></text><circle cx="84.0" cy="600.0" r="4.5" fill="#ffb400"/><text x="98.0" y="604.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Find pressure points</tspan></text><circle cx="84.0" cy="624.0" r="4.5" fill="#ffb400"/><text x="98.0" y="628.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Tag the miss class</tspan></text><circle cx="84.0" cy="648.0" r="4.5" fill="#ffb400"/><text x="98.0" y="652.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Export the lesson</tspan></text><line x1="80.0" y1="646.0" x2="404.0" y2="646.0" stroke="#d8c7ad" stroke-width="1"/><text x="80.0" y="670.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">A rung is a sensor, not a</tspan><tspan x="80.0" dy="12.5">home.</tspan></text><rect x="454.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="472.0" y="482.0" width="336.0" height="24" rx="12" fill="#47b475" fill-opacity="0.10"/><text x="482.0" y="500.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="482.0" dy="0">Loop</tspan></text><text x="478.0" y="534.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Promote the lesson</tspan></text><text x="478.0" y="564.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">The winning move is not endless</tspan><tspan x="478.0" dy="15.0">correction but a better contract,</tspan><tspan x="478.0" dy="15.0">better labels, and broader clean</tspan><tspan x="478.0" dy="15.0">data.</tspan></text><circle cx="482.0" cy="600.0" r="4.5" fill="#47b475"/><text x="496.0" y="604.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Rewrite the curriculum</tspan></text><circle cx="482.0" cy="624.0" r="4.5" fill="#47b475"/><text x="496.0" y="628.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Improve the DSL</tspan></text><circle cx="482.0" cy="648.0" r="4.5" fill="#47b475"/><text x="496.0" y="652.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Carry the supervision</tspan><tspan x="496.0" dy="13.8">forward</tspan></text><line x1="478.0" y1="646.0" x2="802.0" y2="646.0" stroke="#d8c7ad" stroke-width="1"/><text x="478.0" y="670.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Good experiments become</tspan><tspan x="478.0" dy="12.5">policy.</tspan></text><rect x="852.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="870.0" y="482.0" width="336.0" height="24" rx="12" fill="#56aefc" fill-opacity="0.10"/><text x="880.0" y="500.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="880.0" dy="0">Loop</tspan></text><text x="876.0" y="534.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Measure again</tspan></text><text x="876.0" y="564.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Harder evaluation keeps the</tspan><tspan x="876.0" dy="15.0">program honest once the surface is</tspan><tspan x="876.0" dy="15.0">easy to memorize.</tspan></text><circle cx="880.0" cy="600.0" r="4.5" fill="#56aefc"/><text x="894.0" y="604.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Hold out recombinations</tspan></text><circle cx="880.0" cy="624.0" r="4.5" fill="#56aefc"/><text x="894.0" y="628.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Test composition</tspan></text><circle cx="880.0" cy="648.0" r="4.5" fill="#56aefc"/><text x="894.0" y="652.0" fill="#17212b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Separate fit from</tspan><tspan x="894.0" dy="13.8">generalization</tspan></text><line x1="876.0" y1="646.0" x2="1200.0" y2="646.0" stroke="#d8c7ad" stroke-width="1"/><text x="876.0" y="670.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">A saturated easy probe tells</tspan><tspan x="876.0" dy="12.5">you to upgrade the question.</tspan></text><rect x="56.0" y="714.0" width="1168.0" height="104.0" rx="24" fill="#ffb400" fill-opacity="0.08" stroke="#ffb400" stroke-width="1.2"/><text x="80.0" y="744.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Key takeaway</tspan></text><circle cx="80.0" cy="765.0" r="5" fill="#ffb400"/><text x="94.0" y="770.0" fill="#17212b" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="94.0" dy="0">Spec work taught the</tspan><tspan x="94.0" dy="13.8">constraints.</tspan></text><circle cx="453.3" cy="765.0" r="5" fill="#ffb400"/><text x="467.3" y="770.0" fill="#17212b" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="467.3" dy="0">Gen work should teach</tspan><tspan x="467.3" dy="13.8">composition.</tspan></text><circle cx="826.7" cy="765.0" r="5" fill="#ffb400"/><text x="840.7" y="770.0" fill="#17212b" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="840.7" dy="0">Iteration only matters if</tspan><tspan x="840.7" dy="13.8">the contract gets</tspan><tspan x="840.7" dy="13.8">stronger.</tspan></text><text x="1200.0" y="798.0" fill="#64748b" font-size="10" font-weight="700" text-anchor="end" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1200.0" dy="0">iteration_philosophy</tspan></text></svg>