<svg width="1760" height="820" viewBox="0 0 1760 820" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter><marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 z" fill="#ffb400"/></marker></defs><rect x="0" y="0" width="1760" height="820" fill="url(#bgGrad)"/><g opacity="0.20"><circle cx="1443.2" cy="164.0" r="180" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="2"/><circle cx="1443.2" cy="164.0" r="250" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="1.5"/><circle cx="246.4" cy="672.4" r="120" fill="none" stroke="#ffb400" stroke-width="2"/></g><rect x="56.0" y="56.0" width="1648.0" height="112" rx="22" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="74.0" y="72.0" width="220" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="130.0" fill="#f3f7fc" font-size="30" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">IR Kernel Registry Chain</tspan></text><text x="80.0" y="160.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">The registry chain connects high-level intent to concrete kernel implementations and</tspan><tspan x="80.0" dy="18.8">their callable metadata.</tspan></text><g class="flow-node"><rect x="56.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#ffb400" stroke-width="1.6"/><rect x="74.0" y="402.0" width="96" height="24" rx="12" fill="#ffb400" fill-opacity="0.14" stroke="#ffb400" stroke-width="1"/><text x="122.0" y="418.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="122.0" dy="0">STAGE</tspan></text><text x="74.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">IR Intent</tspan></text><text x="74.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">Operations arrive with semantic intent,</tspan><tspan x="74.0" dy="15.0">data type, and shape requirements.</tspan></text><text x="78.0" y="498.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">op</tspan></text><text x="78.0" y="516.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">dtype</tspan></text></g><g class="flow-node"><rect x="400.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#ffb400" stroke-width="1.6"/><rect x="418.0" y="402.0" width="96" height="24" rx="12" fill="#ffb400" fill-opacity="0.14" stroke="#ffb400" stroke-width="1"/><text x="466.0" y="418.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="466.0" dy="0">STAGE</tspan></text><text x="418.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Registry Match</tspan></text><text x="418.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Lookup resolves those requirements against</tspan><tspan x="418.0" dy="15.0">known kernel families and variants.</tspan></text><text x="422.0" y="498.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">registry</tspan></text><text x="422.0" y="516.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">variants</tspan></text></g><g class="flow-node"><rect x="744.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#ffb400" stroke-width="1.6"/><rect x="762.0" y="402.0" width="96" height="24" rx="12" fill="#ffb400" fill-opacity="0.14" stroke="#ffb400" stroke-width="1"/><text x="810.0" y="418.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="810.0" dy="0">STAGE</tspan></text><text x="762.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Kernel Binding</tspan></text><text x="762.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Resolved kernels receive concrete argument</tspan><tspan x="762.0" dy="15.0">bindings and runtime-facing metadata.</tspan></text><text x="766.0" y="498.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="766.0" dy="0">bindings</tspan></text><text x="766.0" y="516.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="766.0" dy="0">args</tspan></text></g><g class="flow-node"><rect x="1088.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#ffb400" stroke-width="1.6"/><rect x="1106.0" y="402.0" width="96" height="24" rx="12" fill="#ffb400" fill-opacity="0.14" stroke="#ffb400" stroke-width="1"/><text x="1154.0" y="418.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1154.0" dy="0">STAGE</tspan></text><text x="1106.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Runtime Call</tspan></text><text x="1106.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">The runtime invokes one selected</tspan><tspan x="1106.0" dy="15.0">implementation with explicit dispatch</tspan><tspan x="1106.0" dy="15.0">context.</tspan></text><text x="1110.0" y="498.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1110.0" dy="0">dispatch</tspan></text><text x="1110.0" y="516.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1110.0" dy="0">invoke</tspan></text></g><g class="flow-node"><rect x="1432.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#121b29" fill-opacity="0.94" stroke="#ffd66b" stroke-width="1.6"/><rect x="1450.0" y="402.0" width="96" height="24" rx="12" fill="#ffd66b" fill-opacity="0.14" stroke="#ffd66b" stroke-width="1"/><text x="1498.0" y="418.0" fill="#ffd66b" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1498.0" dy="0">OUTCOME</tspan></text><text x="1450.0" y="444.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">Traceable Dispatch</tspan></text><text x="1450.0" y="470.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">The chain works when each dispatch step</tspan><tspan x="1450.0" dy="15.0">remains inspectable end to end.</tspan></text></g><g class="flow-connectors"><path d="M 336.0 454.0 C 368.0 454.0, 368.0 454.0, 392.0 454.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="368.0" y="446.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">lookup</tspan></text><path d="M 680.0 454.0 C 712.0 454.0, 712.0 454.0, 736.0 454.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="712.0" y="446.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="712.0" dy="0">select</tspan></text><path d="M 1024.0 454.0 C 1056.0 454.0, 1056.0 454.0, 1080.0 454.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="1056.0" y="446.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1056.0" dy="0">bind</tspan></text><path d="M 1368.0 454.0 C 1400.0 454.0, 1400.0 454.0, 1424.0 454.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="1400.0" y="446.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1400.0" dy="0">execute</tspan></text></g><rect x="56.0" y="748.0" width="1648.0" height="44" rx="14" fill="#192638" fill-opacity="0.92" stroke="#334155" stroke-width="1"/><text x="76.0" y="776.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Registry-chain assets should teach how intent becomes runnable code, not just that a registry exists.</tspan></text></svg>