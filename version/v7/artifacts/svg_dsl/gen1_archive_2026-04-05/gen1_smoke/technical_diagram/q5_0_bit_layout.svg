<svg width="1760" height="1060" viewBox="0 0 1760 1060" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3ede3"/><stop offset="100%" stop-color="#fbf7f0"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fffaf2"/><stop offset="100%" stop-color="#f8efe0"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(23,33,43,0.14)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter><marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 z" fill="#ffb400"/></marker></defs><rect x="0" y="0" width="1760" height="1060" fill="url(#bgGrad)"/><g opacity="0.24"><circle cx="316.8" cy="254.4" r="180" fill="#ffefbf"/><circle cx="1548.8" cy="190.8" r="140" fill="#ffefbf"/><circle cx="1196.8" cy="890.4" r="220" fill="#ffd66b" opacity="0.20"/></g><rect x="56.0" y="56.0" width="1648.0" height="118" rx="22" fill="#fffaf2" fill-opacity="0.18" stroke="#d8c7ad" stroke-width="1.2"/><rect x="74.0" y="72.0" width="240" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="120.0" fill="#17212b" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Q5 0 Bit Layout</tspan></text><text x="80.0" y="158.0" fill="#64748b" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Bit-layout explainers should connect the stored representation to the recovered numeric</tspan><tspan x="80.0" dy="18.8">path.</tspan></text><g class="technical-node"><rect x="56.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="117.0" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="117.0" dy="0">STEP 1</tspan></text><text x="76.0" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Source Values</tspan></text><text x="76.0" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Q5 0 Bit Layout starts from packed</tspan><tspan x="76.0" dy="15.0">or full-precision source values</tspan><tspan x="76.0" dy="15.0">that define the numeric contract.</tspan></text><text x="80.0" y="330.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">bit lanes</tspan></text><text x="80.0" y="348.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">decode order</tspan></text></g><g class="technical-node"><rect x="474.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="492.5" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="535.5" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="535.5" dy="0">STEP 2</tspan></text><text x="494.5" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">Packing Rule</tspan></text><text x="494.5" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">The central rule decides which</tspan><tspan x="494.5" dy="15.0">bits survive and how dropped</tspan><tspan x="494.5" dy="15.0">detail is accounted for in q5 0</tspan><tspan x="494.5" dy="15.0">bit layout.</tspan></text><text x="498.5" y="330.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">decode order</tspan></text><text x="498.5" y="348.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">scale</tspan></text></g><g class="technical-node"><rect x="893.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="911.0" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="954.0" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="954.0" dy="0">STEP 3</tspan></text><text x="913.0" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Block Layout</tspan></text><text x="913.0" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Storage layout turns that rule</tspan><tspan x="913.0" dy="15.0">into a concrete block or lane</tspan><tspan x="913.0" dy="15.0">shape the runtime can consume.</tspan></text><text x="917.0" y="330.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">bit lanes</tspan></text><text x="917.0" y="348.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">scale</tspan></text></g><g class="technical-node"><rect x="1311.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="1329.5" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="1372.5" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1372.5" dy="0">STEP 4</tspan></text><text x="1331.5" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">Runtime Decode</tspan></text><text x="1331.5" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">The final behavior depends on</tspan><tspan x="1331.5" dy="15.0">decode order, scale recovery, and</tspan><tspan x="1331.5" dy="15.0">the remaining error envelope.</tspan></text><text x="1335.5" y="330.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">decode path</tspan></text><text x="1335.5" y="348.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">runtime value</tspan></text></g><g class="technical-connectors"><path d="M 430.5 297.0 C 461.5 297.0, 461.5 297.0, 492.5 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 849.0 297.0 C 880.0 297.0, 880.0 297.0, 911.0 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 1267.5 297.0 C 1298.5 297.0, 1298.5 297.0, 1329.5 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/></g><g class="formula-strip"><rect x="56.0" y="416.0" width="1648.0" height="132.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="78.0" y="450.0" fill="#17212b" font-size="17" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">Technical Rule</tspan></text><text x="78.0" y="484.0" fill="#ffb400" font-size="14" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="78.0" dy="0">q5_0 bits -&gt; decode -&gt; float value</tspan></text><text x="78.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">bit lanes</tspan></text><text x="368.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">decode order</tspan></text><text x="658.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="658.0" dy="0">scale</tspan></text></g><g class="artifact-panel"><rect x="56.0" y="574.0" width="811.0" height="196.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="76.0" y="608.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Structure View</tspan></text><text x="76.0" y="634.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Show the concrete packed structure the</tspan><tspan x="76.0" dy="15.0">runtime reads for q5 0 bit layout.</tspan></text><text x="80.0" y="678.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">bit grouping</tspan></text><text x="80.0" y="696.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">scale metadata</tspan></text></g><g class="artifact-panel"><rect x="893.0" y="574.0" width="811.0" height="196.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="913.0" y="608.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Runtime Effect</tspan></text><text x="913.0" y="634.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Explain the throughput, precision, or</tspan><tspan x="913.0" dy="15.0">memory consequence of the chosen layout.</tspan></text><text x="917.0" y="678.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">error tradeoff</tspan></text><text x="917.0" y="696.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">runtime contract</tspan></text></g><g class="footer-note"><rect x="56.0" y="974.0" width="1648.0" height="48" rx="16" fill="#f8efe0" fill-opacity="0.94" stroke="#d8c7ad" stroke-width="1"/><text x="76.0" y="1003.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Q5 0 Bit Layout belongs in the broader contract because the model needs dense technical layouts, not only charts and posters.</tspan></text></g></svg>