<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Operator spectrum map for data and computation flow">
  <defs>
    <linearGradient id="railGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="75%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#323232"/>
      <stop offset="55%" stop-color="#30343b"/>
      <stop offset="100%" stop-color="#2d3538"/>
    </linearGradient>
    <radialGradient id="bgGold" cx="12%" cy="0%" r="42%">
      <stop offset="0%" stop-color="#ffb400" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffb400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgBlue" cx="90%" cy="15%" r="44%">
      <stop offset="0%" stop-color="#07adf8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#07adf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="railGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#f59e0b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="12" fill="url(#bgBase)"/>
  <rect x="0" y="0" width="1200" height="360" rx="12" fill="url(#bgGold)"/>
  <rect x="0" y="0" width="1200" height="360" rx="12" fill="url(#bgBlue)"/>
  <rect x="8" y="8" width="1184" height="344" rx="14" fill="rgba(10,14,20,0.40)" stroke="#4b5563"/>

  <text x="32" y="42" fill="#f8fafc" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Data + Computation Spectrum</text>
  <text x="32" y="62" fill="#cbd5e1" font-size="11" font-family="Segoe UI, Arial, sans-serif">Thin progression rails with stage points for operator-level navigation.</text>

  <text x="32" y="106" fill="#f8fafc" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Data Spectrum</text>
  <path d="M250 120 C306 108,364 132,420 120 C476 108,534 132,590 120 C646 108,704 132,760 120 C816 108,874 132,930 120 C986 108,1044 132,1100 120" fill="none" stroke="#4b5563" stroke-width="1.6"/>
  <path d="M250 120 C306 108,364 132,420 120 C476 108,534 132,590 120 C646 108,704 132,760 120 C816 108,874 132,930 120 C986 108,1044 132,1100 120" fill="none" stroke="url(#railGrad)" stroke-width="1.6" filter="url(#railGlow)"/>

  <g fill="#111827" stroke="#fbbf24" stroke-width="1.8">
    <circle cx="250" cy="120" r="8"/><circle cx="420" cy="120" r="8"/><circle cx="590" cy="120" r="8"/>
    <circle cx="760" cy="120" r="8"/><circle cx="930" cy="120" r="8"/><circle cx="1100" cy="120" r="8"/>
  </g>
  <g fill="#fbbf24" stroke="none">
    <circle cx="250" cy="120" r="2.2"/><circle cx="420" cy="120" r="2.2"/><circle cx="590" cy="120" r="2.2"/>
    <circle cx="760" cy="120" r="2.2"/><circle cx="930" cy="120" r="2.2"/><circle cx="1100" cy="120" r="2.2"/>
  </g>
  <g fill="#e5e7eb" font-size="11" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="250" y="104">Pretrain</text><text x="420" y="104">Midtrain</text><text x="590" y="104">SFT</text>
    <text x="760" y="104">DPO</text><text x="930" y="104">RLHF</text><text x="1100" y="104">RLHF + GRPO</text>
  </g>
  <g fill="#94a3b8" font-size="10" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="250" y="143">stage-a</text><text x="420" y="143">stage-b</text><text x="590" y="143">instruction</text>
    <text x="760" y="143">preference</text><text x="930" y="143">reward</text><text x="1100" y="143">policy-loop</text>
  </g>

  <text x="32" y="230" fill="#f8fafc" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Computation Spectrum</text>
  <path d="M250 245 C306 233,364 257,420 245 C476 233,534 257,590 245 C646 233,704 257,760 245 C816 233,874 257,930 245 C986 233,1044 257,1100 245" fill="none" stroke="#4b5563" stroke-width="1.6"/>
  <path d="M250 245 C306 233,364 257,420 245 C476 233,534 257,590 245 C646 233,704 257,760 245 C816 233,874 257,930 245 C986 233,1044 257,1100 245" fill="none" stroke="url(#railGrad)" stroke-width="1.6" filter="url(#railGlow)"/>

  <g fill="#111827" stroke="#fbbf24" stroke-width="1.8">
    <circle cx="250" cy="245" r="8"/><circle cx="420" cy="245" r="8"/><circle cx="590" cy="245" r="8"/>
    <circle cx="760" cy="245" r="8"/><circle cx="930" cy="245" r="8"/><circle cx="1100" cy="245" r="8"/>
  </g>
  <g fill="#fbbf24" stroke="none">
    <circle cx="250" cy="245" r="2.2"/><circle cx="420" cy="245" r="2.2"/><circle cx="590" cy="245" r="2.2"/>
    <circle cx="760" cy="245" r="2.2"/><circle cx="930" cy="245" r="2.2"/><circle cx="1100" cy="245" r="2.2"/>
  </g>
  <g stroke="#cbd5e1" stroke-width="1.1" fill="none" opacity="0.88" stroke-linecap="round" stroke-linejoin="round">
    <line x1="245" y1="214" x2="255" y2="214"/><line x1="250" y1="209" x2="250" y2="219"/><line x1="246.5" y1="210.5" x2="253.5" y2="217.5"/>
    <line x1="414" y1="210" x2="426" y2="210"/><line x1="414" y1="214" x2="426" y2="214"/><line x1="414" y1="218" x2="426" y2="218"/>
    <circle cx="585" cy="211" r="1.6"/><circle cx="595" cy="214" r="1.6"/><circle cx="585" cy="217" r="1.6"/><line x1="586.6" y1="211.8" x2="593.4" y2="213.2"/><line x1="586.6" y1="216.2" x2="593.4" y2="214.8"/>
    <polyline points="754,209 749,214 754,219"/><line x1="757" y1="220" x2="763" y2="208"/><polyline points="766,209 771,214 766,219"/>
    <rect x="925" y="208.5" width="10" height="10" rx="1.6"/><polyline points="927.5,214 930,216.5 933.5,211.5"/>
    <line x1="1094" y1="214" x2="1106" y2="214"/><polyline points="1102,210 1106,214 1102,218"/><line x1="1096" y1="218" x2="1100" y2="210"/>
  </g>
  <g fill="#e5e7eb" font-size="11" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="250" y="229">Math</text><text x="420" y="229">Kernels + Quant</text><text x="590" y="229">Train IR1/IR2</text>
    <text x="760" y="229">Codegen</text><text x="930" y="229">Parity + Tests</text><text x="1100" y="229">Deploy</text>
  </g>
  <g fill="#94a3b8" font-size="10" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="250" y="268">equations</text><text x="420" y="268">ops + quant</text><text x="590" y="268">train graph</text>
    <text x="760" y="268">runtime emit</text><text x="930" y="268">llama.cpp + pytorch</text><text x="1100" y="268">inference + backprop</text>
  </g>

  <line x1="1100" y1="128" x2="1100" y2="237" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="1120" y="184" fill="#cbd5e1" font-size="10" font-family="Segoe UI, Arial, sans-serif">handoff</text>

  <text x="32" y="307" fill="#e2e8f0" font-size="11" font-family="Segoe UI, Arial, sans-serif">Operator loop: dataset gates -> tokenizer fidelity -> train IR -> codegen -> parity/tests -> deploy -> iterate.</text>
  <text x="32" y="327" fill="#94a3b8" font-size="10" font-family="Segoe UI, Arial, sans-serif">Use this map as a control plane: left is foundations, right is deployment-quality behavior.</text>
</svg>
