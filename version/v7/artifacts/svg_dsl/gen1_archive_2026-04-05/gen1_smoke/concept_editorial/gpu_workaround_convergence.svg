<svg width="1280" height="920" viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter></defs><rect x="0" y="0" width="1280" height="920" fill="url(#bgGrad)"/><g opacity="0.24"><circle cx="230.4" cy="220.8" r="180" fill="#ffefbf"/><circle cx="1126.4" cy="165.6" r="140" fill="#ffefbf"/><circle cx="870.4" cy="772.8" r="220" fill="#ffd66b" opacity="0.20"/></g><rect x="56.0" y="56.0" width="1168.0" height="132" rx="26" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="78.0" y="74.0" width="240" height="9" rx="4.5" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="82.0" y="102.0" fill="#ffb400" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Systems Tradeoffs</tspan></text><text x="82.0" y="140.0" fill="#f3f7fc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">GPU Workaround Convergence</tspan></text><text x="82.0" y="172.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Many GPU workarounds eventually converge on the same truth: memory layout and movement dominate</tspan><tspan x="82.0" dy="18.8">the user-visible outcome.</tspan></text><rect x="56.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="56.0" y="212.0" width="8" height="226.0" rx="4" fill="#ffb400"/><rect x="78.0" y="232.0" width="527.0" height="28" rx="14" fill="#ffb400" fill-opacity="0.11" stroke="#ffb400" stroke-width="1"/><text x="88.0" y="251.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="88.0" dy="0">Workaround stack</tspan></text><text x="86.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="86.0" dy="0">Sharding, offload, and fragmentation</tspan><tspan x="86.0" dy="16.2">controls can buy time, but they add</tspan><tspan x="86.0" dy="16.2">orchestration cost and fragility.</tspan></text><circle cx="92.0" cy="320.0" r="5" fill="#ffb400"/><text x="106.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Shard more aggressively</tspan></text><circle cx="92.0" cy="348.0" r="5" fill="#ffb400"/><text x="106.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Offload to host</tspan></text><circle cx="92.0" cy="376.0" r="5" fill="#ffb400"/><text x="106.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Accept more coordination</tspan></text><rect x="653.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="653.0" y="212.0" width="8" height="226.0" rx="4" fill="#ffd66b"/><rect x="675.0" y="232.0" width="527.0" height="28" rx="14" fill="#ffd66b" fill-opacity="0.11" stroke="#ffd66b" stroke-width="1"/><text x="685.0" y="251.0" fill="#ffd66b" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="685.0" dy="0">Convergence point</tspan></text><text x="683.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="683.0" dy="0">Eventually the program wants a simpler</tspan><tspan x="683.0" dy="16.2">memory story, not one more orchestration</tspan><tspan x="683.0" dy="16.2">layer around the same limit.</tspan></text><circle cx="689.0" cy="320.0" r="5" fill="#ffd66b"/><text x="703.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Bandwidth stays finite</tspan></text><circle cx="689.0" cy="348.0" r="5" fill="#ffd66b"/><text x="703.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Cache churn stays visible</tspan></text><circle cx="689.0" cy="376.0" r="5" fill="#ffd66b"/><text x="703.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Complexity compounds</tspan></text><rect x="56.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="482.0" width="336.0" height="24" rx="12" fill="#ffb400" fill-opacity="0.10"/><text x="84.0" y="500.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="84.0" dy="0">Pattern</tspan></text><text x="80.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Patch stack</tspan></text><text x="80.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Short-term GPU fixes often accrete</tspan><tspan x="80.0" dy="15.0">as a stack of shims around the</tspan><tspan x="80.0" dy="15.0">original bottleneck.</tspan></text><circle cx="84.0" cy="600.0" r="4.5" fill="#ffb400"/><text x="98.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Offload</tspan></text><circle cx="84.0" cy="624.0" r="4.5" fill="#ffb400"/><text x="98.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Shard</tspan></text><circle cx="84.0" cy="648.0" r="4.5" fill="#ffb400"/><text x="98.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Repack</tspan></text><line x1="80.0" y1="646.0" x2="404.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="80.0" y="670.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Patches can hide the real</tspan><tspan x="80.0" dy="12.5">shape.</tspan></text><rect x="454.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="472.0" y="482.0" width="336.0" height="24" rx="12" fill="#47b475" fill-opacity="0.10"/><text x="482.0" y="500.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="482.0" dy="0">Signal</tspan></text><text x="478.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Memory remains first</tspan></text><text x="478.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">When every workaround fights</tspan><tspan x="478.0" dy="15.0">placement and movement, that is</tspan><tspan x="478.0" dy="15.0">the message, not an implementation</tspan><tspan x="478.0" dy="15.0">detail.</tspan></text><circle cx="482.0" cy="600.0" r="4.5" fill="#47b475"/><text x="496.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Placement matters</tspan></text><circle cx="482.0" cy="624.0" r="4.5" fill="#47b475"/><text x="496.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Transport matters</tspan></text><circle cx="482.0" cy="648.0" r="4.5" fill="#47b475"/><text x="496.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Cost shows up in latency</tspan></text><line x1="478.0" y1="646.0" x2="802.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="478.0" y="670.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">The system keeps telling the</tspan><tspan x="478.0" dy="12.5">same story.</tspan></text><rect x="852.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="870.0" y="482.0" width="336.0" height="24" rx="12" fill="#56aefc" fill-opacity="0.10"/><text x="880.0" y="500.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="880.0" dy="0">Decision</tspan></text><text x="876.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Choose the cleaner path</tspan></text><text x="876.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Prefer the design that simplifies</tspan><tspan x="876.0" dy="15.0">the memory narrative instead of</tspan><tspan x="876.0" dy="15.0">extending workaround depth</tspan><tspan x="876.0" dy="15.0">forever.</tspan></text><circle cx="880.0" cy="600.0" r="4.5" fill="#56aefc"/><text x="894.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Fewer moving parts</tspan></text><circle cx="880.0" cy="624.0" r="4.5" fill="#56aefc"/><text x="894.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Cleaner debugging</tspan></text><circle cx="880.0" cy="648.0" r="4.5" fill="#56aefc"/><text x="894.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Better long-term leverage</tspan></text><line x1="876.0" y1="646.0" x2="1200.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="876.0" y="670.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Complexity should buy</tspan><tspan x="876.0" dy="12.5">something durable.</tspan></text><rect x="56.0" y="714.0" width="1168.0" height="104.0" rx="24" fill="#ffb400" fill-opacity="0.08" stroke="#ffb400" stroke-width="1.2"/><text x="80.0" y="744.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Key takeaway</tspan></text><circle cx="80.0" cy="765.0" r="5" fill="#ffb400"/><text x="94.0" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="94.0" dy="0">Repeated workarounds are</tspan><tspan x="94.0" dy="13.8">evidence, not progress by</tspan><tspan x="94.0" dy="13.8">themselves.</tspan></text><circle cx="453.3" cy="765.0" r="5" fill="#ffb400"/><text x="467.3" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="467.3" dy="0">Convergence usually points</tspan><tspan x="467.3" dy="13.8">at the real systems</tspan><tspan x="467.3" dy="13.8">constraint.</tspan></text><circle cx="826.7" cy="765.0" r="5" fill="#ffb400"/><text x="840.7" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="840.7" dy="0">Teach the model to surface</tspan><tspan x="840.7" dy="13.8">the principle, not just</tspan><tspan x="840.7" dy="13.8">the patch list.</tspan></text><text x="1200.0" y="798.0" fill="#92a4b8" font-size="10" font-weight="700" text-anchor="end" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1200.0" dy="0">gpu_workaround_convergence</tspan></text></svg>