<svg width="1600" height="860" viewBox="0 0 1600 860" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3ede3"/><stop offset="100%" stop-color="#fbf7f0"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fffaf2"/><stop offset="100%" stop-color="#f8efe0"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(23,33,43,0.14)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter><marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 z" fill="#ffb400"/></marker></defs><rect x="0" y="0" width="1600" height="860" fill="url(#bgGrad)"/><g opacity="0.9"><line x1="0" y1="0" x2="0" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="64" y1="0" x2="64" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="128" y1="0" x2="128" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="192" y1="0" x2="192" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="256" y1="0" x2="256" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="320" y1="0" x2="320" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="384" y1="0" x2="384" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="448" y1="0" x2="448" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="512" y1="0" x2="512" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="576" y1="0" x2="576" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="640" y1="0" x2="640" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="704" y1="0" x2="704" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="768" y1="0" x2="768" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="832" y1="0" x2="832" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="896" y1="0" x2="896" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1024" y1="0" x2="1024" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1088" y1="0" x2="1088" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1152" y1="0" x2="1152" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1216" y1="0" x2="1216" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1280" y1="0" x2="1280" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1344" y1="0" x2="1344" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1408" y1="0" x2="1408" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1472" y1="0" x2="1472" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1536" y1="0" x2="1536" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="1600" y1="0" x2="1600" y2="860" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="0" x2="1600" y2="0" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="64" x2="1600" y2="64" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="128" x2="1600" y2="128" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="192" x2="1600" y2="192" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="256" x2="1600" y2="256" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="320" x2="1600" y2="320" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="384" x2="1600" y2="384" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="448" x2="1600" y2="448" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="512" x2="1600" y2="512" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="576" x2="1600" y2="576" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="640" x2="1600" y2="640" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="704" x2="1600" y2="704" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="768" x2="1600" y2="768" stroke="rgba(114,95,72,0.10)" stroke-width="1"/><line x1="0" y1="832" x2="1600" y2="832" stroke="rgba(114,95,72,0.10)" stroke-width="1"/></g><rect x="56.0" y="56.0" width="1488.0" height="112" rx="22" fill="#fffaf2" fill-opacity="0.18" stroke="#d8c7ad" stroke-width="1.2"/><text x="80.0" y="116.0" fill="#17212b" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Operator Spectrum Presentation</tspan></text><text x="80.0" y="154.0" fill="#64748b" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">A presentation variant should keep the same poles while emphasizing clear</tspan><tspan x="80.0" dy="18.8">audience-facing waypoints.</tspan></text><g class="spectrum-map"><rect x="56.0" y="200.0" width="1488.0" height="520.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><path d="M 138.0 460.0 C 398.0 312.0, 1202.0 312.0, 1462.0 460.0" stroke="#ffb400" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="138.0" cy="460.0" r="28" fill="#ffb400" fill-opacity="0.18" stroke="#ffb400" stroke-width="3"/><text x="138.0" y="466.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="138.0" dy="0">1</tspan></text><rect x="86.0" y="248.0" width="300.0" height="118.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="104.0" y="282.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="104.0" dy="0">Low-Level Runtime</tspan><tspan x="104.0" dy="22.5">Control</tspan></text><text x="104.0" y="310.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="104.0" dy="0">The left pole emphasizes</tspan><tspan x="104.0" dy="15.0">deterministic runtime control,</tspan><tspan x="104.0" dy="15.0">predictable artifacts, and narrow</tspan><tspan x="104.0" dy="15.0">kernel assumptions.</tspan></text><circle cx="1462.0" cy="460.0" r="28" fill="#ffd66b" fill-opacity="0.18" stroke="#ffd66b" stroke-width="3"/><text x="1462.0" y="466.0" fill="#ffd66b" font-size="16" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1462.0" dy="0">2</tspan></text><rect x="1214.0" y="248.0" width="300.0" height="118.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="1232.0" y="282.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1232.0" dy="0">High-Level Semantic</tspan><tspan x="1232.0" dy="22.5">Flexibility</tspan></text><text x="1232.0" y="310.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1232.0" dy="0">The right pole emphasizes broader</tspan><tspan x="1232.0" dy="15.0">composition, easier authoring, and</tspan><tspan x="1232.0" dy="15.0">looser operator specialization.</tspan></text><line x1="328.0" y1="444.0" x2="328.0" y2="438.0" stroke="#d8c7ad" stroke-width="2" stroke-dasharray="6 6"/><rect x="158.0" y="438.0" width="340.0" height="54.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="174.0" y="462.0" fill="#17212b" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="174.0" dy="0">Artifact Discipline</tspan></text><text x="174.0" y="480.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="174.0" dy="0">Operator choices still need to</tspan><tspan x="174.0" dy="13.8">preserve artifact clarity for</tspan><tspan x="174.0" dy="13.8">debugging and replay.</tspan></text><line x1="800.0" y1="444.0" x2="800.0" y2="500.0" stroke="#d8c7ad" stroke-width="2" stroke-dasharray="6 6"/><rect x="630.0" y="500.0" width="340.0" height="54.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="646.0" y="524.0" fill="#17212b" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="646.0" dy="0">Curriculum Pressure</tspan></text><text x="646.0" y="542.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="646.0" dy="0">The center exists because training</tspan><tspan x="646.0" dy="13.8">data usually mixes both sides of the</tspan><tspan x="646.0" dy="13.8">continuum.</tspan></text><line x1="1272.0" y1="444.0" x2="1272.0" y2="562.0" stroke="#d8c7ad" stroke-width="2" stroke-dasharray="6 6"/><rect x="1102.0" y="562.0" width="340.0" height="54.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="1118.0" y="586.0" fill="#17212b" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1118.0" dy="0">Audience Framing</tspan></text><text x="1118.0" y="604.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1118.0" dy="0">Presentation variants explain why the</tspan><tspan x="1118.0" dy="13.8">same continuum matters differently to</tspan><tspan x="1118.0" dy="13.8">different readers.</tspan></text><text x="800.0" y="412.0" fill="#ffb400" font-size="14" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="800.0" dy="0">Control &lt;-&gt; Flexibility</tspan></text><text x="800.0" y="686.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="800.0" dy="0">Presentation variants should stay semantically identical even when the framing language</tspan><tspan x="800.0" dy="15.0">changes.</tspan></text></g><rect x="56.0" y="776.0" width="1488.0" height="46" rx="16" fill="#f8efe0" fill-opacity="0.94" stroke="#d8c7ad" stroke-width="1"/><text x="76.0" y="804.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Continuum layouts widen the DSL without falling back to raw SVG detail.</tspan></text></svg>