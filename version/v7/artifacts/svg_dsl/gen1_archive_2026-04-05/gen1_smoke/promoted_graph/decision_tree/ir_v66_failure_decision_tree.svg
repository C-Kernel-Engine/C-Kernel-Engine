nt-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="678.0" dy="0">contracts</tspan></text><path d="M 890.0 376.0 C 890.0 408.0, 890.0 408.0, 890.0 432.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="890.0" y="400.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="890.0" dy="0">matrix smoke</tspan></text><path d="M 890.0 376.0 C 890.0 408.0, 1314.0 408.0, 1314.0 432.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="1102.0" y="400.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1102.0" dy="0">parity / decode</tspan></text><path d="M 890.0 606.0 C 890.0 643.0, 1526.0 643.0, 1526.0 672.0" stroke="#ffb400" stroke-width="3" fill="none"/><text x="1208.0" y="635.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1208.0" dy="0">green leaf</tspan></text><path d="M 466.0 606.0 C 466.0 638.0, 254.0 638.0, 254.0 662.0" stroke="#ffb400" stroke-width="3" fill="none"/><path d="M 890.0 606.0 C 890.0 638.0, 678.0 638.0, 678.0 662.0" stroke="#ffb400" stroke-width="3" fill="none"/><path d="M 1314.0 606.0 C 1314.0 638.0, 1102.0 638.0, 1102.0 662.0" stroke="#ffb400" stroke-width="3" fill="none"/></g><rect x="56.0" y="1134.0" width="1668.0" height="52" rx="14" fill="#192638" fill-opacity="0.92" stroke="#334155" stroke-width="1"/><text x="80.0" y="1166.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Operational rule: isolate one failing gate, one failing row, and one failing contract at a time.</tspan></text></svg>