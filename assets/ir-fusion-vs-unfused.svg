<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420">
  <defs>
    <linearGradient id="fuHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb400"/>
      <stop offset="100%" style="stop-color:#ffc933"/>
    </linearGradient>
  </defs>

  <rect width="980" height="420" fill="#232323"/>

  <text x="490" y="32" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffb400" text-anchor="middle">Fusion vs Unfused (Attention Block)</text>
  <text x="490" y="52" font-family="Inter, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">IR2 can fuse, but v6.6 keeps conservative paths for parity</text>

  <g transform="translate(40, 90)">
    <rect width="420" height="300" rx="12" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="420" height="30" rx="12" fill="url(#fuHeader)"/>
    <text x="210" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Unfused Path</text>

    <rect x="30" y="55" width="360" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">rmsnorm_forward</text>

    <rect x="30" y="105" width="360" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="130" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">qkv projections (gemv/gemm)</text>

    <rect x="30" y="155" width="360" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="180" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">rope_forward_qk</text>

    <rect x="30" y="205" width="360" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="230" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">attention_forward_*</text>

    <rect x="30" y="255" width="360" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="280" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">out_proj + residual</text>
  </g>

  <g transform="translate(520, 90)">
    <rect width="420" height="300" rx="12" fill="#2a2a2a" stroke="#47b475" stroke-width="3"/>
    <rect width="420" height="30" rx="12" fill="#47b475"/>
    <text x="210" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Fused Path (Optional)</text>

    <rect x="30" y="90" width="360" height="60" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="120" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">mega_fused_attention_prefill</text>
    <text x="210" y="138" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">rmsnorm + qkv + rope + attn + out_proj</text>

    <rect x="30" y="180" width="360" height="60" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="210" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">mega_fused_attention_decode_q5_0</text>
    <text x="210" y="228" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">decode-only fused attention path</text>
  </g>
</svg>
