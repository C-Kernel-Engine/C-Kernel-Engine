<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420">
  <defs>
    <linearGradient id="outHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb400"/>
      <stop offset="100%" style="stop-color:#ffc933"/>
    </linearGradient>
    <marker id="arrowOut" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb400"/>
    </marker>
  </defs>

  <rect width="980" height="420" fill="#232323"/>

  <text x="490" y="32" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffb400" text-anchor="middle">IR Outputs</text>
  <text x="490" y="52" font-family="Inter, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">Every stage emits explicit artifacts. These are the debug contract.</text>

  <g transform="translate(40, 90)">
    <rect width="260" height="110" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="260" height="28" rx="10" fill="url(#outHeader)"/>
    <text x="130" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">IR1</text>
    <text x="130" y="56" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">ir1_decode.json</text>
    <text x="130" y="76" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">ir1_prefill.json</text>
    <text x="130" y="96" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">ops + dataflow + kernels</text>
  </g>

  <g transform="translate(320, 145)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowOut)"/>
  </g>

  <g transform="translate(390, 90)">
    <rect width="260" height="110" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="260" height="28" rx="10" fill="url(#outHeader)"/>
    <text x="130" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Lowered IR</text>
    <text x="130" y="56" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">lowered_decode.json</text>
    <text x="130" y="76" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">lowered_prefill.json</text>
    <text x="130" y="96" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">call args + resolved pointers</text>
  </g>

  <g transform="translate(670, 145)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowOut)"/>
  </g>

  <g transform="translate(740, 90)">
    <rect width="200" height="110" rx="10" fill="#2a2a2a" stroke="#47b475" stroke-width="3"/>
    <rect width="200" height="28" rx="10" fill="#47b475"/>
    <text x="100" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Layout</text>
    <text x="100" y="56" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">layout_decode.json</text>
    <text x="100" y="76" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">layout_prefill.json</text>
    <text x="100" y="96" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">buffers + offsets</text>
  </g>

  <g transform="translate(40, 240)">
    <rect width="900" height="150" rx="12" fill="#1f1f1f" stroke="#333" stroke-width="2"/>
    <text x="30" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffb400">Other artifacts</text>

    <rect x="30" y="55" width="260" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="160" y="80" font-family="Inter, sans-serif" font-size="10" fill="#c7c7c7" text-anchor="middle">init_call.json</text>
    <text x="160" y="100" font-family="Inter, sans-serif" font-size="9" fill="#8a8a8a" text-anchor="middle">rope init, kv init, tokenizer</text>

    <rect x="330" y="55" width="260" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="460" y="80" font-family="Inter, sans-serif" font-size="10" fill="#c7c7c7" text-anchor="middle">model_v6_6.c</text>
    <text x="460" y="100" font-family="Inter, sans-serif" font-size="9" fill="#8a8a8a" text-anchor="middle">generated C runtime</text>

    <rect x="630" y="55" width="260" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="760" y="80" font-family="Inter, sans-serif" font-size="10" fill="#c7c7c7" text-anchor="middle">weights_manifest.json</text>
    <text x="760" y="100" font-family="Inter, sans-serif" font-size="9" fill="#8a8a8a" text-anchor="middle">config + template + quants</text>
  </g>
</svg>
