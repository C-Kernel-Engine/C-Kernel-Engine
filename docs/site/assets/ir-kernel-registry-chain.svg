<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420">
  <defs>
    <linearGradient id="krHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb400"/>
      <stop offset="100%" style="stop-color:#ffc933"/>
    </linearGradient>
    <marker id="arrowKr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb400"/>
    </marker>
  </defs>

  <rect width="980" height="420" fill="#232323"/>

  <text x="490" y="32" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffb400" text-anchor="middle">Kernel Map → Registry → C</text>
  <text x="490" y="52" font-family="Inter, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">How a kernel map becomes a call-ready C signature</text>

  <g transform="translate(30, 90)">
    <rect width="270" height="120" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="270" height="28" rx="10" fill="url(#krHeader)"/>
    <text x="135" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">kernel_maps/*.json</text>
    <text x="135" y="60" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">signature + params</text>
    <text x="135" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">weight dtype, activation dtype</text>
    <text x="135" y="100" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">buffer roles: weight / activation / scratch</text>
  </g>

  <g transform="translate(320, 150)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowKr)"/>
  </g>

  <g transform="translate(390, 90)">
    <rect width="260" height="120" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="260" height="28" rx="10" fill="url(#krHeader)"/>
    <text x="130" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">KERNEL_REGISTRY.json</text>
    <text x="130" y="60" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">all kernels + metadata</text>
    <text x="130" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">validation + availability</text>
    <text x="130" y="100" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">used by IR builder</text>
  </g>

  <g transform="translate(670, 150)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowKr)"/>
  </g>

  <g transform="translate(740, 90)">
    <rect width="210" height="120" rx="10" fill="#2a2a2a" stroke="#47b475" stroke-width="3"/>
    <rect width="210" height="28" rx="10" fill="#47b475"/>
    <text x="105" y="19" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Lowered IR</text>
    <text x="105" y="60" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">call args + pointers</text>
    <text x="105" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">activation dtype chosen</text>
    <text x="105" y="100" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">ready for codegen</text>
  </g>

  <g transform="translate(30, 250)">
    <rect width="920" height="140" rx="12" fill="#1f1f1f" stroke="#333" stroke-width="2"/>
    <text x="30" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffb400">Mapping rules</text>
    <text x="30" y="56" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0">1) Template op → kernel family (e.g., out_proj → matmul)</text>
    <text x="30" y="78" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0">2) Quant summary + template flags → kernel variant (fp32 vs q8 activation)</text>
    <text x="30" y="100" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0">3) Layout assigns buffers → IR lower emits C pointers</text>
  </g>
</svg>
