    </text>

    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="160" height="80" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
      <text x="80" y="25" font-size="11" font-weight="600" fill="#ffb400" text-anchor="middle">
        Rack 1
      </text>
      <text x="80" y="45" font-size="9" fill="#a0a0a0" text-anchor="middle">
        20 servers
      </text>
      <text x="80" y="60" font-size="9" fill="#a0a0a0" text-anchor="middle">
        640 cores
      </text>

      <rect x="180" y="0" width="160" height="80" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
      <text x="260" y="25" font-size="11" font-weight="600" fill="#ffb400" text-anchor="middle">
        Rack 2
      </text>
      <text x="260" y="45" font-size="9" fill="#a0a0a0" text-anchor="middle">
        20 servers
      </text>
      <text x="260" y="60" font-size="9" fill="#a0a0a0" text-anchor="middle">
        640 cores
      </text>

      <rect x="0" y="95" width="160" height="80" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
      <text x="80" y="120" font-size="11" font-weight="600" fill="#ffb400" text-anchor="middle">
        Rack 3
      </text>
      <text x="80" y="140" font-size="9" fill="#a0a0a0" text-anchor="middle">
        20 servers
      </text>
      <text x="80" y="155" font-size="9" fill="#a0a0a0" text-anchor="middle">
        640 cores
      </text>

      <rect x="180" y="95" width="160" height="80" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
      <text x="260" y="120" font-size="11" font-weight="600" fill="#ffb400" text-anchor="middle">
        Rack 4
      </text>
      <text x="260" y="140" font-size="9" fill="#a0a0a0" text-anchor="middle">
        20 servers
      </text>
      <text x="260" y="155" font-size="9" fill="#a0a0a0" text-anchor="middle">
        640 cores
      </text>
    </g>

    <text x="240" y="360" font-size="14" fill="#a0a0a0" text-anchor="middle">
      80 servers for same scale
    </text>

    <rect x="50" y="410" width="380" height="120" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="440" font-size="18" font-weight="600" fill="#47b475" text-anchor="middle">
      Total: $240 Million
    </text>
    <text x="240" y="470" font-size="11" fill="#a0a0a0" text-anchor="middle">
      1000+ companies can afford this
    </text>
  </g>

  <rect x="150" y="730" width="900" height="50" rx="6" fill="#2a2a2a" stroke="#ffb400" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="760" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
    GPU: $4B (5 companies) vs CPU: $240M (1000+ companies) = 16x cheaper, 200x more accessible!
  </text>
</svg>
