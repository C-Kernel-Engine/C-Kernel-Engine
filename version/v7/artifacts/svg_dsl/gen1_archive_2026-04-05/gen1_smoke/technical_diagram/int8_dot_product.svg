er="url(#softShadow)"/><rect x="74.0" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="117.0" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="117.0" dy="0">STEP 1</tspan></text><text x="76.0" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Source Values</tspan></text><text x="76.0" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Int8 Dot Product starts from</tspan><tspan x="76.0" dy="15.0">packed or full-precision source</tspan><tspan x="76.0" dy="15.0">values that define the numeric</tspan><tspan x="76.0" dy="15.0">contract.</tspan></text><text x="80.0" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">packed bytes</tspan></text><text x="80.0" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">int32 acc</tspan></text></g><g class="technical-node"><rect x="474.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="492.5" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="535.5" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="535.5" dy="0">STEP 2</tspan></text><text x="494.5" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">Packing Rule</tspan></text><text x="494.5" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">The central rule decides which</tspan><tspan x="494.5" dy="15.0">bits survive and how dropped</tspan><tspan x="494.5" dy="15.0">detail is accounted for in int8</tspan><tspan x="494.5" dy="15.0">dot product.</tspan></text><text x="498.5" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">int32 acc</tspan></text><text x="498.5" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">rescale</tspan></text></g><g class="technical-node"><rect x="893.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="911.0" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="954.0" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="954.0" dy="0">STEP 3</tspan></text><text x="913.0" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Block Layout</tspan></text><text x="913.0" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Storage layout turns that rule</tspan><tspan x="913.0" dy="15.0">into a concrete block or lane</tspan><tspan x="913.0" dy="15.0">shape the runtime can consume.</tspan></text><text x="917.0" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">packed bytes</tspan></text><text x="917.0" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">rescale</tspan></text></g><g class="technical-node"><rect x="1311.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="1329.5" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="1372.5" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1372.5" dy="0">STEP 4</tspan></text><text x="1331.5" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">Runtime Decode</tspan></text><text x="1331.5" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">The final behavior depends on</tspan><tspan x="1331.5" dy="15.0">decode order, scale recovery, and</tspan><tspan x="1331.5" dy="15.0">the remaining error envelope.</tspan></text><text x="1335.5" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">decode path</tspan></text><text x="1335.5" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">runtime value</tspan></text></g><g class="technical-connectors"><path d="M 430.5 297.0 C 461.5 297.0, 461.5 297.0, 492.5 297.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 849.0 297.0 C 880.0 297.0, 880.0 297.0, 911.0 297.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 1267.5 297.0 C 1298.5 297.0, 1298.5 297.0, 1329.5 297.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/></g><g class="formula-strip"><rect x="56.0" y="416.0" width="1648.0" height="132.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="78.0" y="450.0" fill="#17212b" font-size="17" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">Technical Rule</tspan></text><text x="78.0" y="484.0" fill="#56aefc" font-size="14" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="78.0" dy="0">sum(int8_a * int8_b) -&gt; int32_acc -&gt; rescale</tspan></text><text x="78.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">packed bytes</tspan></text><text x="368.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">int32 acc</tspan></text><text x="658.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="658.0" dy="0">rescale</tspan></text></g><g class="artifact-panel"><rect x="56.0" y="574.0" width="811.0" height="196.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="76.0" y="608.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Structure View</tspan></text><text x="76.0" y="634.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Show the concrete packed structure the</tspan><tspan x="76.0" dy="15.0">runtime reads for int8 dot product.</tspan></text><text x="80.0" y="678.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">bit grouping</tspan></text><text x="80.0" y="696.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">scale metadata</tspan></text></g><g class="artifact-panel"><rect x="893.0" y="574.0" width="811.0" height="196.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="913.0" y="608.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Runtime Effect</tspan></text><text x="913.0" y="634.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Explain the throughput, precision, or</tspan><tspan x="913.0" dy="15.0">memory consequence of the chosen layout.</tspan></text><text x="917.0" y="678.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">error tradeoff</tspan></text><text x="917.0" y="696.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">runtime contract</tspan></text></g><g class="footer-note"><rect x="56.0" y="974.0" width="1648.0" height="48" rx="16" fill="#f8efe0" fill-opacity="0.94" stroke="#d8c7ad" stroke-width="1"/><text x="76.0" y="1003.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Int8 Dot Product belongs in the broader contract because the model needs dense technical layouts, not only charts and posters.</tspan></text></g></svg>