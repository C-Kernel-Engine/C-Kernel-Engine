<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" font-family="Consolas, Monaco, monospace">
  <defs>
    <linearGradient id="superGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1000" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="45" fill="url(#superGrad)" font-size="32" font-weight="bold" text-anchor="middle">
    Q4_K: Two-Level Quantization (K-Quants)
  </text>
  <text x="600" y="75" fill="#8b949e" font-size="16" text-anchor="middle">
    256 weights per super-block × 8 sub-blocks × 32 weights each = 144 bytes
  </text>

  <!-- KEY INSIGHT BOX -->
  <rect x="50" y="95" width="1100" height="60" rx="8" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <text x="600" y="125" fill="#f0883e" font-size="18" font-weight="bold" text-anchor="middle">
    KEY INSIGHT: Nested Scales = Better Accuracy with Same Bits
  </text>
  <text x="600" y="145" fill="#8b949e" font-size="13" text-anchor="middle">
    Super-block FP16 scale × Sub-block 6-bit scale × 4-bit weight → captures both global and local variation
  </text>

  <!-- SUPER-BLOCK STRUCTURE -->
  <text x="50" y="190" fill="#58a6ff" font-size="20" font-weight="bold">SUPER-BLOCK STRUCTURE (144 bytes for 256 weights)</text>

  <!-- Memory layout boxes -->
  <g transform="translate(50, 210)">
    <!-- d (super-scale) -->
    <rect x="0" y="0" width="100" height="60" rx="5" fill="#3d1a3d" stroke="#f093fb" stroke-width="2"/>
    <text x="50" y="25" fill="#f093fb" font-size="12" text-anchor="middle" font-weight="bold">d</text>
    <text x="50" y="42" fill="#f093fb" font-size="10" text-anchor="middle">FP16 scale</text>
    <text x="50" y="75" fill="#8b949e" font-size="10" text-anchor="middle">2 bytes</text>

    <!-- dmin (super-min) -->
    <rect x="110" y="0" width="100" height="60" rx="5" fill="#3d2a1a" stroke="#f5576c" stroke-width="2"/>
    <text x="160" y="25" fill="#f5576c" font-size="12" text-anchor="middle" font-weight="bold">dmin</text>
    <text x="160" y="42" fill="#f5576c" font-size="10" text-anchor="middle">FP16 min</text>
    <text x="160" y="75" fill="#8b949e" font-size="10" text-anchor="middle">2 bytes</text>

    <!-- scales[12] -->
    <rect x="220" y="0" width="200" height="60" rx="5" fill="#1a2a3d" stroke="#4facfe" stroke-width="2"/>
    <text x="320" y="25" fill="#4facfe" font-size="12" text-anchor="middle" font-weight="bold">scales[12]</text>
    <text x="320" y="42" fill="#4facfe" font-size="10" text-anchor="middle">8 sub-scales + 8 sub-mins (6-bit packed)</text>
    <text x="320" y="75" fill="#8b949e" font-size="10" text-anchor="middle">12 bytes</text>

    <!-- qs[128] -->
    <rect x="430" y="0" width="670" height="60" rx="5" fill="#1a3d2a" stroke="#43e97b" stroke-width="2"/>
    <text x="765" y="25" fill="#43e97b" font-size="12" text-anchor="middle" font-weight="bold">qs[128]</text>
    <text x="765" y="42" fill="#43e97b" font-size="10" text-anchor="middle">256 × 4-bit weights (2 per byte)</text>
    <text x="765" y="75" fill="#8b949e" font-size="10" text-anchor="middle">128 bytes</text>

    <text x="1050" y="40" fill="#ffd700" font-size="14" font-weight="bold">= 144 bytes</text>
  </g>

  <!-- SUB-BLOCK VISUALIZATION -->
  <text x="50" y="330" fill="#58a6ff" font-size="20" font-weight="bold">8 SUB-BLOCKS (32 weights each)</text>

  <g transform="translate(50, 350)">
    <!-- Draw 8 sub-blocks -->
    <g>
      <rect x="0" y="0" width="130" height="50" rx="5" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="65" y="20" fill="#4facfe" font-size="11" text-anchor="middle" font-weight="bold">Sub-block 0</text>
      <text x="65" y="38" fill="#8b949e" font-size="10" text-anchor="middle">weights 0-31</text>
    </g>
    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="130" height="50" rx="5" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="65" y="20" fill="#4facfe" font-size="11" text-anchor="middle" font-weight="bold">Sub-block 1</text>
      <text x="65" y="38" fill="#8b949e" font-size="10" text-anchor="middle">weights 32-63</text>
    </g>
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="130" height="50" rx="5" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="65" y="20" fill="#4facfe" font-size="11" text-anchor="middle" font-weight="bold">Sub-block 2</text>
      <text x="65" y="38" fill="#8b949e" font-size="10" text-anchor="middle">weights 64-95</text>
    </g>
    <text x="430" y="25" fill="#8b949e" font-size="14">...</text>
    <g transform="translate(470, 0)">
      <rect x="0" y="0" width="130" height="50" rx="5" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="65" y="20" fill="#4facfe" font-size="11" text-anchor="middle" font-weight="bold">Sub-block 7</text>
      <text x="65" y="38" fill="#8b949e" font-size="10" text-anchor="middle">weights 224-255</text>
    </g>

    <!-- Each sub-block has its own scale and min -->
    <text x="800" y="20" fill="#c9d1d9" font-size="12">Each sub-block has:</text>
    <text x="800" y="40" fill="#4facfe" font-size="11">• 6-bit scale (0-63)</text>
    <text x="950" y="40" fill="#f5576c" font-size="11">• 6-bit min (0-63)</text>
  </g>

  <!-- THE TRICKY PART: scales[12] unpacking -->
  <text x="50" y="450" fill="#58a6ff" font-size="20" font-weight="bold">THE TRICKY PART: Unpacking scales[12]</text>

  <rect x="50" y="470" width="1100" height="200" rx="8" fill="#161b22" stroke="#30363d"/>

  <g transform="translate(70, 490)">
    <!-- Layout explanation -->
    <text x="0" y="15" fill="#f0883e" font-size="14" font-weight="bold">12 bytes pack 16 values (8 scales + 8 mins) using 6-bit encoding:</text>

    <!-- Byte layout table -->
    <g transform="translate(0, 35)">
      <text x="0" y="0" fill="#8b949e" font-size="12">bytes 0-3:</text>
      <text x="100" y="0" fill="#4facfe" font-size="12">scales[0-3] (low 6 bits) + 2 high bits for scales[4-7]</text>

      <text x="0" y="22" fill="#8b949e" font-size="12">bytes 4-7:</text>
      <text x="100" y="22" fill="#f5576c" font-size="12">mins[0-3] (low 6 bits) + 2 high bits for mins[4-7]</text>

      <text x="0" y="44" fill="#8b949e" font-size="12">bytes 8-11:</text>
      <text x="100" y="44" fill="#7ee787" font-size="12">low 4 bits for scales[4-7], high 4 bits for mins[4-7]</text>
    </g>

    <!-- Visual diagram of one byte -->
    <g transform="translate(600, 20)">
      <text x="0" y="0" fill="#ffd700" font-size="13" font-weight="bold">Byte 0 structure:</text>
      <rect x="0" y="10" width="200" height="40" fill="#1c2128" stroke="#30363d" rx="4"/>

      <!-- 8 bits -->
      <rect x="5" y="15" width="22" height="30" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="16" y="35" fill="#4facfe" font-size="9" text-anchor="middle">5</text>
      <rect x="29" y="15" width="22" height="30" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="40" y="35" fill="#4facfe" font-size="9" text-anchor="middle">4</text>
      <rect x="53" y="15" width="22" height="30" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="64" y="35" fill="#4facfe" font-size="9" text-anchor="middle">3</text>
      <rect x="77" y="15" width="22" height="30" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="88" y="35" fill="#4facfe" font-size="9" text-anchor="middle">2</text>
      <rect x="101" y="15" width="22" height="30" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="112" y="35" fill="#4facfe" font-size="9" text-anchor="middle">1</text>
      <rect x="125" y="15" width="22" height="30" fill="#1a2a3d" stroke="#4facfe"/>
      <text x="136" y="35" fill="#4facfe" font-size="9" text-anchor="middle">0</text>
      <rect x="149" y="15" width="22" height="30" fill="#3d1a1a" stroke="#f5576c"/>
      <text x="160" y="35" fill="#f5576c" font-size="9" text-anchor="middle">H1</text>
      <rect x="173" y="15" width="22" height="30" fill="#3d1a1a" stroke="#f5576c"/>
      <text x="184" y="35" fill="#f5576c" font-size="9" text-anchor="middle">H0</text>

      <text x="75" y="65" fill="#4facfe" font-size="10" text-anchor="middle">scale[0] (6 bits)</text>
      <text x="172" y="65" fill="#f5576c" font-size="10" text-anchor="middle">hi bits</text>
    </g>

    <!-- Unpacking code -->
    <g transform="translate(0, 120)">
      <text x="0" y="0" fill="#79c0ff" font-size="13" font-weight="bold">Unpacking code:</text>
      <text x="0" y="22" fill="#c9d1d9" font-size="12">sc[0] = scales[0] &amp; 0x3F;           // bits 0-5</text>
      <text x="0" y="44" fill="#c9d1d9" font-size="12">sc[4] = (scales[8] &amp; 0x0F) | ((scales[0] >> 6) &lt;&lt; 4);  // combine!</text>
      <text x="550" y="44" fill="#7ee787" font-size="11">← low 4 from byte 8, high 2 from byte 0</text>
    </g>
  </g>

  <!-- DEQUANTIZATION FORMULA -->
  <text x="50" y="700" fill="#58a6ff" font-size="20" font-weight="bold">DEQUANTIZATION FORMULA</text>

  <rect x="50" y="720" width="1100" height="120" rx="8" fill="#161b22" stroke="#30363d"/>

  <g transform="translate(70, 745)">
    <text x="0" y="0" fill="#c9d1d9" font-size="16">weight[i] = </text>
    <rect x="100" y="-18" width="40" height="26" fill="#3d1a3d" stroke="#f093fb" rx="3"/>
    <text x="120" y="2" fill="#f093fb" font-size="13" text-anchor="middle">d</text>
    <text x="145" y="0" fill="#c9d1d9" font-size="16">×</text>
    <rect x="160" y="-18" width="70" height="26" fill="#1a2a3d" stroke="#4facfe" rx="3"/>
    <text x="195" y="2" fill="#4facfe" font-size="13" text-anchor="middle">sc[sb]</text>
    <text x="235" y="0" fill="#c9d1d9" font-size="16">×</text>
    <rect x="250" y="-18" width="70" height="26" fill="#1a3d2a" stroke="#43e97b" rx="3"/>
    <text x="285" y="2" fill="#43e97b" font-size="13" text-anchor="middle">qs[i]</text>
    <text x="330" y="0" fill="#c9d1d9" font-size="16">-</text>
    <rect x="345" y="-18" width="60" height="26" fill="#3d2a1a" stroke="#f5576c" rx="3"/>
    <text x="375" y="2" fill="#f5576c" font-size="13" text-anchor="middle">dmin</text>
    <text x="410" y="0" fill="#c9d1d9" font-size="16">×</text>
    <rect x="425" y="-18" width="70" height="26" fill="#1a2a3d" stroke="#4facfe" rx="3"/>
    <text x="460" y="2" fill="#4facfe" font-size="13" text-anchor="middle">m[sb]</text>

    <text x="0" y="40" fill="#8b949e" font-size="12">where: sb = sub-block index (0-7), sc = sub-scale, m = sub-min</text>

    <text x="550" y="0" fill="#ffd700" font-size="14" font-weight="bold">3-Level Precision:</text>
    <text x="550" y="22" fill="#f093fb" font-size="12">1. Super-block scale (FP16)</text>
    <text x="550" y="42" fill="#4facfe" font-size="12">2. Sub-block scale (6-bit)</text>
    <text x="550" y="62" fill="#43e97b" font-size="12">3. Weight value (4-bit)</text>

    <text x="0" y="80" fill="#7ee787" font-size="14" font-weight="bold">Why nested scales work: Local variation captured without wasting bits globally!</text>
  </g>

  <!-- COMPARISON BOX -->
  <rect x="50" y="860" width="1100" height="120" rx="8" fill="#1c2128" stroke="#58a6ff"/>
  <text x="600" y="890" fill="#58a6ff" font-size="16" font-weight="bold" text-anchor="middle">Q4_K vs Q4_0 Comparison</text>

  <g transform="translate(100, 910)">
    <text x="0" y="0" fill="#c9d1d9" font-size="13">Q4_0: 1 scale per 32 weights</text>
    <text x="0" y="20" fill="#8b949e" font-size="12">→ 18 bytes / 32 weights = 4.5 bits/weight</text>
    <text x="0" y="40" fill="#8b949e" font-size="12">→ Coarse quantization, loses detail</text>

    <text x="500" y="0" fill="#c9d1d9" font-size="13">Q4_K: 2-level scales per 256 weights</text>
    <text x="500" y="20" fill="#8b949e" font-size="12">→ 144 bytes / 256 weights = 4.5 bits/weight (same!)</text>
    <text x="500" y="40" fill="#7ee787" font-size="12">→ Better accuracy: nested scales adapt to local variation</text>
  </g>
</svg>
