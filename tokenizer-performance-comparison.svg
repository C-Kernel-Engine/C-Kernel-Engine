<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="ckTrieGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f9e44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pytorchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#339af0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1971c2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="winnerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd43b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fab005;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#0f0f23"/>

  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">Tokenizer Performance: C-Kernel Trie vs PyTorch/tiktoken</text>
  <text x="600" y="85" font-family="Arial, sans-serif" font-size="16" fill="#888" text-anchor="middle">After optimization: C-Kernel is now 36x faster than PyTorch!</text>

  <!-- Main Chart Area -->
  <g transform="translate(100, 130)">
    <!-- Chart title -->
    <text x="450" y="-10" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Throughput Comparison (chars/ms)</text>

    <!-- Y-axis label -->
    <text x="30" y="250" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle" transform="rotate(-90, 30, 250)">Throughput (chars/ms)</text>

    <!-- Grid lines -->
    <g stroke="#333" stroke-width="1">
      <line x1="80" y1="350" x2="900" y2="350"/>
      <line x1="80" y1="280" x2="900" y2="280"/>
      <line x1="80" y1="210" x2="900" y2="210"/>
      <line x1="80" y1="140" x2="900" y2="140"/>
      <line x1="80" y1="70" x2="900" y2="70"/>
    </g>

    <!-- Y-axis labels -->
    <text x="70" y="355" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="end">0</text>
    <text x="70" y="285" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="end">20K</text>
    <text x="70" y="215" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="end">40K</text>
    <text x="70" y="145" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="end">80K</text>
    <text x="70" y="75" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="end">120K</text>

    <!-- Bar groups -->
    <!-- Short Text (11 chars) -->
    <g transform="translate(120, 0)">
      <text x="40" y="375" font-family="Arial, sans-serif" font-size="12" fill="#ccc" text-anchor="middle">11 chars</text>
      <!-- PyTorch bar (blue) - smaller -->
      <rect x="0" y="310" width="35" height="42" fill="url(#pytorchGrad)" rx="4"/>
      <text x="17" y="305" font-family="Arial, sans-serif" font-size="10" fill="#339af0" text-anchor="middle">1.9K</text>
      <!-- C-Kernel Trie bar (green) - bigger -->
      <rect x="40" y="308" width="35" height="44" fill="url(#ckTrieGrad)" rx="4"/>
      <text x="57" y="303" font-family="Arial, sans-serif" font-size="10" fill="#51cf66" text-anchor="middle">3.7K</text>
      <!-- Speedup badge -->
      <rect x="25" y="265" width="45" height="25" rx="12" fill="url(#winnerGrad)" filter="url(#glow)"/>
      <text x="47" y="282" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">1.9x C</text>
    </g>

    <!-- Medium Text (200 chars) -->
    <g transform="translate(280, 0)">
      <text x="40" y="375" font-family="Arial, sans-serif" font-size="12" fill="#ccc" text-anchor="middle">200 chars</text>
      <!-- PyTorch bar (blue) -->
      <rect x="0" y="270" width="35" height="82" fill="url(#pytorchGrad)" rx="4"/>
      <text x="17" y="260" font-family="Arial, sans-serif" font-size="10" fill="#339af0" text-anchor="middle">8.1K</text>
      <!-- C-Kernel Trie bar (green) - much bigger -->
      <rect x="40" y="350" width="35" height="2" fill="url(#ckTrieGrad)" rx="4"/>
      <text x="57" y="345" font-family="Arial, sans-serif" font-size="10" fill="#51cf66" text-anchor="middle">29K</text>
      <!-- Speedup badge -->
      <rect x="25" y="230" width="45" height="25" rx="12" fill="url(#winnerGrad)" filter="url(#glow)"/>
      <text x="47" y="247" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">3.6x C</text>
    </g>

    <!-- Long Text (3000 chars) -->
    <g transform="translate(440, 0)">
      <text x="40" y="375" font-family="Arial, sans-serif" font-size="12" fill="#ccc" text-anchor="middle">3K chars</text>
      <!-- PyTorch bar (blue) -->
      <rect x="0" y="260" width="35" height="92" fill="url(#pytorchGrad)" rx="4"/>
      <text x="17" y="250" font-family="Arial, sans-serif" font-size="10" fill="#339af0" text-anchor="middle">5.9K</text>
      <!-- C-Kernel Trie bar (green) - much bigger -->
      <rect x="40" y="350" width="35" height="2" fill="url(#ckTrieGrad)" rx="4"/>
      <text x="57" y="345" font-family="Arial, sans-serif" font-size="10" fill="#51cf66" text-anchor="middle">97K</text>
      <!-- Speedup badge -->
      <rect x="25" y="220" width="45" height="25" rx="12" fill="url(#winnerGrad)" filter="url(#glow)"/>
      <text x="47" y="237" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">16x C</text>
    </g>

    <!-- Very Long Text (15000 chars) -->
    <g transform="translate(600, 0)">
      <text x="40" y="375" font-family="Arial, sans-serif" font-size="12" fill="#ccc" text-anchor="middle">15K chars</text>
      <!-- PyTorch bar (blue) -->
      <rect x="0" y="260" width="35" height="92" fill="url(#pytorchGrad)" rx="4"/>
      <text x="17" y="250" font-family="Arial, sans-serif" font-size="10" fill="#339af0" text-anchor="middle">2.3K</text>
      <!-- C-Kernel Trie bar (green) - much bigger -->
      <rect x="40" y="350" width="35" height="2" fill="url(#ckTrieGrad)" rx="4"/>
      <text x="57" y="345" font-family="Arial, sans-serif" font-size="10" fill="#51cf66" text-anchor="middle">97K</text>
      <!-- Speedup badge -->
      <rect x="25" y="220" width="45" height="25" rx="12" fill="url(#winnerGrad)" filter="url(#glow)"/>
      <text x="47" y="237" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">42x C</text>
    </g>

    <!-- Legend -->
    <g transform="translate(750, 20)">
      <rect x="0" y="0" width="120" height="70" rx="8" fill="#1a1a2e" stroke="#444"/>
      <rect x="10" y="15" width="20" height="15" fill="url(#ckTrieGrad)" rx="3"/>
      <text x="35" y="27" font-family="Arial, sans-serif" font-size="12" fill="#51cf66" font-weight="bold">C-Kernel</text>
      <rect x="10" y="40" width="20" height="15" fill="url(#pytorchGrad)" rx="3"/>
      <text x="35" y="52" font-family="Arial, sans-serif" font-size="12" fill="#339af0" font-weight="bold">PyTorch</text>
    </g>
  </g>

  <!-- Summary Cards -->
  <g transform="translate(100, 520)">
    <!-- Card 1: Average Throughput -->
    <g transform="translate(0, 0)">
      <rect width="260" height="150" rx="12" fill="#1a1a2e" stroke="#333"/>
      <text x="130" y="30" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Average Throughput</text>

      <g transform="translate(20, 50)">
        <text x="0" y="0" font-family="Arial, sans-serif" font-size="13" fill="#339af0">PyTorch (tiktoken):</text>
        <text x="0" y="25" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#339af0">2,567 chars/ms</text>

        <line x1="0" y1="40" x2="220" y2="40" stroke="#333"/>

        <text x="0" y="65" font-family="Arial, sans-serif" font-size="13" fill="#51cf66">C-Kernel Trie:</text>
        <text x="0" y="90" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#51cf66">93,235 chars/ms</text>
      </g>
    </g>

    <!-- Card 2: Speedup vs PyTorch -->
    <g transform="translate(280, 0)">
      <rect width="260" height="150" rx="12" fill="#1a1a2e" stroke="#333"/>
      <text x="130" y="30" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">C-Kernel vs PyTorch</text>

      <text x="130" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffd43b" text-anchor="middle">36x</text>
      <text x="130" y="110" font-family="Arial, sans-serif" font-size="14" fill="#51cf66" text-anchor="middle">faster than PyTorch</text>
    </g>

    <!-- Card 3: Speedup vs Hash Table -->
    <g transform="translate(560, 0)">
      <rect width="260" height="150" rx="12" fill="#1a1a2e" stroke="#333"/>
      <text x="130" y="30" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">C-Kernel Trie vs Hash</text>

      <text x="130" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#51cf66" text-anchor="middle">73x</text>
      <text x="130" y="110" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">faster than hash table</text>
    </g>

    <!-- Card 4: Key Optimization -->
    <g transform="translate(840, 0)">
      <rect width="260" height="150" rx="12" fill="#1a1a2e" stroke="#333"/>
      <text x="130" y="30" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Key Optimization</text>

      <text x="130" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">Trie</text>
      <text x="130" y="95" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">O(k) vs O(n×k)</text>
      <text x="130" y="120" font-family="Arial, sans-serif" font-size="11" fill="#51cf66" text-anchor="middle">+ No memcpy in hot path</text>
    </g>
  </g>

  <!-- Footer -->
  <rect x="50" y="680" width="1100" height="2" fill="#333"/>
  <text x="600" y="698" font-family="Arial, sans-serif" font-size="11" fill="#555" text-anchor="middle">Test configuration: BPE tokenizer, 1000+ vocabulary size, 100 runs per test, Intel CPU</text>
</svg>
