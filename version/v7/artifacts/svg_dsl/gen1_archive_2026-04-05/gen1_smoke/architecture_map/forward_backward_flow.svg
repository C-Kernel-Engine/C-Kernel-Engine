<svg width="1760" height="820" viewBox="0 0 1760 820" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#07131f"/><stop offset="100%" stop-color="#11253a"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#b576ff"/><stop offset="100%" stop-color="#e8a7ff"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0d2033"/><stop offset="100%" stop-color="#16314d"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(8,22,38,0.55)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#b576ff"/></filter><marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 z" fill="#b576ff"/></marker></defs><rect x="0" y="0" width="1760" height="820" fill="url(#bgGrad)"/><g opacity="0.24"><circle cx="316.8" cy="196.8" r="180" fill="#f3d8ff"/><circle cx="1548.8" cy="147.6" r="140" fill="#f3d8ff"/><circle cx="1196.8" cy="688.8" r="220" fill="#e8a7ff" opacity="0.20"/></g><rect x="56.0" y="56.0" width="1648.0" height="112" rx="22" fill="#0d2033" fill-opacity="0.18" stroke="#28577d" stroke-width="1.2"/><rect x="74.0" y="72.0" width="220" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="130.0" fill="#f8fafc" font-size="30" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Forward / Backward Flow</tspan></text><text x="80.0" y="160.0" fill="#9dd5ff" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Training architecture is a dual-lane system: activations move forward, gradients move</tspan><tspan x="80.0" dy="18.8">back, and memory policy ties them together.</tspan></text><g class="flow-node"><rect x="56.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#b576ff" stroke-width="1.6"/><rect x="74.0" y="402.0" width="96" height="24" rx="12" fill="#b576ff" fill-opacity="0.14" stroke="#b576ff" stroke-width="1"/><text x="122.0" y="418.0" fill="#b576ff" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="122.0" dy="0">STAGE</tspan></text><text x="74.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">Forward Pass</tspan></text><text x="74.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">Activations and logits move through the</tspan><tspan x="74.0" dy="15.0">model in the user-visible direction.</tspan></text><text x="78.0" y="498.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">activations</tspan></text><text x="78.0" y="516.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">loss</tspan></text></g><g class="flow-node"><rect x="400.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#b576ff" stroke-width="1.6"/><rect x="418.0" y="402.0" width="96" height="24" rx="12" fill="#b576ff" fill-opacity="0.14" stroke="#b576ff" stroke-width="1"/><text x="466.0" y="418.0" fill="#b576ff" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="466.0" dy="0">STAGE</tspan></text><text x="418.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Saved State</tspan></text><text x="418.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Selected tensors must survive long enough</tspan><tspan x="418.0" dy="15.0">for backward without exhausting memory.</tspan></text><text x="422.0" y="498.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">saved tensors</tspan></text><text x="422.0" y="516.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">checkpoints</tspan></text></g><g class="flow-node"><rect x="744.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#b576ff" stroke-width="1.6"/><rect x="762.0" y="402.0" width="96" height="24" rx="12" fill="#b576ff" fill-opacity="0.14" stroke="#b576ff" stroke-width="1"/><text x="810.0" y="418.0" fill="#b576ff" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="810.0" dy="0">STAGE</tspan></text><text x="762.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Backward Pass</tspan></text><text x="762.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Gradients consume saved state and</tspan><tspan x="762.0" dy="15.0">propagate credit back through the graph.</tspan></text><text x="766.0" y="498.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="766.0" dy="0">grads</tspan></text><text x="766.0" y="516.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="766.0" dy="0">reduce</tspan></text></g><g class="flow-node"><rect x="1088.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#b576ff" stroke-width="1.6"/><rect x="1106.0" y="402.0" width="96" height="24" rx="12" fill="#b576ff" fill-opacity="0.14" stroke="#b576ff" stroke-width="1"/><text x="1154.0" y="418.0" fill="#b576ff" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1154.0" dy="0">STAGE</tspan></text><text x="1106.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Optimizer Step</tspan></text><text x="1106.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Weight updates close the loop and define</tspan><tspan x="1106.0" dy="15.0">the next forward contract.</tspan></text><text x="1110.0" y="498.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1110.0" dy="0">adamw</tspan></text><text x="1110.0" y="516.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1110.0" dy="0">step</tspan></text></g><g class="flow-node"><rect x="1432.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#e8a7ff" stroke-width="1.6"/><rect x="1450.0" y="402.0" width="96" height="24" rx="12" fill="#e8a7ff" fill-opacity="0.14" stroke="#e8a7ff" stroke-width="1"/><text x="1498.0" y="418.0" fill="#e8a7ff" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1498.0" dy="0">OUTCOME</tspan></text><text x="1450.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">Training Loop</tspan></text><text x="1450.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">The flow is healthy when forward, memory,</tspan><tspan x="1450.0" dy="15.0">backward, and update remain aligned.</tspan></text></g><g class="flow-connectors"><path d="M 336.0 454.0 C 368.0 454.0, 368.0 454.0, 392.0 454.0" stroke="#b576ff" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="368.0" y="446.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">save</tspan></text><path d="M 680.0 454.0 C 712.0 454.0, 712.0 454.0, 736.0 454.0" stroke="#b576ff" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="712.0" y="446.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="712.0" dy="0">reuse</tspan></text><path d="M 1024.0 454.0 C 1056.0 454.0, 1056.0 454.0, 1080.0 454.0" stroke="#b576ff" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="1056.0" y="446.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1056.0" dy="0">accumulate</tspan></text><path d="M 1368.0 454.0 C 1400.0 454.0, 1400.0 454.0, 1424.0 454.0" stroke="#b576ff" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="1400.0" y="446.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1400.0" dy="0">next step</tspan></text></g><rect x="56.0" y="748.0" width="1648.0" height="44" rx="14" fill="#16314d" fill-opacity="0.92" stroke="#28577d" stroke-width="1"/><text x="76.0" y="776.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Forward/backward diagrams teach composition across time, not just static topology.</tspan></text></svg>