<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="v6.6 runtime modes for preflight, smoke, and strict parity">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1623"/>
      <stop offset="100%" stop-color="#142134"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16283d"/>
      <stop offset="100%" stop-color="#111f30"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.26"/>
    </filter>
    <style>
      .title { font: 800 42px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #f3f9ff; }
      .sub { font: 500 19px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #b6cadf; }
      .cardt { font: 800 28px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #ffdfb0; }
      .body { font: 500 17px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #c5d8ea; }
      .cmd { font: 700 16px 'IBM Plex Mono', monospace; fill: #8bdeff; }
      .stat { font: 700 13px 'IBM Plex Sans', sans-serif; fill: #14283a; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect x="34" y="30" width="1532" height="920" rx="18" fill="none" stroke="#2e4761" stroke-width="2"/>

  <text x="72" y="90" class="title">v6.6 Runtime Modes</text>
  <text x="72" y="126" class="sub">Choose mode by available runtime artifacts and desired confidence level.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="176" width="460" height="690" rx="18" fill="url(#card)" stroke="#3f6185"/>
    <rect x="570" y="176" width="460" height="690" rx="18" fill="url(#card)" stroke="#3f6185"/>
    <rect x="1060" y="176" width="460" height="690" rx="18" fill="url(#card)" stroke="#3f6185"/>
  </g>

  <rect x="108" y="208" width="168" height="30" rx="15" fill="#9fe3ff"/>
  <text x="126" y="229" class="stat">MODE A: PREFLIGHT</text>
  <text x="108" y="276" class="cardt">No parity runtime</text>
  <text x="108" y="312" class="body">Use when llama parity binaries are unavailable.</text>
  <text x="108" y="350" class="cmd">make v6.6-kernel-map-gate</text>
  <text x="108" y="378" class="cmd">make v6.6-validate-contracts</text>
  <text x="108" y="406" class="cmd">make v6.6-validate-matrix-smoke</text>
  <text x="108" y="460" class="body">Expected parity matrix state:</text>
  <text x="108" y="488" class="body">SKIP for runtime/parity fields.</text>
  <text x="108" y="542" class="body">Use for:</text>
  <text x="108" y="570" class="body">IR/codegen changes, memory layout checks,</text>
  <text x="108" y="598" class="body">offline cached-model validation.</text>

  <rect x="598" y="208" width="178" height="30" rx="15" fill="#9ff2ba"/>
  <text x="616" y="229" class="stat">MODE B: BUILD+SMOKE</text>
  <text x="598" y="276" class="cardt">Matrix confidence</text>
  <text x="598" y="312" class="body">Model matrix builds and runtime smoke checks.</text>
  <text x="598" y="350" class="cmd">make v6.6-validate-matrix-smoke</text>
  <text x="598" y="406" class="body">Coverage:</text>
  <text x="598" y="434" class="body">Qwen2, Qwen3, Gemma artifact + smoke pass.</text>
  <text x="598" y="488" class="body">Good for:</text>
  <text x="598" y="516" class="body">converter, IR lower, codegen plumbing,</text>
  <text x="598" y="544" class="body">and runtime init/decode regressions.</text>
  <text x="598" y="598" class="body">Artifact:</text>
  <text x="598" y="626" class="cmd">model_matrix_report_latest.json</text>

  <rect x="1088" y="208" width="188" height="30" rx="15" fill="#ffd393"/>
  <text x="1106" y="229" class="stat">MODE C: FULL PARITY</text>
  <text x="1088" y="276" class="cardt">Release-level gate</text>
  <text x="1088" y="312" class="body">Requires llama parity runtime artifacts.</text>
  <text x="1088" y="350" class="cmd">make llamacpp-parity-build</text>
  <text x="1088" y="378" class="cmd">make v6.6-gate</text>
  <text x="1088" y="434" class="body">Includes strict parity matrix and</text>
  <text x="1088" y="462" class="body">long-decode stability checks.</text>
  <text x="1088" y="516" class="body">Fail policy:</text>
  <text x="1088" y="544" class="body">SKIP can become failure under require-all.</text>
  <text x="1088" y="598" class="body">Artifacts:</text>
  <text x="1088" y="626" class="cmd">parity_matrix_report_latest.json</text>
  <text x="1088" y="654" class="cmd">long_decode_report_latest.json</text>

  <rect x="80" y="892" width="1440" height="52" rx="12" fill="#102032" stroke="#3b5f84"/>
  <text x="108" y="926" class="body">Operator shortcut: Mode B is default daily confidence. Mode C is release confidence.</text>
</svg>
