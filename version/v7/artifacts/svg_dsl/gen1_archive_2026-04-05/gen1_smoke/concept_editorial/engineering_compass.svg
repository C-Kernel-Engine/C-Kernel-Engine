<svg width="1280" height="920" viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#56aefc"/><stop offset="100%" stop-color="#8bcaff"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#56aefc"/></filter></defs><rect x="0" y="0" width="1280" height="920" fill="url(#bgGrad)"/><g opacity="0.20"><circle cx="1049.6" cy="184.0" r="180" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="2"/><circle cx="1049.6" cy="184.0" r="250" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="1.5"/><circle cx="179.2" cy="754.4" r="120" fill="none" stroke="#56aefc" stroke-width="2"/></g><rect x="56.0" y="56.0" width="1168.0" height="132" rx="26" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="78.0" y="74.0" width="240" height="9" rx="4.5" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="82.0" y="102.0" fill="#56aefc" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Engineering Loop</tspan></text><text x="82.0" y="140.0" fill="#f3f7fc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Engineering Compass</tspan></text><text x="82.0" y="172.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Profile, measure, fix, repeat: follow the bottleneck rather than the hype cycle.</tspan></text><rect x="56.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="56.0" y="212.0" width="8" height="226.0" rx="4" fill="#56aefc"/><rect x="78.0" y="232.0" width="527.0" height="28" rx="14" fill="#56aefc" fill-opacity="0.11" stroke="#56aefc" stroke-width="1"/><text x="88.0" y="251.0" fill="#56aefc" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="88.0" dy="0">Hardware spectrum</tspan></text><text x="86.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="86.0" dy="0">Different systems expose different ceilings,</tspan><tspan x="86.0" dy="16.2">but the method stays the same: measure</tspan><tspan x="86.0" dy="16.2">before you mythologize.</tspan></text><circle cx="92.0" cy="320.0" r="5" fill="#56aefc"/><text x="106.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Old CPU limits</tspan></text><circle cx="92.0" cy="348.0" r="5" fill="#56aefc"/><text x="106.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">New CPU opportunities</tspan></text><circle cx="92.0" cy="376.0" r="5" fill="#56aefc"/><text x="106.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Server path still unknown</tspan></text><rect x="653.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="653.0" y="212.0" width="8" height="226.0" rx="4" fill="#8bcaff"/><rect x="675.0" y="232.0" width="527.0" height="28" rx="14" fill="#8bcaff" fill-opacity="0.11" stroke="#8bcaff" stroke-width="1"/><text x="685.0" y="251.0" fill="#8bcaff" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="685.0" dy="0">Loop discipline</tspan></text><text x="683.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="683.0" dy="0">One bottleneck at a time keeps the program</tspan><tspan x="683.0" dy="16.2">legible and avoids speculative architectural</tspan><tspan x="683.0" dy="16.2">churn.</tspan></text><circle cx="689.0" cy="320.0" r="5" fill="#8bcaff"/><text x="703.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Profile first</tspan></text><circle cx="689.0" cy="348.0" r="5" fill="#8bcaff"/><text x="703.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Fix the bottleneck</tspan></text><circle cx="689.0" cy="376.0" r="5" fill="#8bcaff"/><text x="703.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Re-measure after every change</tspan></text><rect x="56.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="482.0" width="336.0" height="24" rx="12" fill="#56aefc" fill-opacity="0.10"/><text x="84.0" y="500.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="84.0" dy="0">Method</tspan></text><text x="80.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Profile first</tspan></text><text x="80.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Instrumentation comes before</tspan><tspan x="80.0" dy="15.0">optimization because intuition is</tspan><tspan x="80.0" dy="15.0">usually wrong about the active</tspan><tspan x="80.0" dy="15.0">bottleneck.</tspan></text><circle cx="84.0" cy="600.0" r="4.5" fill="#56aefc"/><text x="98.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Collect the trace</tspan></text><circle cx="84.0" cy="624.0" r="4.5" fill="#56aefc"/><text x="98.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Find the hot path</tspan></text><circle cx="84.0" cy="648.0" r="4.5" fill="#56aefc"/><text x="98.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Avoid folklore</tspan></text><line x1="80.0" y1="646.0" x2="404.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="80.0" y="670.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Data beats vibes.</tspan></text><rect x="454.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="472.0" y="482.0" width="336.0" height="24" rx="12" fill="#47b475" fill-opacity="0.10"/><text x="482.0" y="500.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="482.0" dy="0">Method</tspan></text><text x="478.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Fix one gate</tspan></text><text x="478.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">One visible constraint is enough</tspan><tspan x="478.0" dy="15.0">to move the system forward if the</tspan><tspan x="478.0" dy="15.0">measurement is trustworthy.</tspan></text><circle cx="482.0" cy="600.0" r="4.5" fill="#47b475"/><text x="496.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Single controlled change</tspan></text><circle cx="482.0" cy="624.0" r="4.5" fill="#47b475"/><text x="496.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Keep attribution clean</tspan></text><circle cx="482.0" cy="648.0" r="4.5" fill="#47b475"/><text x="496.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Reduce regressions</tspan></text><line x1="478.0" y1="646.0" x2="802.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="478.0" y="670.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Small fixes are fine when</tspan><tspan x="478.0" dy="12.5">measurement is sharp.</tspan></text><rect x="852.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="870.0" y="482.0" width="336.0" height="24" rx="12" fill="#ffb400" fill-opacity="0.10"/><text x="880.0" y="500.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="880.0" dy="0">Method</tspan></text><text x="876.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Repeat with evidence</tspan></text><text x="876.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Every loop should leave behind a</tspan><tspan x="876.0" dy="15.0">better contract, better tooling,</tspan><tspan x="876.0" dy="15.0">or a falsified hypothesis.</tspan></text><circle cx="880.0" cy="600.0" r="4.5" fill="#ffb400"/><text x="894.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Archive the result</tspan></text><circle cx="880.0" cy="624.0" r="4.5" fill="#ffb400"/><text x="894.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Turn it into policy</tspan></text><circle cx="880.0" cy="648.0" r="4.5" fill="#ffb400"/><text x="894.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Scale only after proof</tspan></text><line x1="876.0" y1="646.0" x2="1200.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="876.0" y="670.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Iteration is the real</tspan><tspan x="876.0" dy="12.5">engine.</tspan></text><rect x="56.0" y="714.0" width="1168.0" height="104.0" rx="24" fill="#56aefc" fill-opacity="0.08" stroke="#56aefc" stroke-width="1.2"/><text x="80.0" y="744.0" fill="#56aefc" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Key takeaway</tspan></text><circle cx="80.0" cy="765.0" r="5" fill="#56aefc"/><text x="94.0" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="94.0" dy="0">The loop matters more than</tspan><tspan x="94.0" dy="13.8">any single hardware bet.</tspan></text><circle cx="453.3" cy="765.0" r="5" fill="#56aefc"/><text x="467.3" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="467.3" dy="0">Profiling discipline is</tspan><tspan x="467.3" dy="13.8">transferable across model</tspan><tspan x="467.3" dy="13.8">families.</tspan></text><circle cx="826.7" cy="765.0" r="5" fill="#56aefc"/><text x="840.7" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="840.7" dy="0">This family should teach</tspan><tspan x="840.7" dy="13.8">method, not just visuals.</tspan></text><text x="1200.0" y="798.0" fill="#92a4b8" font-size="10" font-weight="700" text-anchor="end" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1200.0" dy="0">engineering_compass</tspan></text></svg>