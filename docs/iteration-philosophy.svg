<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="2300" viewBox="0 0 1400 2300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 48px; font-weight: 700; fill: #2a2a2a; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 24px; fill: #454545; }
      .heading { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 600; fill: #ffb400; }
      .section-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; fill: #2a2a2a; }
      .body { font-family: 'Inter', sans-serif; font-size: 16px; fill: #454545; }
      .small { font-family: 'Inter', sans-serif; font-size: 14px; fill: #808080; }
      .version { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; fill: #ffb400; }
      .arrow { fill: none; stroke: #ffb400; stroke-width: 3; }
      .arrow-thin { fill: none; stroke: #ffb400; stroke-width: 2; }
      .keep { fill: #47b475; }
      .discard { fill: #ff6b6b; }
      .learn { fill: #07adf8; }
      .card-bg { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
      .highlight { fill: #fff3cd; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="2000" fill="#ffffff"/>

  <!-- Header -->
  <text x="700" y="60" text-anchor="middle" class="title">The Iteration Philosophy</text>
  <text x="700" y="100" text-anchor="middle" class="subtitle">Why v1→v6 Drives Breakthrough Performance</text>
  <text x="700" y="130" text-anchor="middle" class="small">Rapid iteration, selective preservation, compounding knowledge</text>

  <!-- Main Title Banner -->
  <rect x="50" y="160" width="1300" height="80" rx="10" fill="#2a2a2a"/>
  <text x="700" y="205" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 600; fill: #ffb400;">
    Constraint-Driven > Specification-Driven Development
  </text>
  <text x="700" y="230" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 18px; fill: #ffffff;">
    Fast Iteration Beats Perfect Planning
  </text>

  <!-- Constraints Box -->
  <text x="50" y="290" class="heading">Constraints Drive Architecture</text>
  <rect x="50" y="300" width="1300" height="100" rx="10" fill="#fff3cd" stroke="#ffb400" stroke-width="2"/>

  <text x="100" y="330" style="font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600; fill: #ffb400;">💻 Hardware:</text>
  <text x="280" y="330" class="body">AVX-512, cache sizes, memory bandwidth, NUMA</text>

  <text x="100" y="355" style="font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600; fill: #ffb400;">⚡ Performance:</text>
  <text x="310" y="355" class="body">Latency targets, throughput, context limits</text>

  <text x="100" y="380" style="font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600; fill: #ffb400;">🔗 Compatibility:</text>
  <text x="350" y="380" class="body">Model formats, API stability, type system</text>

  <text x="700" y="365" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 14px; font-style: italic; fill: #ff6b6b;">
    "Constraints are discovered, not defined"
  </text>

  <!-- The Iteration Cycle (Top Section) -->
  <text x="50" y="450" class="heading">The Iteration Cycle</text>

  <!-- Cycle Box 1: Identify -->
  <rect x="50" y="480" width="250" height="180" rx="10" class="card-bg"/>
  <text x="175" y="520" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; fill: #ffb400;">
    1️⃣ Identify
  </text>
  <text x="175" y="545" text-anchor="middle" class="section-title">The Bottleneck</text>
  <text x="175" y="570" text-anchor="middle" class="body">What prevents</text>
  <text x="175" y="590" text-anchor="middle" class="body">better performance?</text>
  <text x="175" y="615" text-anchor="middle" class="small">• Profile workloads</text>
  <text x="175" y="635" text-anchor="middle" class="small">• Find hot spots</text>

  <!-- Arrow -->
  <path d="M 300 570 L 350 570" class="arrow"/>

  <!-- Cycle Box 2: Hypothesize -->
  <rect x="350" y="480" width="250" height="180" rx="10" class="card-bg"/>
  <text x="475" y="520" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; fill: #ffb400;">
    2️⃣ Hypothesize
  </text>
  <text x="475" y="545" text-anchor="middle" class="section-title">Generate Solutions</text>
  <text x="475" y="570" text-anchor="middle" class="body">3-5 potential</text>
  <text x="475" y="590" text-anchor="middle" class="body">approaches</text>
  <text x="475" y="615" text-anchor="middle" class="small">• Study competitors</text>
  <text x="475" y="635" text-anchor="middle" class="small">• Review research</text>

  <!-- Arrow -->
  <path d="M 600 570 L 650 570" class="arrow"/>

  <!-- Cycle Box 3: Prototype -->
  <rect x="650" y="480" width="250" height="180" rx="10" class="card-bg"/>
  <text x="775" y="520" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; fill: #ffb400;">
    3️⃣ Prototype
  </text>
  <text x="775" y="545" text-anchor="middle" class="section-title">Rapid Testing</text>
  <text x="775" y="570" text-anchor="middle" class="body">Build minimal</text>
  <text x="775" y="590" text-anchor="middle" class="body">proof-of-concept</text>
  <text x="775" y="615" text-anchor="middle" class="small">• Days, not weeks</text>
  <text x="775" y="635" text-anchor="middle" class="small">• Focus on core idea</text>

  <!-- Arrow -->
  <path d="M 900 570 L 950 570" class="arrow"/>

  <!-- Cycle Box 4: Measure & Scale -->
  <rect x="950" y="480" width="250" height="180" rx="10" class="card-bg"/>
  <text x="1075" y="520" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; fill: #ffb400;">
    4️⃣ Measure
  </text>
  <text x="1075" y="545" text-anchor="middle" class="section-title">Benchmark</text>
  <text x="1075" y="570" text-anchor="middle" class="body">If promising → scale</text>
  <text x="1075" y="590" text-anchor="middle" class="body">If not → discard</text>
  <text x="1075" y="615" text-anchor="middle" class="small">• Real workloads</text>
  <text x="1075" y="635" text-anchor="middle" class="small">• Measure everything</text>

  <!-- Curved arrow from Measure back to Identify -->
  <path d="M 1075 660 Q 700 710 175 660" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="700" y="730" text-anchor="middle" class="small" style="font-weight: 600; fill: #ffb400;">Repeat: Compounding Knowledge</text>

  <!-- v1→v6 Timeline (Middle Section) -->
  <text x="50" y="790" class="heading">v1→v6 Evolution: What We Learned</text>

  <!-- Timeline line -->
  <line x1="100" y1="840" x2="1300" y2="840" class="arrow-thin"/>

  <!-- v1 -->
  <circle cx="200" cy="840" r="12" class="keep"/>
  <text x="200" y="815" text-anchor="middle" class="version">v1</text>
  <rect x="120" y="870" width="160" height="140" rx="8" class="card-bg"/>
  <text x="200" y="900" text-anchor="middle" class="section-title">Proof of Concept</text>
  <text x="200" y="925" text-anchor="middle" class="small">Goal: Beat BLAS baseline</text>
  <text x="200" y="945" text-anchor="middle" class="small" style="fill: #47b475;">✓ Keep: Core structure</text>
  <text x="200" y="965" text-anchor="middle" class="small" style="fill: #ff6b6b;">✗ Discard: Over-engineering</text>
  <text x="200" y="985" text-anchor="middle" class="small">Learning: Architecture debt</text>

  <!-- v2 -->
  <circle cx="380" cy="840" r="12" class="learn"/>
  <text x="380" y="815" text-anchor="middle" class="version">v2</text>
  <rect x="300" y="870" width="160" height="140" rx="8" class="card-bg"/>
  <text x="380" y="900" text-anchor="middle" class="section-title">IR Revolution</text>
  <text x="380" y="925" text-anchor="middle" class="small">Goal: Portable codegen</text>
  <text x="380" y="945" text-anchor="middle" class="small" style="fill: #47b475;">✓ Keep: IR concept</text>
  <text x="380" y="965" text-anchor="middle" class="small" style="fill: #ff6b6b;">✗ Discard: Hardcoded paths</text>
  <text x="380" y="985" text-anchor="middle" class="small">Learning: Abstraction power</text>

  <!-- v3 -->
  <circle cx="560" cy="840" r="12" class="keep"/>
  <text x="560" y="815" text-anchor="middle" class="version">v3</text>
  <rect x="480" y="870" width="160" height="140" rx="8" class="card-bg"/>
  <text x="560" y="900" text-anchor="middle" class="section-title">Quant Breakthrough</text>
  <text x="560" y="925" text-anchor="middle" class="small">Goal: Multi-format quant</text>
  <text x="560" y="945" text-anchor="middle" class="small" style="fill: #47b475;">✓ Keep: Type-specific</text>
  <text x="560" y="965" text-anchor="middle" class="small" style="fill: #ff6b6b;">✗ Discard: FP32-only</text>
  <text x="560" y="985" text-anchor="middle" class="small">Learning: Specific > Generic</text>

  <!-- v4 -->
  <circle cx="740" cy="840" r="12" class="learn"/>
  <text x="740" y="815" text-anchor="middle" class="version">v4</text>
  <rect x="660" y="870" width="160" height="140" rx="8" class="card-bg"/>
  <text x="740" y="900" text-anchor="middle" class="section-title">Memory Safety</text>
  <text x="740" y="925" text-anchor="middle" class="small">Goal: Safe + deterministic</text>
  <text x="740" y="945" text-anchor="middle" class="small" style="fill: #47b475;">✓ Keep: Bump allocator</text>
  <text x="740" y="965" text-anchor="middle" class="small" style="fill: #ff6b6b;">✗ Discard: Manual memory</text>
  <text x="740" y="985" text-anchor="middle" class="small">Learning: Safety ≠ Slow</text>

  <!-- v5 -->
  <circle cx="920" cy="840" r="12" class="keep"/>
  <text x="920" y="815" text-anchor="middle" class="version">v5</text>
  <rect x="840" y="870" width="160" height="140" rx="8" class="card-bg"/>
  <text x="920" y="900" text-anchor="middle" class="section-title">Threading</text>
  <text x="920" y="925" text-anchor="middle" class="small">Goal: Efficient parallel</text>
  <text x="920" y="945" text-anchor="middle" class="small" style="fill: #47b475;">✓ Keep: Chunk scheduling</text>
  <text x="920" y="965" text-anchor="middle" class="small" style="fill: #ff6b6b;">✗ Discard: Poor work steal</text>
  <text x="920" y="985" text-anchor="middle" class="small">Learning: Partitioning matters</text>

  <!-- v6 -->
  <circle cx="1100" cy="840" r="12" class="highlight"/>
  <text x="1100" y="815" text-anchor="middle" class="version">v6</text>
  <rect x="1020" y="870" width="160" height="140" rx="8" class="card-bg"/>
  <text x="1100" y="900" text-anchor="middle" class="section-title">Flash Attention</text>
  <text x="1100" y="925" text-anchor="middle" class="small">Goal: Learn from ggml</text>
  <text x="1100" y="945" text-anchor="middle" class="small" style="fill: #47b475;">✓ Keep: All foundations</text>
  <text x="1100" y="965" text-anchor="middle" class="small" style="fill: #ff6b6b;">✗ Discard: Naive attention</text>
  <text x="1100" y="985" text-anchor="middle" class="small" style="font-weight: 600;">Learning: Be humble</text>

  <!-- What We Keep vs. Discard (Lower Section) -->
  <text x="50" y="1060" class="heading">Selective Preservation Strategy</text>

  <!-- Keep Column -->
  <rect x="50" y="1080" width="600" height="300" rx="10" class="card-bg"/>
  <text x="350" y="1115" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; fill: #47b475;">
    ✓ What We ALWAYS Keep
  </text>

  <circle cx="100" cy="1150" r="8" class="keep"/>
  <text x="120" y="1155" class="body">Performance-Critical Code</text>
  <text x="120" y="1175" class="small">• Hand-optimized SIMD kernels</text>
  <text x="120" y="1193" class="small">• Proven quantization formats</text>
  <text x="120" y="1211" class="small">• Efficient memory layouts</text>

  <circle cx="100" cy="1245" r="8" class="keep"/>
  <text x="120" y="1250" class="body">Architectural Foundations</text>
  <text x="120" y="1270" class="small">• IR-based code generation</text>
  <text x="120" y="1288" class="small">• Type abstraction layers</text>
  <text x="120" y="1306" class="small">• Safety guarantees</text>

  <circle cx="100" cy="1340" r="8" class="keep"/>
  <text x="120" y="1345" class="body">Testing Infrastructure</text>
  <text x="120" y="1365" class="small">• Comprehensive test suites</text>

  <!-- Discard Column -->
  <rect x="750" y="1080" width="600" height="300" rx="10" class="card-bg"/>
  <text x="1050" y="1115" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; fill: #ff6b6b;">
    ✗ What We AGGRESSIVELY Discard
  </text>

  <circle cx="800" cy="1150" r="8" class="discard"/>
  <text x="820" y="1155" class="body">Over-Engineering</text>
  <text x="820" y="1175" class="small">• Abstractions without benefit</text>
  <text x="820" y="1193" class="small">• Premature generalization</text>
  <text x="820" y="1211" class="small">• Complex edge case code</text>

  <circle cx="800" cy="1245" r="8" class="discard"/>
  <text x="820" y="1250" class="body">Proven Inefficiencies</text>
  <text x="820" y="1270" class="small">• Sub-optimal algorithms</text>
  <text x="820" y="1288" class="small">• Poor work partitioning</text>
  <text x="820" y="1306" class="small">• Unnecessary dependencies</text>

  <circle cx="800" cy="1340" r="8" class="discard"/>
  <text x="820" y="1345" class="body">Architectural Dogmatism</text>
  <text x="820" y="1365" class="small">• "We've always done it this way"</text>

  <!-- Compounding Knowledge Visual -->
  <text x="50" y="1420" class="heading">Compounding Knowledge Effect</text>

  <rect x="50" y="1440" width="1300" height="200" rx="10" class="card-bg"/>

  <!-- Traditional Approach -->
  <rect x="80" y="1460" width="500" height="160" rx="8" fill="#ffe0e0" stroke="#ff6b6b" stroke-width="2"/>
  <text x="330" y="1490" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; fill: #ff6b6b;">
    Traditional: Perfect v1
  </text>
  <text x="330" y="1515" text-anchor="middle" class="body">Time to breakthrough: 6-12 months</text>
  <text x="330" y="1535" text-anchor="middle" class="body">Risk: HIGH (single point of failure)</text>
  <text x="330" y="1560" text-anchor="middle" class="small">• Months of planning</text>
  <text x="330" y="1580" text-anchor="middle" class="small">• Discover flaws late</text>
  <text x="330" y="1600" text-anchor="middle" class="small">• Expensive refactoring</text>

  <!-- Iterative Approach -->
  <rect x="820" y="1460" width="500" height="160" rx="8" fill="#d4edda" stroke="#47b475" stroke-width="2"/>
  <text x="1070" y="1490" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; fill: #47b475;">
    Iterative: v1→v6
  </text>
  <text x="1070" y="1515" text-anchor="middle" class="body">Time to breakthrough: 6 months</text>
  <text x="1070" y="1535" text-anchor="middle" class="body">Risk: LOW (diversified experiments)</text>
  <text x="1070" y="1560" text-anchor="middle" class="small">• Learn fast from reality</text>
  <text x="1070" y="1580" text-anchor="middle" class="small">• 6x faster learning</text>
  <text x="1070" y="1600" text-anchor="middle" class="small">• Build on proven foundations</text>

  <!-- The 70% Rule -->
  <text x="50" y="1680" class="heading">The 70% Rule</text>

  <rect x="50" y="1700" width="1300" height="140" rx="10" class="highlight"/>
  <text x="700" y="1735" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; fill: #2a2a2a;">
    Ship when you're 70% happy with the architecture
  </text>
  <text x="700" y="1765" text-anchor="middle" class="body">The remaining 30% will be discovered through real-world usage</text>
  <text x="700" y="1790" text-anchor="middle" class="body">and become the foundation for v(next)</text>

  <text x="700" y="1825" text-anchor="middle" class="small" style="font-style: italic; fill: #ff6b6b;">
    Why 70%? Sweet spot: enough to solve fundamental problems, not so much time that bold changes feel painful.
  </text>

  <!-- Looking Forward -->
  <text x="50" y="1890" class="heading">Looking Forward: v7 and Beyond</text>

  <rect x="50" y="1910" width="1300" height="180" rx="10" class="card-bg"/>
  <text x="700" y="1945" text-anchor="middle" class="section-title">Already identified v7 directions:</text>

  <text x="100" y="1975" class="body">🔮 <tspan style="font-weight: 600;">Adaptive Algorithms:</tspan> Auto-select best kernel based on workload</text>
  <text x="100" y="1998" class="body">🔮 <tspan style="font-weight: 600;">Hardware Introspection:</tspan> Detect CPU features, generate optimal paths</text>
  <text x="100" y="2021" class="body">🔮 <tspan style="font-weight: 600;">Distributed Inference:</tspan> Multi-node acceleration</text>

  <text x="700" y="2055" text-anchor="middle" class="small" style="font-weight: 600; fill: #ffb400;">
    Each direction will be prototyped in v6.1/v6.2 before becoming v7
  </text>

  <!-- Footer -->
  <rect x="50" y="2120" width="1300" height="15" fill="#2a2a2a"/>
  <text x="700" y="2130" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 12px; fill: #ffb400;">
    C-Kernel-Engine Iteration Philosophy • v1→v6 and Beyond • Built for Change, Not Perfection
  </text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ffb400" />
    </marker>
  </defs>
</svg>
