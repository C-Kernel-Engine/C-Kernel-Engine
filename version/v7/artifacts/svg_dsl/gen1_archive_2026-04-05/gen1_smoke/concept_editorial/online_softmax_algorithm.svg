<svg width="1280" height="920" viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#07131f"/><stop offset="100%" stop-color="#11253a"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#47b475"/><stop offset="100%" stop-color="#79d79d"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0d2033"/><stop offset="100%" stop-color="#16314d"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(8,22,38,0.55)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#47b475"/></filter></defs><rect x="0" y="0" width="1280" height="920" fill="url(#bgGrad)"/><g opacity="0.24"><circle cx="230.4" cy="220.8" r="180" fill="#c7f4d6"/><circle cx="1126.4" cy="165.6" r="140" fill="#c7f4d6"/><circle cx="870.4" cy="772.8" r="220" fill="#79d79d" opacity="0.20"/></g><rect x="56.0" y="56.0" width="1168.0" height="132" rx="26" fill="#0d2033" fill-opacity="0.18" stroke="#28577d" stroke-width="1.2"/><rect x="78.0" y="74.0" width="240" height="9" rx="4.5" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="82.0" y="102.0" fill="#47b475" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Streaming Algorithms</tspan></text><text x="82.0" y="140.0" fill="#f8fafc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Online Softmax Algorithm</tspan></text><text x="82.0" y="172.0" fill="#9dd5ff" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Compute stable softmax statistics incrementally so long streams can stay exact without</tspan><tspan x="82.0" dy="18.8">materializing everything at once.</tspan></text><rect x="56.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="56.0" y="212.0" width="8" height="226.0" rx="4" fill="#47b475"/><rect x="78.0" y="232.0" width="527.0" height="28" rx="14" fill="#47b475" fill-opacity="0.11" stroke="#47b475" stroke-width="1"/><text x="88.0" y="251.0" fill="#47b475" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="88.0" dy="0">Naive softmax</tspan></text><text x="86.0" y="284.0" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="86.0" dy="0">Collect all scores first, then normalize. It</tspan><tspan x="86.0" dy="16.2">is simple, but it assumes full</tspan><tspan x="86.0" dy="16.2">materialization is affordable.</tspan></text><circle cx="92.0" cy="320.0" r="5" fill="#47b475"/><text x="106.0" y="324.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Store all scores</tspan></text><circle cx="92.0" cy="348.0" r="5" fill="#47b475"/><text x="106.0" y="352.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Normalize afterward</tspan></text><circle cx="92.0" cy="376.0" r="5" fill="#47b475"/><text x="106.0" y="380.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Memory cost grows fast</tspan></text><rect x="653.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="653.0" y="212.0" width="8" height="226.0" rx="4" fill="#79d79d"/><rect x="675.0" y="232.0" width="527.0" height="28" rx="14" fill="#79d79d" fill-opacity="0.11" stroke="#79d79d" stroke-width="1"/><text x="685.0" y="251.0" fill="#79d79d" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="685.0" dy="0">Online update</tspan></text><text x="683.0" y="284.0" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="683.0" dy="0">Track running maxima and partial sums so</tspan><tspan x="683.0" dy="16.2">normalization can stay exact while data</tspan><tspan x="683.0" dy="16.2">streams through.</tspan></text><circle cx="689.0" cy="320.0" r="5" fill="#79d79d"/><text x="703.0" y="324.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Update max on the fly</tspan></text><circle cx="689.0" cy="348.0" r="5" fill="#79d79d"/><text x="703.0" y="352.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Renormalize incrementally</tspan></text><circle cx="689.0" cy="376.0" r="5" fill="#79d79d"/><text x="703.0" y="380.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Preserve stability</tspan></text><rect x="56.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="482.0" width="336.0" height="24" rx="12" fill="#47b475" fill-opacity="0.10"/><text x="84.0" y="500.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="84.0" dy="0">Numerics</tspan></text><text x="80.0" y="534.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Stable running max</tspan></text><text x="80.0" y="564.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">The online form keeps a stable</tspan><tspan x="80.0" dy="15.0">maximum so the exponentials stay</tspan><tspan x="80.0" dy="15.0">numerically sane.</tspan></text><circle cx="84.0" cy="600.0" r="4.5" fill="#47b475"/><text x="98.0" y="604.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Track current max</tspan></text><circle cx="84.0" cy="624.0" r="4.5" fill="#47b475"/><text x="98.0" y="628.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Adjust previous sum</tspan></text><circle cx="84.0" cy="648.0" r="4.5" fill="#47b475"/><text x="98.0" y="652.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Avoid overflow</tspan></text><line x1="80.0" y1="646.0" x2="404.0" y2="646.0" stroke="#28577d" stroke-width="1"/><text x="80.0" y="670.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Numerical hygiene is part of</tspan><tspan x="80.0" dy="12.5">the algorithm.</tspan></text><rect x="454.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="472.0" y="482.0" width="336.0" height="24" rx="12" fill="#56aefc" fill-opacity="0.10"/><text x="482.0" y="500.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="482.0" dy="0">Systems</tspan></text><text x="478.0" y="534.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Streaming state</tspan></text><text x="478.0" y="564.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Only a compact state needs to live</tspan><tspan x="478.0" dy="15.0">in fast memory while the input</tspan><tspan x="478.0" dy="15.0">tiles stream through.</tspan></text><circle cx="482.0" cy="600.0" r="4.5" fill="#56aefc"/><text x="496.0" y="604.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Small working set</tspan></text><circle cx="482.0" cy="624.0" r="4.5" fill="#56aefc"/><text x="496.0" y="628.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Natural for tiles</tspan></text><circle cx="482.0" cy="648.0" r="4.5" fill="#56aefc"/><text x="496.0" y="652.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Fits flash-style loops</tspan></text><line x1="478.0" y1="646.0" x2="802.0" y2="646.0" stroke="#28577d" stroke-width="1"/><text x="478.0" y="670.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">The algebra lines up with</tspan><tspan x="478.0" dy="12.5">the memory story.</tspan></text><rect x="852.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="870.0" y="482.0" width="336.0" height="24" rx="12" fill="#ffb400" fill-opacity="0.10"/><text x="880.0" y="500.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="880.0" dy="0">Result</tspan></text><text x="876.0" y="534.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Exact normalization</tspan></text><text x="876.0" y="564.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">You trade materialization for a</tspan><tspan x="876.0" dy="15.0">structured recurrence, not for a</tspan><tspan x="876.0" dy="15.0">weaker answer.</tspan></text><circle cx="880.0" cy="600.0" r="4.5" fill="#ffb400"/><text x="894.0" y="604.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Exact result</tspan></text><circle cx="880.0" cy="624.0" r="4.5" fill="#ffb400"/><text x="894.0" y="628.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Lower memory pressure</tspan></text><circle cx="880.0" cy="648.0" r="4.5" fill="#ffb400"/><text x="894.0" y="652.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Better long-context</tspan><tspan x="894.0" dy="13.8">viability</tspan></text><line x1="876.0" y1="646.0" x2="1200.0" y2="646.0" stroke="#28577d" stroke-width="1"/><text x="876.0" y="670.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">The outcome matches the</tspan><tspan x="876.0" dy="12.5">dense version.</tspan></text><rect x="56.0" y="714.0" width="1168.0" height="104.0" rx="24" fill="#47b475" fill-opacity="0.08" stroke="#47b475" stroke-width="1.2"/><text x="80.0" y="744.0" fill="#47b475" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Key takeaway</tspan></text><circle cx="80.0" cy="765.0" r="5" fill="#47b475"/><text x="94.0" y="770.0" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="94.0" dy="0">Online softmax is a bridge</tspan><tspan x="94.0" dy="13.8">between numerical analysis</tspan><tspan x="94.0" dy="13.8">and systems design.</tspan></text><circle cx="453.3" cy="765.0" r="5" fill="#47b475"/><text x="467.3" y="770.0" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="467.3" dy="0">That bridge is easier to</tspan><tspan x="467.3" dy="13.8">teach with structured</tspan><tspan x="467.3" dy="13.8">editorial panels.</tspan></text><circle cx="826.7" cy="765.0" r="5" fill="#47b475"/><text x="840.7" y="770.0" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="840.7" dy="0">The DSL should expose the</tspan><tspan x="840.7" dy="13.8">recurrence, not just the</tspan><tspan x="840.7" dy="13.8">headline.</tspan></text><text x="1200.0" y="798.0" fill="#9dd5ff" font-size="10" font-weight="700" text-anchor="end" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1200.0" dy="0">online_softmax</tspan></text></svg>