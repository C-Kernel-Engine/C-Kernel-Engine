<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="v7 forward branching and backward stitching for residual and GQA attention">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061526"/>
      <stop offset="1" stop-color="#0b1f34"/>
    </linearGradient>
    <linearGradient id="fwdCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123652"/>
      <stop offset="1" stop-color="#102b44"/>
    </linearGradient>
    <linearGradient id="bwdCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20432e"/>
      <stop offset="1" stop-color="#1a3524"/>
    </linearGradient>
    <linearGradient id="kernelCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#302857"/>
      <stop offset="1" stop-color="#241f45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb400"/>
      <stop offset="1" stop-color="#ffd88a"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.28"/>
    </filter>

    <marker id="arrF" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#74cfff"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#7ce6b4"/>
    </marker>
    <marker id="arrW" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#f5a9dc"/>
    </marker>

    <style>
      .title { fill:#ffb400; font:700 42px 'Segoe UI', Arial, sans-serif; }
      .subtitle { fill:#a8c3d8; font:400 22px 'Segoe UI', Arial, sans-serif; }
      .lane { fill:#8fd6ff; font:700 18px 'Segoe UI', Arial, sans-serif; }
      .laneB { fill:#acefca; font:700 18px 'Segoe UI', Arial, sans-serif; }
      .nodeT { fill:#eaf6ff; font:700 18px 'Segoe UI', Arial, sans-serif; }
      .nodeS { fill:#a8c8dd; font:400 13px 'Segoe UI', Arial, sans-serif; }
      .nodeTB { fill:#effff5; font:700 18px 'Segoe UI', Arial, sans-serif; }
      .nodeSB { fill:#bfe7d0; font:400 13px 'Segoe UI', Arial, sans-serif; }
      .kernelT { fill:#f1eaff; font:700 18px 'Segoe UI', Arial, sans-serif; }
      .kernelS { fill:#d7ceff; font:400 13px 'Segoe UI', Arial, sans-serif; }
      .legend { fill:#dbe8f3; font:400 15px 'Segoe UI', Arial, sans-serif; }
      .footerK { fill:#ffd884; font:700 20px 'Segoe UI', Arial, sans-serif; }
      .footerS { fill:#d8e6f2; font:400 18px 'Segoe UI', Arial, sans-serif; }
      .lineF { stroke:#74cfff; stroke-width:3; fill:none; marker-end:url(#arrF); }
      .lineB { stroke:#7ce6b4; stroke-width:3; fill:none; marker-end:url(#arrB); }
      .lineW { stroke:#f5a9dc; stroke-width:3; fill:none; marker-end:url(#arrW); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect x="28" y="24" width="1544" height="932" rx="18" fill="#081a2b" stroke="#2b5373"/>

  <text class="title" x="64" y="86">Forward Branching and Backward Stitching (v7)</text>
  <text class="subtitle" x="64" y="120">IR2 handles routing + accumulation. local kernels compute internal derivatives.</text>
  <rect x="64" y="140" width="1472" height="8" rx="4" fill="url(#accent)"/>

  <rect x="64" y="170" width="748" height="42" rx="10" fill="#123149" stroke="#3f789d"/>
  <text class="lane" x="84" y="197">Forward producer flow</text>

  <rect x="836" y="170" width="700" height="42" rx="10" fill="#1f3c29" stroke="#4e9069"/>
  <text class="laneB" x="856" y="197">Backward consumer-gradient flow</text>

  <!-- Forward area -->
  <g filter="url(#shadow)">
    <rect x="84" y="232" width="148" height="68" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="102" y="258">x_in</text>
    <text class="nodeS" x="102" y="280">block input tensor</text>

    <rect x="264" y="232" width="170" height="68" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="282" y="258">rmsnorm</text>
    <text class="nodeS" x="282" y="280">norm path</text>

    <rect x="264" y="336" width="170" height="68" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="282" y="362">residual_save</text>
    <text class="nodeS" x="282" y="384">skip copy</text>

    <rect x="464" y="232" width="150" height="68" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="482" y="258">q/k/v proj</text>
    <text class="nodeS" x="482" y="280">3 GEMM ops</text>

    <rect x="644" y="232" width="148" height="68" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="662" y="258">qk_norm+rope</text>
    <text class="nodeS" x="662" y="280">GQA reshape</text>

    <rect x="644" y="336" width="148" height="68" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="662" y="362">attention</text>
    <text class="nodeS" x="662" y="384">head-major GQA</text>

    <rect x="644" y="440" width="148" height="68" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="662" y="466">out_proj</text>
    <text class="nodeS" x="662" y="488">GEMM + bias</text>

    <rect x="430" y="548" width="194" height="76" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="448" y="576">residual_add</text>
    <text class="nodeS" x="448" y="598">skip + out_proj</text>

    <rect x="654" y="548" width="138" height="76" rx="10" fill="url(#fwdCard)" stroke="#4280a8"/>
    <text class="nodeT" x="672" y="576">x_out</text>
    <text class="nodeS" x="672" y="598">to MLP</text>
  </g>

  <!-- Backward area -->
  <g filter="url(#shadow)">
    <rect x="856" y="232" width="170" height="68" rx="10" fill="url(#bwdCard)" stroke="#5ea77b"/>
    <text class="nodeTB" x="874" y="258">dL/dx_out</text>
    <text class="nodeSB" x="874" y="280">incoming grad</text>

    <rect x="1054" y="232" width="230" height="76" rx="10" fill="url(#bwdCard)" stroke="#5ea77b"/>
    <text class="nodeTB" x="1072" y="258">residual_add_bwd</text>
    <text class="nodeSB" x="1072" y="280">split to path1 + path2</text>

    <rect x="1312" y="232" width="130" height="76" rx="10" fill="url(#bwdCard)" stroke="#5ea77b"/>
    <text class="nodeTB" x="1330" y="258">d_skip</text>
    <text class="nodeSB" x="1330" y="280">path 1</text>

    <rect x="1054" y="340" width="388" height="104" rx="10" fill="url(#kernelCard)" stroke="#7a6dd5"/>
    <text class="kernelT" x="1072" y="366">attention backward kernel group</text>
    <text class="kernelS" x="1072" y="388">out_proj_bwd -> attn_bwd_gqa -> q/k/v_bwd</text>
    <text class="kernelS" x="1072" y="410">local kernels return dAct path + dW path</text>

    <rect x="1054" y="476" width="230" height="68" rx="10" fill="url(#bwdCard)" stroke="#5ea77b"/>
    <text class="nodeTB" x="1072" y="502">rmsnorm_bwd</text>
    <text class="nodeSB" x="1072" y="524">path 2 (d_norm_in)</text>

    <rect x="1054" y="576" width="388" height="96" rx="10" fill="url(#bwdCard)" stroke="#5ea77b"/>
    <text class="nodeTB" x="1072" y="604">grad_accumulate (IR2 explicit)</text>
    <text class="nodeSB" x="1072" y="626">dL/dx_in = d_skip + d_norm_in</text>
    <text class="nodeSB" x="1072" y="648">deterministic fanout/fanin merge</text>

    <rect x="856" y="714" width="586" height="78" rx="10" fill="url(#kernelCard)" stroke="#ba84dd"/>
    <text class="kernelT" x="874" y="742">dW stream stays separate</text>
    <text class="kernelS" x="874" y="764">grad.weight.* buffers are never merged into dAct buffers</text>
  </g>

  <!-- Forward connectors (non-overlapping lanes) -->
  <path class="lineF" d="M232 266 H256"/>
  <path class="lineF" d="M158 300 V370 H256"/>
  <path class="lineF" d="M434 266 H456"/>
  <path class="lineF" d="M614 266 H636"/>
  <path class="lineF" d="M718 300 V328"/>
  <path class="lineF" d="M718 404 V432"/>
  <path class="lineF" d="M718 508 V522 H630 V586"/>
  <path class="lineF" d="M348 404 V522 H430 V586"/>
  <path class="lineF" d="M624 586 H646"/>

  <!-- Backward connectors (split lanes for clarity) -->
  <path class="lineB" d="M1026 266 H1046"/>
  <path class="lineB" d="M1284 270 H1304"/>
  <path class="lineB" d="M1168 308 V336"/>
  <path class="lineB" d="M1168 444 V472"/>
  <path class="lineB" d="M1168 544 V572"/>
  <path class="lineB" d="M1377 308 V560"/>
  <path class="lineB" d="M1377 560 H1438"/>

  <!-- dW connectors on isolated lane -->
  <path class="lineW" d="M1298 444 V710"/>
  <path class="lineW" d="M1378 444 V710"/>

  <!-- Numbered badges -->
  <g>
    <circle cx="846" cy="246" r="12" fill="#ffb400" stroke="#ffe6b1" stroke-width="2"/>
    <text x="842" y="251" fill="#181818" font-size="14" font-family="Segoe UI, Arial" font-weight="700">1</text>

    <circle cx="1044" cy="246" r="12" fill="#ffb400" stroke="#ffe6b1" stroke-width="2"/>
    <text x="1040" y="251" fill="#181818" font-size="14" font-family="Segoe UI, Arial" font-weight="700">2</text>

    <circle cx="1044" cy="354" r="12" fill="#ffb400" stroke="#ffe6b1" stroke-width="2"/>
    <text x="1040" y="359" fill="#181818" font-size="14" font-family="Segoe UI, Arial" font-weight="700">3</text>

    <circle cx="1044" cy="490" r="12" fill="#ffb400" stroke="#ffe6b1" stroke-width="2"/>
    <text x="1040" y="495" fill="#181818" font-size="14" font-family="Segoe UI, Arial" font-weight="700">4</text>

    <circle cx="1302" cy="246" r="12" fill="#ffb400" stroke="#ffe6b1" stroke-width="2"/>
    <text x="1298" y="251" fill="#181818" font-size="14" font-family="Segoe UI, Arial" font-weight="700">5</text>

    <circle cx="1044" cy="590" r="12" fill="#ffb400" stroke="#ffe6b1" stroke-width="2"/>
    <text x="1040" y="595" fill="#181818" font-size="14" font-family="Segoe UI, Arial" font-weight="700">6</text>

    <circle cx="1286" cy="706" r="12" fill="#ffb400" stroke="#ffe6b1" stroke-width="2"/>
    <text x="1282" y="711" fill="#181818" font-size="14" font-family="Segoe UI, Arial" font-weight="700">7</text>

    <circle cx="1432" cy="590" r="12" fill="#ffb400" stroke="#ffe6b1" stroke-width="2"/>
    <text x="1428" y="595" fill="#181818" font-size="14" font-family="Segoe UI, Arial" font-weight="700">8</text>
  </g>

  <!-- Legend -->
  <rect x="64" y="714" width="748" height="78" rx="10" fill="#0f253a" stroke="#366380"/>
  <circle cx="92" cy="753" r="6" fill="#74cfff"/>
  <text class="legend" x="106" y="758">forward activation flow</text>
  <circle cx="300" cy="753" r="6" fill="#7ce6b4"/>
  <text class="legend" x="314" y="758">backward dAct flow</text>
  <circle cx="502" cy="753" r="6" fill="#f5a9dc"/>
  <text class="legend" x="516" y="758">dW flow</text>

  <!-- Footer -->
  <rect x="64" y="834" width="1472" height="62" rx="10" fill="#10263a" stroke="#3c6582"/>
  <text class="footerK" x="84" y="872">v7 contract:</text>
  <text class="footerS" x="232" y="872">IR stitches topology + ownership. kernels do local derivatives. codegen emits a fixed plan.</text>
</svg>
