<svg width="1700" height="980" viewBox="0 0 1700 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="v6.6 evolution timeline with dated milestones">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1826"/>
      <stop offset="100%" stop-color="#11263a"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182b40"/>
      <stop offset="100%" stop-color="#122235"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#000" flood-opacity="0.27"/>
    </filter>
    <style>
      .title { font: 800 40px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #f3f9ff; }
      .sub { font: 500 18px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #b7cce1; }
      .date { font: 700 16px 'IBM Plex Mono', monospace; fill: #8ddfff; }
      .h { font: 700 20px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #ffddb0; }
      .b { font: 500 15px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #c6d9ec; }
    </style>
  </defs>

  <rect width="1700" height="980" fill="url(#bg)"/>
  <rect x="24" y="22" width="1652" height="936" rx="16" fill="none" stroke="#2f4b66" stroke-width="2"/>

  <text x="62" y="82" class="title">v6.6 Evolution Timeline</text>
  <text x="62" y="116" class="sub">Use dated milestones to reconstruct why gate behavior looks the way it does today.</text>

  <line x1="120" y1="510" x2="1580" y2="510" stroke="#6ea8d4" stroke-width="5"/>

  <g filter="url(#shadow)">
    <rect x="120" y="196" width="250" height="250" rx="14" fill="url(#node)" stroke="#406589"/>
    <rect x="425" y="570" width="250" height="250" rx="14" fill="url(#node)" stroke="#406589"/>
    <rect x="730" y="196" width="250" height="250" rx="14" fill="url(#node)" stroke="#406589"/>
    <rect x="1035" y="570" width="250" height="250" rx="14" fill="url(#node)" stroke="#406589"/>
    <rect x="1340" y="196" width="250" height="250" rx="14" fill="url(#node)" stroke="#406589"/>
  </g>

  <circle cx="245" cy="510" r="12" fill="#ffca7e"/>
  <line x1="245" y1="446" x2="245" y2="510" stroke="#8ebfe5" stroke-width="3"/>
  <text x="144" y="238" class="date">2026-02-08</text>
  <text x="144" y="272" class="h">Matrix foundation</text>
  <text x="144" y="304" class="b">Dynamic model matrix</text>
  <text x="144" y="330" class="b">(Qwen2/Qwen3/Gemma)</text>
  <text x="144" y="362" class="b">build+artifact checks</text>

  <circle cx="550" cy="510" r="12" fill="#ffca7e"/>
  <line x1="550" y1="510" x2="550" y2="570" stroke="#8ebfe5" stroke-width="3"/>
  <text x="450" y="612" class="date">2026-02-09</text>
  <text x="450" y="646" class="h">Sliding contract</text>
  <text x="450" y="678" class="b">Explicit prefill/decode</text>
  <text x="450" y="704" class="b">sliding-window kernel</text>
  <text x="450" y="736" class="b">reference parity test</text>

  <circle cx="855" cy="510" r="12" fill="#ffca7e"/>
  <line x1="855" y1="446" x2="855" y2="510" stroke="#8ebfe5" stroke-width="3"/>
  <text x="754" y="238" class="date">2026-02-10</text>
  <text x="754" y="272" class="h">Contract preflight</text>
  <text x="754" y="304" class="b">Tooling contract</text>
  <text x="754" y="330" class="b">validator added for</text>
  <text x="754" y="362" class="b">IR/codegen/parity handoffs</text>

  <circle cx="1160" cy="510" r="12" fill="#ffca7e"/>
  <line x1="1160" y1="510" x2="1160" y2="570" stroke="#8ebfe5" stroke-width="3"/>
  <text x="1060" y="612" class="date">2026-02-11</text>
  <text x="1060" y="646" class="h">Unified gate path</text>
  <text x="1060" y="678" class="b">make v6.6-gate as</text>
  <text x="1060" y="704" class="b">operator entrypoint,</text>
  <text x="1060" y="736" class="b">plus parity/longdecode</text>

  <circle cx="1465" cy="510" r="12" fill="#8fdfff"/>
  <line x1="1465" y1="446" x2="1465" y2="510" stroke="#8ebfe5" stroke-width="3"/>
  <text x="1364" y="238" class="date">Next 6 months</text>
  <text x="1364" y="272" class="h">Operator hardening</text>
  <text x="1364" y="304" class="b">Race-safe cache writes,</text>
  <text x="1364" y="330" class="b">clear SKIP semantics,</text>
  <text x="1364" y="362" class="b">broader edge-case gates</text>

  <rect x="60" y="864" width="1580" height="74" rx="12" fill="#102033" stroke="#3b6287"/>
  <text x="90" y="906" class="b">Interpretation: v6.6 moved from "can we build?" to "can operators trust the gate outputs across model families?"</text>
</svg>
