name: Nightly Tests

on:
  # Run nightly at 2am UTC
  schedule:
    - cron: '0 2 * * *'

  # Also run on push to main and PRs
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - quick
          - e2e
          - parity

# Need write access to push to gh-pages
permissions:
  contents: write
  pages: write

jobs:
  # ===========================================================================
  # Job 1: Build CK-Engine (shared by all test jobs)
  # ===========================================================================
  build:
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CPU features
        run: |
          echo "=== CPU Info ==="
          lscpu | grep -E "(Model name|CPU\(s\)|Thread|Core|Socket|Flags)"
          echo "AVX2: $(grep -q avx2 /proc/cpuinfo && echo YES || echo NO)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build CK-Engine
        id: build
        run: |
          make clean || true
          make -j$(nproc)
          make libck_parity.so || echo "Parity lib build failed (optional)"
          echo ""
          echo "=== Built libraries ==="
          ls -la build/*.so 2>/dev/null || echo "No .so files"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ck-engine-build
          path: |
            build/
            include/
            src/
            scripts/
            Makefile
            requirements.txt
          retention-days: 1

  # ===========================================================================
  # Job 2: E2E Inference Tests (Runner 1 - needs GGUF model, NO llama.cpp)
  # ===========================================================================
  test-e2e:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'e2e' || github.event.inputs.test_category == '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ck-engine-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface_hub

      - name: Download GGUF model for E2E
        run: |
          echo "=== Downloading GGUF model ==="
          GGUF_DIR=~/.cache/ck-engine-v6.5/models/Qwen--Qwen2-0.5B-Instruct-GGUF
          mkdir -p "$GGUF_DIR"
          GGUF_FILE="$GGUF_DIR/qwen2-0_5b-instruct-q4_k_m.gguf"

          if [ ! -f "$GGUF_FILE" ]; then
            echo "Downloading Qwen2-0.5B-Instruct Q4_K_M (~350MB)..."
            wget -q --show-progress \
              "https://huggingface.co/Qwen/Qwen2-0.5B-Instruct-GGUF/resolve/main/qwen2-0_5b-instruct-q4_k_m.gguf" \
              -O "$GGUF_FILE" || {
                echo "Qwen download failed, trying SmolLM2..."
                GGUF_DIR=~/.cache/ck-engine-v6.5/models/SmolLM2-360M-GGUF
                mkdir -p "$GGUF_DIR"
                GGUF_FILE="$GGUF_DIR/smollm2-360m-instruct-q4_k_m.gguf"
                wget -q --show-progress \
                  "https://huggingface.co/itlwas/SmolLM2-360M-Q4_K_M-GGUF/resolve/main/smollm2-360m-instruct-q4_k_m.gguf" \
                  -O "$GGUF_FILE"
              }
          fi
          echo "GGUF_FILE=$GGUF_FILE" >> $GITHUB_ENV
          ls -lh "$GGUF_FILE"

      - name: Rebuild library (ensure fresh)
        run: |
          chmod +x build/*.so 2>/dev/null || true
          make -j$(nproc)

      - name: Run E2E Integration Tests
        run: |
          echo "=== Running E2E Integration Tests ==="
          make e2e 2>&1 | tee build/e2e_test.log || {
            echo "::warning::E2E tests had issues - check logs"
          }

          if grep -q "All tests passed" build/e2e_test.log; then
            echo "E2E_STATUS=passed" >> $GITHUB_ENV
            echo "✅ E2E Tests: PASSED"
          elif grep -q "memory limits" build/e2e_test.log; then
            echo "E2E_STATUS=skipped" >> $GITHUB_ENV
            echo "⚠️ E2E Tests: Skipped (memory limits)"
          else
            echo "E2E_STATUS=partial" >> $GITHUB_ENV
            echo "⚠️ E2E Tests: Partial"
          fi

      - name: Run Pipeline Tests
        run: |
          echo "=== Running Pipeline Tests ==="
          make test-pipeline-quick 2>&1 | tee build/pipeline_test.log || true
          grep -E "Layer [0-9]:" build/pipeline_test.log || true

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: build/*.log
          retention-days: 7

  # ===========================================================================
  # Job 3: Parity Tests (Runner 2 - needs llama.cpp + SmolLM)
  # ===========================================================================
  test-parity:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.test_category == 'all' || github.event.inputs.test_category == 'parity' || github.event.inputs.test_category == '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ck-engine-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface_hub torch

      - name: Download SmolLM-135M for parity tests
        run: |
          echo "=== Downloading SmolLM-135M ==="
          python -c "
          from huggingface_hub import snapshot_download
          import os
          target = os.path.expanduser('~/.cache/huggingface/hub/SmolLM-135M')
          print(f'Downloading SmolLM-135M to {target}...')
          snapshot_download('HuggingFaceTB/SmolLM-135M', local_dir=target)
          print('Done!')
          "

      - name: Build llama.cpp for parity testing
        run: |
          echo "=== Building llama.cpp ==="
          LLAMA_CPP_COMMIT="${LLAMA_CPP_COMMIT:-b4876}"

          if [ ! -d "llama.cpp" ]; then
            git clone --depth 100 https://github.com/ggerganov/llama.cpp.git
          fi

          cd llama.cpp
          git fetch --depth 100 origin "$LLAMA_CPP_COMMIT" 2>/dev/null || true
          git checkout "$LLAMA_CPP_COMMIT" 2>/dev/null || echo "Using current HEAD"
          echo "llama.cpp at: $(git rev-parse --short HEAD)"

          # Apply patches
          if [ -f "../patches/test-kernel-parity.cpp" ]; then
            mkdir -p tests
            cp ../patches/test-kernel-parity.cpp tests/
          fi

          # Build
          cmake -B build -DGGML_CPU=ON -DLLAMA_BUILD_TESTS=OFF -DLLAMA_CURL=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

          # Build kernel test library
          if [ -f "tests/test-kernel-parity.cpp" ]; then
            export LD_LIBRARY_PATH="$PWD/build/bin:$LD_LIBRARY_PATH"
            g++ -shared -fPIC -o libggml_kernel_test.so \
              tests/test-kernel-parity.cpp \
              -I ggml/include -I ggml/src \
              -L build/bin -lggml -lggml-cpu -lggml-base -lm -lpthread \
              -Wl,-rpath,'$ORIGIN/build/bin' || echo "Kernel test lib failed"
          fi
          cd ..

      - name: Rebuild CK parity library
        run: |
          make -j$(nproc)
          make libck_parity.so || echo "Parity lib failed"

      - name: Run Kernel Parity Tests
        run: |
          echo "=== Running Kernel Parity Tests ==="
          export LD_LIBRARY_PATH="$PWD/llama.cpp/build/bin:$LD_LIBRARY_PATH"

          ./scripts/run_parity_smoketest.sh --quick 2>&1 | tee build/parity_test.log || {
            echo "::warning::Parity tests had issues"
          }

          if grep -q "ALL TESTS PASSED" build/parity_test.log; then
            echo "✅ Parity Tests: PASSED"
          else
            echo "⚠️ Parity Tests: Some failures"
          fi

      - name: Run Full Nightly Test Suite
        run: |
          echo "=== Running Full Nightly Test Suite ==="
          echo "Includes: 30+ kernel tests, BF16, quantization, training tests"
          echo ""

          # Always run FULL suite to catch all regressions
          echo "Mode: Full (all 30+ tests)"
          python scripts/nightly_runner.py --no-fail --json build/nightly_report.json 2>&1 | tee build/nightly_test.log

          # Show summary
          if [ -f build/nightly_report.json ]; then
            echo ""
            echo "=== Nightly Test Summary ==="
            python3 -c "
          import json
          d = json.load(open('build/nightly_report.json'))
          s = d['summary']
          print(f\"Passed: {s['passed']}\")
          print(f\"Failed: {s['failed']}\")
          print(f\"Total:  {s['total']}\")
          if s['failed'] > 0:
              print('')
              print('Failed tests:')
              for r in d['results']:
                  if r['status'] in ('fail', 'timeout'):
                      print(f\"  - {r['name']} [{r['category']}]\")
          "
          fi

      - name: Upload parity results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-results
          path: |
            build/*.log
            build/*.json
          retention-days: 7

  # ===========================================================================
  # Job 4: Summary (runs after both test jobs)
  # ===========================================================================
  summary:
    runs-on: ubuntu-latest
    needs: [build, test-e2e, test-parity]
    if: always()

    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results/

      - name: Generate Summary
        run: |
          echo "## CI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.test-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Parity Tests | ${{ needs.test-parity.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        run: |
          if [ "${{ needs.build.result }}" == "failure" ]; then
            echo "::error::Build failed"
            exit 1
          fi
          # E2E and parity failures are warnings, not blockers
          if [ "${{ needs.test-e2e.result }}" == "failure" ]; then
            echo "::warning::E2E tests failed"
          fi
          if [ "${{ needs.test-parity.result }}" == "failure" ]; then
            echo "::warning::Parity tests failed"
          fi
