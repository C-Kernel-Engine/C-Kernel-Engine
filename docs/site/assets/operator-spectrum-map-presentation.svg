<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" role="img"
     aria-label="C Kernel Engine — Data × Computation Spectrum">
  <defs>
    <linearGradient id="pBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#090d13"/>
    </linearGradient>

    <!-- Vertical warm→cool field — you are always inside the spectrum -->
    <linearGradient id="pFg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffb400" stop-opacity="0.09"/>
      <stop offset="45%"  stop-color="#a070ff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#07adf8" stop-opacity="0.11"/>
    </linearGradient>

    <!-- Spectrum axis strip -->
    <linearGradient id="pSa" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffb400" stop-opacity="0.88"/>
      <stop offset="28%"  stop-color="#ffb400" stop-opacity="0.40"/>
      <stop offset="50%"  stop-color="#a070ff" stop-opacity="0.68"/>
      <stop offset="72%"  stop-color="#07adf8" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#07adf8" stop-opacity="0.88"/>
    </linearGradient>

    <!-- Rails -->
    <linearGradient id="pRd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#facc15"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="pRc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Band fills -->
    <linearGradient id="pBd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffb400" stop-opacity="0.02"/>
      <stop offset="50%"  stop-color="#ffb400" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffb400" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="pBc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#07adf8" stop-opacity="0.02"/>
      <stop offset="50%"  stop-color="#07adf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#07adf8" stop-opacity="0.02"/>
    </linearGradient>

    <!-- IR bar -->
    <linearGradient id="pIf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#47b475" stop-opacity="0.25"/>
      <stop offset="50%"  stop-color="#47b475" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#47b475" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="pfG"  x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="5"  flood-color="#ffb400" flood-opacity="0.50"/>
    </filter>
    <filter id="pfB"  x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="5"  flood-color="#07adf8" flood-opacity="0.50"/>
    </filter>
    <filter id="pfA"  x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="9"  flood-color="#f59e0b" flood-opacity="0.68"/>
    </filter>
    <filter id="pfBl" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="9"  flood-color="#07adf8" flood-opacity="0.68"/>
    </filter>
    <filter id="pfP"  x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6"  flood-color="#a070ff" flood-opacity="0.52"/>
    </filter>
    <filter id="pfGr" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#47b475" flood-opacity="0.48"/>
    </filter>

    <!-- Markers -->
    <marker id="paG"  viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7"   markerHeight="7"   orient="auto">
      <path d="M0,1 L7,4 L0,7 Z" fill="#ffb400"/>
    </marker>
    <marker id="paB"  viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7"   markerHeight="7"   orient="auto">
      <path d="M0,1 L7,4 L0,7 Z" fill="#07adf8"/>
    </marker>
    <marker id="paPD" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6"   markerHeight="6"   orient="auto">
      <path d="M0,1 L7,4 L0,7 Z" fill="#a070ff"/>
    </marker>
    <marker id="paPU" viewBox="0 0 8 8" refX="1" refY="4" markerWidth="6"   markerHeight="6"   orient="auto">
      <path d="M8,1 L1,4 L8,7 Z" fill="#a070ff"/>
    </marker>
  </defs>

  <!-- ── BACKGROUND ──────────────────────────────────────────────────── -->
  <rect width="1400" height="620" rx="16" fill="url(#pBg)"/>
  <rect width="1400" height="620" rx="16" fill="url(#pFg)"/>
  <rect x="8" y="8" width="1384" height="604" rx="14" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ── HEADER ─────────────────────────────────────────────────────── -->
  <text x="50" y="48" fill="#f1f5f9" font-size="26" font-family="Segoe UI,Arial,sans-serif"
        font-weight="700" letter-spacing="-0.5">C Kernel Engine — Data × Computation Spectrum</text>
  <text x="50" y="73" fill="#6b7280" font-size="13" font-family="Segoe UI,Arial,sans-serif">
    Data pipelines and computation are not separate phases. They form one traversable spectrum — every stage is re-entrant, no step is once-and-done.
  </text>

  <!-- ── DATA SPECTRUM BAND  y=90→207 ─────────────────────────────── -->
  <text x="100" y="114" fill="#ffb400" font-size="11" font-family="Segoe UI,Arial,sans-serif"
        font-weight="700" text-anchor="end">DATA</text>
  <text x="100" y="128" fill="#ffb400" font-size="11" font-family="Segoe UI,Arial,sans-serif"
        font-weight="700" text-anchor="end">SPECTRUM</text>
  <text x="100" y="142" fill="rgba(255,180,0,0.50)" font-size="10" font-family="Segoe UI,Arial,sans-serif"
        text-anchor="end">← →</text>

  <rect x="112" y="90" width="1258" height="117" rx="10"
        fill="url(#pBd)" stroke="rgba(255,180,0,0.18)" stroke-width="1.2"/>

  <!-- Data rail  y=148 -->
  <path d="M165,148 C240,136 440,160 515,148 C590,136 795,160 870,148 C945,136 1140,160 1215,148"
        fill="none" stroke="rgba(0,0,0,0.40)" stroke-width="7" stroke-linecap="round"/>
  <path d="M165,148 C240,136 440,160 515,148 C590,136 795,160 870,148 C945,136 1140,160 1215,148"
        fill="none" stroke="url(#pRd)" stroke-width="4.5" stroke-linecap="round" filter="url(#pfG)"/>

  <!-- Rail arrow + re-entry arc -->
  <line x1="1218" y1="148" x2="1246" y2="148" stroke="#fb923c" stroke-width="3"
        marker-end="url(#paG)" opacity="0.85"/>
  <line x1="138"  y1="148" x2="162"  y2="148" stroke="#facc15" stroke-width="3"
        marker-end="url(#paG)" opacity="0.38"/>
  <path d="M1215,135 C1227,123 1254,121 1267,127 C1279,134 1277,147 1262,149"
        fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3" opacity="0.50"
        marker-end="url(#paG)"/>

  <!-- Data nodes  r=18 -->
  <g fill="#0d1117" stroke-width="2.8">
    <circle cx="165"  cy="148" r="18" stroke="#facc15"/>
    <circle cx="515"  cy="148" r="18" stroke="#ffb400"/>
    <circle cx="870"  cy="148" r="18" stroke="#fb923c"/>
    <circle cx="1215" cy="148" r="18" stroke="#ef4444"/>
  </g>
  <circle cx="165"  cy="148" r="5" fill="#facc15"/>
  <circle cx="515"  cy="148" r="5" fill="#ffb400"/>
  <circle cx="870"  cy="148" r="5" fill="#fb923c"/>
  <circle cx="1215" cy="148" r="5" fill="#ef4444"/>

  <!-- Data stage names -->
  <g fill="#e2e8f0" font-size="14" font-family="Segoe UI,Arial,sans-serif"
     text-anchor="middle" font-weight="700">
    <text x="165"  y="112">Corpus Curation</text>
    <text x="515"  y="112">Tokenize + QC</text>
    <text x="870"  y="112">Align + SFT</text>
    <text x="1215" y="112">Policy Loop</text>
  </g>

  <!-- ── SPECTRUM AXIS STRIP  y=213→239 ───────────────────────────── -->
  <rect x="112" y="213" width="1258" height="26" rx="13" fill="url(#pSa)" opacity="0.88"/>
  <text x="124" y="231" fill="rgba(255,180,0,0.88)" font-size="10.5"
        font-family="Segoe UI,Arial,sans-serif" font-weight="600">← data-heavy</text>
  <text x="1258" y="231" fill="rgba(7,173,248,0.88)" font-size="10.5"
        font-family="Segoe UI,Arial,sans-serif" text-anchor="end" font-weight="600">compute-heavy →</text>
  <text x="695" y="231" fill="rgba(160,112,255,0.95)" font-size="12"
        font-family="Segoe UI,Arial,sans-serif" text-anchor="middle" font-weight="700">
    ⇄  re-entrant at any point  ⇄
  </text>

  <!-- ── COUPLING ZONE  y=246→330 ─────────────────────────────────── -->
  <rect x="112" y="246" width="1258" height="84" rx="10"
        fill="rgba(160,112,255,0.04)" stroke="rgba(160,112,255,0.10)" stroke-width="1.2"/>

  <text x="695" y="289" fill="rgba(160,112,255,0.52)" font-size="13.5"
        font-family="Segoe UI,Arial,sans-serif" text-anchor="middle" font-style="italic">
    data shapes the compute graph · compute results drive the next data pass
  </text>

  <!-- 4 bidirectional coupling arrows -->
  <line x1="165"  y1="247" x2="165"  y2="329" stroke="#8050c0" stroke-width="2.2"
        stroke-dasharray="5 3.5" opacity="0.65"
        marker-end="url(#paPD)" marker-start="url(#paPU)"/>
  <line x1="515"  y1="247" x2="515"  y2="329" stroke="#8050c0" stroke-width="2.2"
        stroke-dasharray="5 3.5" opacity="0.65"
        marker-end="url(#paPD)" marker-start="url(#paPU)"/>
  <line x1="870"  y1="247" x2="870"  y2="329" stroke="#b090ff" stroke-width="3.5"
        stroke-dasharray="6 3.5" opacity="0.88"
        marker-end="url(#paPD)" marker-start="url(#paPU)" filter="url(#pfP)"/>
  <line x1="1215" y1="247" x2="1215" y2="329" stroke="#b090ff" stroke-width="3.5"
        stroke-dasharray="6 3.5" opacity="0.88"
        marker-end="url(#paPD)" marker-start="url(#paPU)" filter="url(#pfP)"/>

  <!-- ── COMPUTE SPECTRUM BAND  y=337→511 ─────────────────────────── -->
  <text x="100" y="394" fill="#07adf8" font-size="11" font-family="Segoe UI,Arial,sans-serif"
        font-weight="700" text-anchor="end">COMPUTE</text>
  <text x="100" y="408" fill="#07adf8" font-size="11" font-family="Segoe UI,Arial,sans-serif"
        font-weight="700" text-anchor="end">SPECTRUM</text>
  <text x="100" y="422" fill="rgba(7,173,248,0.50)" font-size="10" font-family="Segoe UI,Arial,sans-serif"
        text-anchor="end">← →</text>

  <rect x="112" y="337" width="1258" height="174" rx="10"
        fill="url(#pBc)" stroke="rgba(7,173,248,0.18)" stroke-width="1.2"/>

  <!-- Pre-fork compute rail  x=165→515  y=424 -->
  <path d="M165,424 C240,412 440,436 515,424"
        fill="none" stroke="rgba(0,0,0,0.40)" stroke-width="7" stroke-linecap="round"/>
  <path d="M165,424 C240,412 440,436 515,424"
        fill="none" stroke="url(#pRc)" stroke-width="4.5" stroke-linecap="round" filter="url(#pfB)"/>

  <!-- Post-fork compute rail  x=870→1215  y=424 -->
  <path d="M870,424 C945,412 1140,436 1215,424"
        fill="none" stroke="rgba(0,0,0,0.40)" stroke-width="7" stroke-linecap="round"/>
  <path d="M870,424 C945,412 1140,436 1215,424"
        fill="none" stroke="url(#pRc)" stroke-width="4.5" stroke-linecap="round" filter="url(#pfB)"/>

  <!-- ── UPPER FORK ARC: Training IR (amber) ─────────────────────────
       IR1 fwd (save_for_backward · fp32) + IR2 bwd (reverse synthesis)
  ──────────────────────────────────────────────────────────────────── -->
  <path d="M515,424 C590,380 800,380 870,424"
        fill="none" stroke="rgba(0,0,0,0.40)" stroke-width="7" stroke-linecap="round"/>
  <path d="M515,424 C590,380 800,380 870,424"
        fill="none" stroke="#f59e0b" stroke-width="4.5" stroke-linecap="round" filter="url(#pfA)"/>

  <!-- ── LOWER FORK ARC: Inference IR (blue) ─────────────────────────
       Decode path (gemv · single token · KV read) +
       Prefill path (gemm_nt · multi-token · KV write)
  ──────────────────────────────────────────────────────────────────── -->
  <path d="M515,424 C590,468 800,468 870,424"
        fill="none" stroke="rgba(0,0,0,0.40)" stroke-width="7" stroke-linecap="round"/>
  <path d="M515,424 C590,468 800,468 870,424"
        fill="none" stroke="#07adf8" stroke-width="4.5" stroke-linecap="round" filter="url(#pfBl)"/>

  <!-- Rail arrow + re-entry arc -->
  <line x1="1218" y1="424" x2="1246" y2="424" stroke="#0ea5e9" stroke-width="3"
        marker-end="url(#paB)" opacity="0.85"/>
  <line x1="138"  y1="424" x2="162"  y2="424" stroke="#60a5fa" stroke-width="3"
        marker-end="url(#paB)" opacity="0.38"/>
  <path d="M1215,411 C1227,399 1254,397 1267,403 C1279,410 1277,423 1262,425"
        fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="5 3" opacity="0.48"
        marker-end="url(#paB)"/>

  <!-- FORK NODE x=515, y=424, r=20 — half amber (train) / half blue (infer) -->
  <path d="M495,424 A20,20 0 0,1 535,424 Z" fill="#c97c0a" opacity="0.95"/>
  <path d="M495,424 A20,20 0 0,0 535,424 Z" fill="#0b8fcc" opacity="0.95"/>
  <circle cx="515" cy="424" r="21.5" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="515" cy="424" r="4.5"  fill="#f1f5f9"/>

  <!-- MERGE / CODEGEN NODE x=870 -->
  <path d="M850,424 A20,20 0 0,1 890,424 Z" fill="#c97c0a" opacity="0.95"/>
  <path d="M850,424 A20,20 0 0,0 890,424 Z" fill="#0b8fcc" opacity="0.95"/>
  <circle cx="870" cy="424" r="21.5" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="870" cy="424" r="4.5"  fill="#f1f5f9"/>

  <!-- Regular compute nodes  r=18 -->
  <g fill="#0d1117" stroke-width="2.8">
    <circle cx="165"  cy="424" r="18" stroke="#60a5fa"/>
    <circle cx="1215" cy="424" r="18" stroke="#0ea5e9"/>
  </g>
  <circle cx="165"  cy="424" r="5" fill="#60a5fa"/>
  <circle cx="1215" cy="424" r="5" fill="#0ea5e9"/>

  <!-- Compute stage names -->
  <g fill="#e2e8f0" font-size="14" font-family="Segoe UI,Arial,sans-serif"
     text-anchor="middle" font-weight="700">
    <text x="165"  y="356">Kernels + Math</text>
    <text x="515"  y="356">IR Build</text>
    <text x="870"  y="356">Codegen</text>
    <text x="1215" y="356">Deploy</text>
  </g>

  <!-- Fork arc labels — bold, glowing, centered on arc midpoint -->
  <!-- Train: arc midpoint ≈ (694, 391) → label baseline at y=383 -->
  <text x="694" y="383" fill="#f59e0b" font-size="14" font-family="Segoe UI,Arial,sans-serif"
        text-anchor="middle" font-weight="700" filter="url(#pfA)">Training IR  (fwd + bwd)</text>

  <!-- Infer: arc midpoint ≈ (694, 457) → label baseline at y=471 -->
  <text x="694" y="471" fill="#07adf8" font-size="14" font-family="Segoe UI,Arial,sans-serif"
        text-anchor="middle" font-weight="700" filter="url(#pfBl)">Inference IR  (decode + prefill)</text>

  <!-- ── IR VISUALIZER BAR ──────────────────────────────────────────── -->
  <rect x="32" y="527" width="1336" height="38" rx="9"
        fill="url(#pIf)" stroke="rgba(71,180,117,0.40)" stroke-width="1" filter="url(#pfGr)"/>
  <text x="700" y="551" fill="#47b475" font-size="13" font-family="Segoe UI,Arial,sans-serif"
        font-weight="700" text-anchor="middle" letter-spacing="0.3">
    ◎ IR Visualizer (ir_report.html) — Train · Infer · Data Lab · Parity — full observability at every stage
  </text>

  <!-- ── FOOTER ─────────────────────────────────────────────────────── -->
  <text x="700" y="590" fill="#374151" font-size="10" font-family="Segoe UI,Arial,sans-serif"
        text-anchor="middle">
    IR Build forks: Training builds forward + backward graphs (fp32);  Inference builds decode (gemv) + prefill (gemm) paths (quantized, KV cache).  Both converge at Codegen.
  </text>
</svg>
