<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="hashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pytorchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#339af0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228be6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#1a1a2e"/>
  <rect width="1200" height="900" fill="url(#hashGrad)" opacity="0.03"/>

  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">Tokenizer Lookup: Hash Table vs Trie</text>
  <text x="600" y="85" font-family="Arial, sans-serif" font-size="18" fill="#aaa" text-anchor="middle">Understanding why Trie is 40x faster for longest-match tokenization</text>

  <!-- Left Side: Hash Table Approach -->
  <g transform="translate(50, 130)">
    <!-- Header -->
    <rect width="520" height="50" rx="8" fill="url(#hashGrad)" filter="url(#shadow)"/>
    <text x="260" y="33" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">Hash Table Approach (O(n × k))</text>

    <!-- Input text -->
    <g transform="translate(0, 80)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" fill="#ff6b6b" font-weight="bold">Input: "hello world"</text>
      <text x="0" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ccc">Position 0: Looking for longest match...</text>

      <!-- Length trials -->
      <g transform="translate(20, 60)">
        <rect x="0" y="0" width="480" height="180" rx="8" fill="#2d2d44" stroke="#444"/>

        <!-- Trial bars -->
        <g transform="translate(20, 20)">
          <text x="0" y="0" font-family="monospace" font-size="12" fill="#888">Trying length=8:</text>
          <rect x="0" y="10" width="400" height="25" rx="4" fill="#444"/>
          <text x="10" y="27" font-family="monospace" font-size="11" fill="#fff">"hello wo" → NOT FOUND (hash + strcmp)</text>
          <path d="M200,40 L200,55" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow)"/>

          <text x="0" y="75" font-family="monospace" font-size="12" fill="#888">Trying length=5:</text>
          <rect x="0" y="85" width="250" height="25" rx="4" fill="#444"/>
          <text x="10" y="102" font-family="monospace" font-size="11" fill="#fff">"hello" → FOUND! id=100</text>
          <path d="M125,115 L125,130" stroke="#51cf66" stroke-width="2" marker-end="url(#arrow)"/>
        </g>
      </g>
    </g>

    <!-- Complexity Analysis -->
    <g transform="translate(0, 380)">
      <rect width="520" height="120" rx="8" fill="#2d2d44" stroke="#444"/>
      <text x="260" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff6b6b" text-anchor="middle">Time Complexity Analysis</text>
      <text x="260" y="60" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">For each position: try lengths 64, 63, ..., 1</text>
      <text x="260" y="85" font-family="monospace" font-size="14" fill="#ff6b6b" text-anchor="middle">O(n positions × k max_length × hash_cost)</text>
      <text x="260" y="110" font-family="monospace" font-size="12" fill="#aaa" text-anchor="middle">Plus: memcpy() for each trial + string comparison</text>
    </g>

    <!-- Performance stats -->
    <g transform="translate(0, 520)">
      <rect width="520" height="200" rx="8" fill="#2d2d44" stroke="#444"/>
      <text x="260" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff6b6b" text-anchor="middle">Benchmark Results</text>

      <g transform="translate(30, 55)">
        <text x="0" y="0" font-family="monospace" font-size="13" fill="#ccc">Text Length    Hash Table Time    Throughput</text>
        <text x="0" y="25" font-family="monospace" font-size="13" fill="#fff">11 chars      0.006 ms           1,803 chars/ms</text>
        <text x="0" y="50" font-family="monospace" font-size="13" fill="#fff">200 chars     0.127 ms           1,570 chars/ms</text>
        <text x="0" y="75" font-family="monospace" font-size="13" fill="#fff">3,000 chars   1.312 ms           2,286 chars/ms</text>
        <text x="0" y="100" font-family="monospace" font-size="13" fill="#fff">15,000 chars  6.296 ms           2,382 chars/ms</text>

        <rect x="0" y="130" width="460" height="40" rx="4" fill="#ff6b6b" opacity="0.2"/>
        <text x="230" y="157" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff6b6b" text-anchor="middle">Average: 2,352 chars/ms</text>
      </g>
    </g>
  </g>

  <!-- Right Side: Trie Approach -->
  <g transform="translate(630, 130)">
    <!-- Header -->
    <rect width="520" height="50" rx="8" fill="url(#trieGrad)" filter="url(#shadow)"/>
    <text x="260" y="33" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">Trie Approach (O(k))</text>

    <!-- Input text -->
    <g transform="translate(0, 80)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" fill="#51cf66" font-weight="bold">Input: "hello world"</text>
      <text x="0" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ccc">Single traversal: follow edges matching characters</text>

      <!-- Trie diagram -->
      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="480" height="180" rx="8" fill="#2d2d44" stroke="#444"/>

        <!-- Trie visualization -->
        <g transform="translate(240, 90)">
          <!-- Root -->
          <circle cx="0" cy="0" r="25" fill="#339af0" stroke="#fff" stroke-width="2"/>
          <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">ROOT</text>

          <!-- Level 1 -->
          <line x1="0" y1="25" x2="-80" y2="70" stroke="#666" stroke-width="2"/>
          <line x1="0" y1="25" x2="0" y2="70" stroke="#666" stroke-width="2"/>
          <line x1="0" y1="25" x2="80" y2="70" stroke="#666" stroke-width="2"/>

          <circle cx="-80" cy="70" r="18" fill="#444" stroke="#666"/>
          <text x="-80" y="75" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">h</text>

          <circle cx="0" cy="70" r="18" fill="#444" stroke="#666"/>
          <text x="0" y="75" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">t</text>

          <circle cx="80" cy="70" r="18" fill="#444" stroke="#666"/>
          <text x="80" y="75" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">w</text>

          <!-- Level 2 (from 'h') -->
          <line x1="-80" y1="88" x2="-100" y2="120" stroke="#51cf66" stroke-width="2"/>
          <circle cx="-100" cy="120" r="15" fill="#444" stroke="#51cf66"/>
          <text x="-100" y="125" font-family="Arial, sans-serif" font-size="10" fill="#51cf66" text-anchor="middle">e</text>

          <!-- Level 3 (from 'he') -->
          <line x1="-100" y1="135" x2="-100" y2="155" stroke="#51cf66" stroke-width="2"/>
          <circle cx="-100" cy="155" r="15" fill="#444" stroke="#51cf66"/>
          <text x="-100" y="160" font-family="Arial, sans-serif" font-size="10" fill="#51cf66" text-anchor="middle">l</text>

          <!-- Level 4 (from 'hel') -->
          <line x1="-100" y1="170" x2="-100" y2="190" stroke="#51cf66" stroke-width="2"/>
          <circle cx="-100" cy="190" r="15" fill="#444" stroke="#51cf66"/>
          <text x="-100" y="195" font-family="Arial, sans-serif" font-size="10" fill="#51cf66" text-anchor="middle">l</text>

          <!-- Level 5 (from 'hell' - token found!) -->
          <line x1="-100" y1="205" x2="-100" y2="225" stroke="#51cf66" stroke-width="2"/>
          <circle cx="-100" cy="225" r="20" fill="#51cf66" stroke="#fff" stroke-width="2"/>
          <text x="-100" y="230" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">o✓</text>

          <!-- Highlight path -->
          <rect x="-115" y="200" width="30" height="55" rx="4" fill="#51cf66" opacity="0.3"/>
        </g>

        <text x="240" y="280" font-family="Arial, sans-serif" font-size="12" fill="#51cf66" text-anchor="middle">Single O(k) traversal - no string copying!</text>
      </g>
    </g>

    <!-- Complexity Analysis -->
    <g transform="translate(0, 380)">
      <rect width="520" height="120" rx="8" fill="#2d2d44" stroke="#444"/>
      <text x="260" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#51cf66" text-anchor="middle">Time Complexity Analysis</text>
      <text x="260" y="60" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">For each position: single traversal through trie</text>
      <text x="260" y="85" font-family="monospace" font-size="14" fill="#51cf66" text-anchor="middle">O(k) where k = token length (typically 1-16)</text>
      <text x="260" y="110" font-family="monospace" font-size="12" fill="#aaa" text-anchor="middle">No memcpy, no hash computation, no string comparison</text>
    </g>

    <!-- Performance stats -->
    <g transform="translate(0, 520)">
      <rect width="520" height="200" rx="8" fill="#2d2d44" stroke="#444"/>
      <text x="260" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#51cf66" text-anchor="middle">Benchmark Results</text>

      <g transform="translate(30, 55)">
        <text x="0" y="0" font-family="monospace" font-size="13" fill="#ccc">Text Length    Trie Time         Throughput</text>
        <text x="0" y="25" font-family="monospace" font-size="13" fill="#fff">11 chars      0.006 ms           1,893 chars/ms</text>
        <text x="0" y="50" font-family="monospace" font-size="13" fill="#fff">200 chars     0.010 ms          20,941 chars/ms</text>
        <text x="0" y="75" font-family="monospace" font-size="13" fill="#fff">3,000 chars   0.031 ms          95,923 chars/ms</text>
        <text x="0" y="100" font-family="monospace" font-size="13" fill="#fff">15,000 chars  0.131 ms         114,463 chars/ms</text>

        <rect x="0" y="130" width="460" height="40" rx="4" fill="#51cf66" opacity="0.2"/>
        <text x="230" y="157" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#51cf66" text-anchor="middle">Average: 102,492 chars/ms</text>
      </g>
    </g>
  </g>

  <!-- Bottom: Speedup Summary -->
  <g transform="translate(50, 840)">
    <text x="600" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffd43b" text-anchor="middle">Trie is 43.6x FASTER than Hash Table!</text>
  </g>

  <!-- Footer -->
  <rect x="50" y="870" width="1100" height="2" fill="#444"/>
  <text x="600" y="895" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">C-Kernel-Engine Documentation | Tokenizer Performance Analysis</text>
</svg>
