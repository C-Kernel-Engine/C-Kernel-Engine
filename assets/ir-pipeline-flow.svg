<svg width="1200" height="980" viewBox="0 0 1200 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IR pipeline with expanded explanations of inputs and each IR stage">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f151c"/>
      <stop offset="100%" stop-color="#0b1218"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9b3d"/>
      <stop offset="100%" stop-color="#4cc0ff"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2430"/>
      <stop offset="100%" stop-color="#131c26"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#101a24"/>
      <stop offset="100%" stop-color="#0d141b"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="980" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="48" font-family="Inter, Segoe UI, Arial" font-size="26" fill="#ff9b3d">IR Pipeline (v6.6)</text>
  <text x="60" y="72" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9fb1c2">
    Inputs → IR1 → IR2 → IR3 → Codegen → C runtime (each stage reduces ambiguity)
  </text>

  <!-- Inputs block -->
  <rect x="60" y="100" width="1080" height="230" rx="14" fill="url(#lane)" stroke="#25384a"/>
  <text x="80" y="132" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#cfe1f1">Inputs</text>

  <!-- Input cards row 1 -->
  <rect x="80" y="150" width="500" height="70" rx="10" fill="#0f1a24" stroke="#25384a"/>
  <circle cx="104" cy="182" r="10" fill="#223447"/>
  <text x="100" y="186" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#ff9b3d">B</text>
  <text x="128" y="176" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9fb1c2">BUMP weights</text>
  <text x="128" y="196" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#c7d6e4">contiguous tensor blob (quantized + aligned)</text>
  <text x="128" y="212" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">example: entries[{name, offset, dtype, size}]</text>

  <rect x="620" y="150" width="500" height="70" rx="10" fill="#0f1a24" stroke="#25384a"/>
  <circle cx="644" cy="182" r="10" fill="#223447"/>
  <text x="640" y="186" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#ff9b3d">S</text>
  <text x="668" y="176" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9fb1c2">Sidecar manifest</text>
  <text x="668" y="196" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#c7d6e4">JSON offsets + dtypes + model config</text>
  <text x="668" y="212" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">example: config, quant_summary, template</text>

  <!-- Input cards row 2 -->
  <rect x="80" y="235" width="500" height="70" rx="10" fill="#0f1a24" stroke="#25384a"/>
  <circle cx="104" cy="267" r="10" fill="#223447"/>
  <text x="100" y="271" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#ff9b3d">C</text>
  <text x="128" y="261" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9fb1c2">Converter (GGUF → BUMP)</text>
  <text x="128" y="281" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#c7d6e4">reads GGUF, normalizes, quantizes, writes</text>
  <text x="128" y="297" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">example: gguf → weights.bump + manifest.json</text>

  <rect x="620" y="235" width="500" height="70" rx="10" fill="#0f1a24" stroke="#25384a"/>
  <circle cx="644" cy="267" r="10" fill="#223447"/>
  <text x="640" y="271" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#ff9b3d">K</text>
  <text x="668" y="261" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9fb1c2">Kernel registry</text>
  <text x="668" y="281" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#c7d6e4">kernel IDs + params + dtypes + constraints</text>
  <text x="668" y="297" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">example: kernel_maps/*.json</text>

  <!-- Stage cards -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="255" height="190" rx="12" fill="url(#chip)" stroke="#2a3a4f"/>
    <text x="18" y="30" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#ffb15e">IR1 (Validate)</text>
    <text x="18" y="56" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• parse template ops → kernel families</text>
    <text x="18" y="76" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• resolve kernel IDs + dtypes</text>
    <text x="18" y="96" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• fail fast if missing/mismatched</text>
    <text x="18" y="122" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#9fb1c2">Output: ir1_decode.json / ir1_prefill.json</text>
    <text x="18" y="140" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">contains: op list + kernel IDs + dtypes</text>
    <text x="18" y="158" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">example: {"op":"q_proj","kernel":"gemv_q5_1"}</text>

    <rect x="285" y="0" width="255" height="190" rx="12" fill="url(#chip)" stroke="#2a3a4f"/>
    <text x="303" y="30" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#ffb15e">IR2 (Dataflow)</text>
    <text x="303" y="56" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• stitch dataflow edges + logical buffers</text>
    <text x="303" y="76" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• insert KV cache + quant ops</text>
    <text x="303" y="96" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• conservative fusions (if safe)</text>
    <text x="303" y="122" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#9fb1c2">Output: lowered_*.json (buffer names)</text>
    <text x="303" y="140" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">contains: dataflow edges + scratch plan</text>
    <text x="303" y="158" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">example: inputs.q → q_scratch, outputs → attn_scratch</text>

    <rect x="570" y="0" width="255" height="190" rx="12" fill="url(#chip)" stroke="#2a3a4f"/>
    <text x="588" y="30" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#ffb15e">IR3 (Layout)</text>
    <text x="588" y="56" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• pack weights + activations into one arena</text>
    <text x="588" y="76" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• assign offsets + macros</text>
    <text x="588" y="96" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• emit ordered call args</text>
    <text x="588" y="122" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#9fb1c2">Output: layout_*.json + lowered_*_call.json</text>
    <text x="588" y="140" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">contains: offsets + call args (ptr + sizes)</text>
    <text x="588" y="158" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">example: A_Q_SCRATCH=0x1A4000, args=[ptr+off]</text>

    <rect x="855" y="0" width="255" height="190" rx="12" fill="url(#chip)" stroke="#2a3a4f"/>
    <text x="873" y="30" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#ffb15e">Codegen</text>
    <text x="873" y="56" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• dumb emitter (no decisions)</text>
    <text x="873" y="76" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• reads IR3 + init_call.json only</text>
    <text x="873" y="96" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c7d6e4">• writes model_v6_6.c + headers</text>
    <text x="873" y="122" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#9fb1c2">Output: self‑contained runtime</text>
    <text x="873" y="140" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">contains: kernel calls stitched into C</text>
    <text x="873" y="122" font-family="Inter, Segoe UI, Arial" font-size="10" fill="#7f94a8">kernel calls stitched into C</text>
    <text x="873" y="158" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">example: rope_init(...), gemv_q5_1(...)</text>
  </g>

  <!-- Legend row -->
  <g transform="translate(60,700)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#9fb1c2">Legend</text>
    <rect x="70" y="-12" width="140" height="26" rx="6" fill="#0f1a24" stroke="#25384a"/>
    <text x="82" y="6" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#c7d6e4">weights = immutable</text>
    <rect x="230" y="-12" width="170" height="26" rx="6" fill="#0f1a24" stroke="#25384a"/>
    <text x="242" y="6" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#c7d6e4">activations = per‑token</text>
    <rect x="420" y="-12" width="140" height="26" rx="6" fill="#0f1a24" stroke="#25384a"/>
    <text x="432" y="6" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#c7d6e4">scratch = reused</text>
    <rect x="585" y="-12" width="175" height="26" rx="6" fill="#0f1a24" stroke="#25384a"/>
    <text x="597" y="6" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#c7d6e4">KV cache = persistent</text>
  </g>

  <!-- Mini example: IR1 → IR3 -->
  <g transform="translate(60,735)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#9fb1c2">Example (same op, more concrete)</text>
    <rect x="0" y="10" width="520" height="52" rx="8" fill="#0f1a24" stroke="#25384a"/>
    <text x="14" y="32" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#c7d6e4">IR1: {"op":"q_proj","kernel":"gemv_q5_1","inputs":{"x":"layer_input"}}</text>
    <text x="14" y="48" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">IR3: gemv_q5_1(W=..., x=A_LAYER_INPUT, y=A_Q_SCRATCH, m=1, n=...)</text>
  </g>

  <!-- Labeled arrows (Inputs → IR1, IR3 → Codegen) -->
  <text x="250" y="345" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">parse + map</text>
  <text x="945" y="345" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#7f94a8">emit only</text>

  <!-- Artifact strip -->
  <rect x="60" y="820" width="1080" height="110" rx="12" fill="url(#lane)" stroke="#25384a"/>
  <text x="80" y="848" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#cfe1f1">Artifacts</text>
  <text x="80" y="870" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#9fb1c2">
    ir1_*.json · layout_*.json · lowered_*_call.json · init_call.json · model_v6_6.c
  </text>

  <text x="60" y="900" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9fb1c2">
    Each stage makes the next simpler: by the time we emit C, both logic and memory are fully specified.
  </text>
  <rect x="60" y="914" width="380" height="6" rx="3" fill="url(#accent)"/>
</svg>
