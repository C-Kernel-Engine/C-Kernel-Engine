<svg width="1280" height="920" viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#07131f"/><stop offset="100%" stop-color="#11253a"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#b576ff"/><stop offset="100%" stop-color="#e8a7ff"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0d2033"/><stop offset="100%" stop-color="#16314d"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(8,22,38,0.55)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#b576ff"/></filter></defs><rect x="0" y="0" width="1280" height="920" fill="url(#bgGrad)"/><g opacity="0.24"><circle cx="230.4" cy="220.8" r="180" fill="#f3d8ff"/><circle cx="1126.4" cy="165.6" r="140" fill="#f3d8ff"/><circle cx="870.4" cy="772.8" r="220" fill="#e8a7ff" opacity="0.20"/></g><rect x="56.0" y="56.0" width="1168.0" height="132" rx="26" fill="#0d2033" fill-opacity="0.18" stroke="#28577d" stroke-width="1.2"/><rect x="78.0" y="74.0" width="240" height="9" rx="4.5" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="82.0" y="102.0" fill="#b576ff" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Sequence Encoding</tspan></text><text x="82.0" y="140.0" fill="#f8fafc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">RoPE Detailed</tspan></text><text x="82.0" y="172.0" fill="#9dd5ff" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Rotary position encoding turns position into phase, so relative structure survives inside</tspan><tspan x="82.0" dy="18.8">attention.</tspan></text><rect x="56.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#e8a7ff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="56.0" y="212.0" width="8" height="226.0" rx="4" fill="#b576ff"/><rect x="78.0" y="232.0" width="527.0" height="28" rx="14" fill="#b576ff" fill-opacity="0.11" stroke="#b576ff" stroke-width="1"/><text x="88.0" y="251.0" fill="#b576ff" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="88.0" dy="0">Coordinate view</tspan></text><text x="86.0" y="284.0" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="86.0" dy="0">Split channels into paired dimensions and</tspan><tspan x="86.0" dy="16.2">rotate them by a position-dependent angle.</tspan></text><circle cx="92.0" cy="320.0" r="5" fill="#b576ff"/><text x="106.0" y="324.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Pairs become planes</tspan></text><circle cx="92.0" cy="348.0" r="5" fill="#b576ff"/><text x="106.0" y="352.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Angles encode position</tspan></text><circle cx="92.0" cy="376.0" r="5" fill="#b576ff"/><text x="106.0" y="380.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Rotation is deterministic</tspan></text><rect x="653.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#e8a7ff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="653.0" y="212.0" width="8" height="226.0" rx="4" fill="#e8a7ff"/><rect x="675.0" y="232.0" width="527.0" height="28" rx="14" fill="#e8a7ff" fill-opacity="0.11" stroke="#e8a7ff" stroke-width="1"/><text x="685.0" y="251.0" fill="#e8a7ff" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="685.0" dy="0">Relative view</tspan></text><text x="683.0" y="284.0" fill="#f8fafc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="683.0" dy="0">Because both query and key rotate, their</tspan><tspan x="683.0" dy="16.2">relative phase carries distance information</tspan><tspan x="683.0" dy="16.2">into attention.</tspan></text><circle cx="689.0" cy="320.0" r="5" fill="#e8a7ff"/><text x="703.0" y="324.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Relative offsets survive</tspan></text><circle cx="689.0" cy="348.0" r="5" fill="#e8a7ff"/><text x="703.0" y="352.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">No learned table lookup</tspan></text><circle cx="689.0" cy="376.0" r="5" fill="#e8a7ff"/><text x="703.0" y="380.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Long-range structure is smoother</tspan></text><rect x="56.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#e8a7ff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="482.0" width="336.0" height="24" rx="12" fill="#b576ff" fill-opacity="0.10"/><text x="84.0" y="500.0" fill="#b576ff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="84.0" dy="0">Geometry</tspan></text><text x="80.0" y="534.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Phase bands</tspan></text><text x="80.0" y="564.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Different frequency bands rotate</tspan><tspan x="80.0" dy="15.0">at different rates, giving the</tspan><tspan x="80.0" dy="15.0">model coarse and fine positional</tspan><tspan x="80.0" dy="15.0">signals.</tspan></text><circle cx="84.0" cy="600.0" r="4.5" fill="#b576ff"/><text x="98.0" y="604.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Low-frequency context</tspan></text><circle cx="84.0" cy="624.0" r="4.5" fill="#b576ff"/><text x="98.0" y="628.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">High-frequency detail</tspan></text><circle cx="84.0" cy="648.0" r="4.5" fill="#b576ff"/><text x="98.0" y="652.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">One shared rotation rule</tspan></text><line x1="80.0" y1="646.0" x2="404.0" y2="646.0" stroke="#28577d" stroke-width="1"/><text x="80.0" y="670.0" fill="#b576ff" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Bands create a multi-scale</tspan><tspan x="80.0" dy="12.5">prior.</tspan></text><rect x="454.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#e8a7ff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="472.0" y="482.0" width="336.0" height="24" rx="12" fill="#56aefc" fill-opacity="0.10"/><text x="482.0" y="500.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="482.0" dy="0">Mechanism</tspan></text><text x="478.0" y="534.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Rotate Q and K</tspan></text><text x="478.0" y="564.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Queries and keys are transformed</tspan><tspan x="478.0" dy="15.0">before dot products, so position</tspan><tspan x="478.0" dy="15.0">changes the interaction directly.</tspan></text><circle cx="482.0" cy="600.0" r="4.5" fill="#56aefc"/><text x="496.0" y="604.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Apply sinusoidal angles</tspan></text><circle cx="482.0" cy="624.0" r="4.5" fill="#56aefc"/><text x="496.0" y="628.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Rotate paired channels</tspan></text><circle cx="482.0" cy="648.0" r="4.5" fill="#56aefc"/><text x="496.0" y="652.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Attention sees phase</tspan></text><line x1="478.0" y1="646.0" x2="802.0" y2="646.0" stroke="#28577d" stroke-width="1"/><text x="478.0" y="670.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Position enters as</tspan><tspan x="478.0" dy="12.5">structure, not as prose.</tspan></text><rect x="852.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#e8a7ff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="870.0" y="482.0" width="336.0" height="24" rx="12" fill="#47b475" fill-opacity="0.10"/><text x="880.0" y="500.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="880.0" dy="0">Serving</tspan></text><text x="876.0" y="534.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Long context pressure</tspan></text><text x="876.0" y="564.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Scaling context still needs care,</tspan><tspan x="876.0" dy="15.0">but RoPE gives a clean</tspan><tspan x="876.0" dy="15.0">deterministic base for long-range</tspan><tspan x="876.0" dy="15.0">reasoning.</tspan></text><circle cx="880.0" cy="600.0" r="4.5" fill="#47b475"/><text x="894.0" y="604.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Extrapolation still matters</tspan></text><circle cx="880.0" cy="624.0" r="4.5" fill="#47b475"/><text x="894.0" y="628.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Angles can drift</tspan></text><circle cx="880.0" cy="648.0" r="4.5" fill="#47b475"/><text x="894.0" y="652.0" fill="#f8fafc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">The base contract remains</tspan><tspan x="894.0" dy="13.8">elegant</tspan></text><line x1="876.0" y1="646.0" x2="1200.0" y2="646.0" stroke="#28577d" stroke-width="1"/><text x="876.0" y="670.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Good priors still need</tspan><tspan x="876.0" dy="12.5">disciplined scaling.</tspan></text><rect x="56.0" y="714.0" width="1168.0" height="104.0" rx="24" fill="#b576ff" fill-opacity="0.08" stroke="#b576ff" stroke-width="1.2"/><text x="80.0" y="744.0" fill="#b576ff" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Key takeaway</tspan></text><circle cx="80.0" cy="765.0" r="5" fill="#b576ff"/><text x="94.0" y="770.0" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="94.0" dy="0">RoPE is easiest to learn</tspan><tspan x="94.0" dy="13.8">as geometry, not as</tspan><tspan x="94.0" dy="13.8">formula memorization.</tspan></text><circle cx="453.3" cy="765.0" r="5" fill="#b576ff"/><text x="467.3" y="770.0" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="467.3" dy="0">Relative phase is the</tspan><tspan x="467.3" dy="13.8">point.</tspan></text><circle cx="826.7" cy="765.0" r="5" fill="#b576ff"/><text x="840.7" y="770.0" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="840.7" dy="0">Structured editorial</tspan><tspan x="840.7" dy="13.8">layouts help surface that</tspan><tspan x="840.7" dy="13.8">intuition.</tspan></text><text x="1200.0" y="798.0" fill="#9dd5ff" font-size="10" font-weight="700" text-anchor="end" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1200.0" dy="0">rope_detailed</tspan></text></svg>