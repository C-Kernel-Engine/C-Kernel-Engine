l Math</tspan></text><text x="494.5" y="294.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">The middle of the diagram should</tspan><tspan x="494.5" dy="15.0">expose the key transformation</tspan><tspan x="494.5" dy="15.0">rather than hide it behind a</tspan><tspan x="494.5" dy="15.0">generic box.</tspan></text><text x="498.5" y="330.0" fill="#79d79d" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">variance</tspan></text><text x="498.5" y="348.0" fill="#79d79d" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">affine</tspan></text></g><g class="technical-node"><rect x="893.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#79d79d" stroke-width="1.5" filter="url(#softShadow)"/><rect x="911.0" y="222.0" width="86" height="22" rx="11" fill="#47b475" fill-opacity="0.12" stroke="#47b475" stroke-width="1"/><text x="954.0" y="237.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="954.0" dy="0">STEP 3</tspan></text><text x="913.0" y="268.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Fused Path</tspan></text><text x="913.0" y="294.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Show how kernels fuse, gate, or</tspan><tspan x="913.0" dy="15.0">rotate state before the output</tspan><tspan x="913.0" dy="15.0">contract is formed.</tspan></text><text x="917.0" y="330.0" fill="#79d79d" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">fusion</tspan></text