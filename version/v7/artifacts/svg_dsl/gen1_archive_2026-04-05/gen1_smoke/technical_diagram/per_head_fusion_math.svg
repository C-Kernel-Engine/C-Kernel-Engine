ut</tspan><tspan x="80.0" dy="18.8">aligned.</tspan></text><g class="technical-node"><rect x="56.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="117.0" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="117.0" dy="0">STEP 1</tspan></text><text x="76.0" y="268.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Input State</tspan></text><text x="76.0" y="294.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Per Head Fusion Math starts from</tspan><tspan x="76.0" dy="15.0">normalized or packed inputs that</tspan><tspan x="76.0" dy="15.0">set the compute boundary.</tspan></text><text x="80.0" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">per-head</tspan></text><text x="80.0" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">local fuse</tspan></text></g><g class="technical-node"><rect x="474.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="492.5" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="535.5" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="535.5" dy="0">STEP 2</tspan></text><text x="494.5" y="268.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">Kernel Math</tspan></text><text x="494.5" y="294.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">The middle of the diagram should</tspan><tspan x="494.5" dy="15.0">expose the key transformation</tspan><tspan x="494.5" dy="15.0">rather than hide it behind a</tspan><tspan x="494.5" dy="15.0">generic box.</tspan></text><text x="498.5" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">local fuse</tspan></text><text x="498.5" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">merge</tspan></text></g><g class="technical-node"><rect x="893.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="911.0" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="954.0" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="954.0" dy="0">STEP 3</tspan></text><text x="913.0" y="268.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Fused Path</tspan></text><text x="913.0" y="294.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Show how kernels fuse, gate, or</tspan><tspan x="913.0" dy="15.0">rotate state before the output</tspan><tspan x="913.0" dy="15.0">contract is formed.</tspan></text><text x="917.0" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">fusion</tspan></text><text x="917.0" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">state update</tspan></text></g><g class="technical-node"><rect x="1311.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="1329.5" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="1372.5" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1372.5" dy="0">STEP 4</tspan></text><text x="1331.5" y="268.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">Output Contract</tspan></text><text x="1331.5" y="294.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">The last stage should state what</tspan><tspan x="1331.5" dy="15.0">artifact or activation shape the</tspan><tspan x="1331.5" dy="15.0">runtime emits.</tspan></text><text x="1335.5" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">artifact output</tspan></text><text x="1335.5" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">runtime state</tspan></text></g><g class="technical-connectors"><path d="M 430.5 297.0 C 461.5 297.0, 461.5 297.0, 492.5 297.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 849.0 297.0 C 880.0 297.0, 880.0 297.0, 911.0 297.0" st