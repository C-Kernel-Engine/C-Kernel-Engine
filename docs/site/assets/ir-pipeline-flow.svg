<svg width="1600" height="1580" viewBox="0 0 1600 1580" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="C-Kernel-Engine v6.6 pipeline from GGUF to generated C runtime with IR1 IR2 IR3 memory and execution details">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d141c"/>
      <stop offset="100%" stop-color="#0a1017"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111d2b"/>
      <stop offset="100%" stop-color="#0d1824"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16273a"/>
      <stop offset="100%" stop-color="#122133"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#3ec8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a90a8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="1580" fill="url(#bg)"/>

  <text x="64" y="62" font-family="Inter, Segoe UI, Arial" font-size="38" fill="#ffb35f">IR Pipeline (v6.6)</text>
  <text x="64" y="98" font-family="Inter, Segoe UI, Arial" font-size="19" fill="#a8bbce">From GGUF to compiled C runtime: each stage removes ambiguity in math, buffers, and call order.</text>
  <rect x="64" y="112" width="760" height="6" rx="3" fill="url(#accent)"/>

  <rect x="64" y="138" width="250" height="34" rx="10" fill="#112133" stroke="#2d445c"/>
  <text x="82" y="160" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#d6e4f3">1) Validate ops and kernel IDs</text>
  <rect x="334" y="138" width="290" height="34" rx="10" fill="#112133" stroke="#2d445c"/>
  <text x="352" y="160" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#d6e4f3">2) Stitch producer-consumer dataflow</text>
  <rect x="644" y="138" width="310" height="34" rx="10" fill="#112133" stroke="#2d445c"/>
  <text x="662" y="160" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#d6e4f3">3) Freeze memory layout and call args</text>
  <rect x="974" y="138" width="310" height="34" rx="10" fill="#112133" stroke="#2d445c"/>
  <text x="992" y="160" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#d6e4f3">4) Emit C and execute with thread pool</text>

  <rect x="52" y="196" width="1496" height="270" rx="18" fill="url(#panel)" stroke="#2f4861"/>
  <text x="76" y="234" font-family="Inter, Segoe UI, Arial" font-size="24" fill="#d8e7f4">Inputs and Converter Normalization</text>
  <text x="76" y="262" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#95acc2">IR stages read stable artifacts, not raw GGUF internals. Converter is the bridge.</text>

  <g filter="url(#shadow)">
    <rect x="76" y="286" width="348" height="154" rx="14" fill="#0f1e2e" stroke="#304962"/>
    <rect x="442" y="286" width="348" height="154" rx="14" fill="#0f1e2e" stroke="#304962"/>
    <rect x="808" y="286" width="348" height="154" rx="14" fill="#0f1e2e" stroke="#304962"/>
    <rect x="1174" y="286" width="348" height="154" rx="14" fill="#0f1e2e" stroke="#304962"/>
  </g>

  <text x="96" y="320" font-family="Inter, Segoe UI, Arial" font-size="21" fill="#ffb463">GGUF Input</text>
  <text x="96" y="346" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- tensors + metadata keys</text>
  <text x="96" y="366" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- quant blocks, tokenizer, rope config</text>
  <text x="96" y="386" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9cb2c8">Not directly layout-ready for runtime arena.</text>
  <text x="96" y="410" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#86a0b8">input example: qwen3-0.6b.Q8_0.gguf</text>

  <text x="462" y="320" font-family="Inter, Segoe UI, Arial" font-size="21" fill="#ffb463">Converter</text>
  <text x="462" y="346" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- normalizes dims and dtypes</text>
  <text x="462" y="366" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- captures config, rope, quant summary</text>
  <text x="462" y="386" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9cb2c8">Generates BUMP plus JSON sidecar manifest.</text>
  <text x="462" y="410" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#86a0b8">script: convert_gguf_to_bump_v6_6.py</text>

  <text x="828" y="320" font-family="Inter, Segoe UI, Arial" font-size="21" fill="#ffb463">BUMP + Sidecar</text>
  <text x="828" y="346" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- BUMP: contiguous tensor blob</text>
  <text x="828" y="366" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- Sidecar: offsets, shapes, config</text>
  <text x="828" y="386" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9cb2c8">Single source for weights and metadata.</text>
  <text x="828" y="410" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#86a0b8">example: weights_manifest.json</text>

  <text x="1194" y="320" font-family="Inter, Segoe UI, Arial" font-size="21" fill="#ffb463">Template + Registry</text>
  <text x="1194" y="346" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- template defines op intent</text>
  <text x="1194" y="366" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- kernel maps define signatures</text>
  <text x="1194" y="386" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#9cb2c8">Resolver chooses kernel IDs from rules.</text>
  <text x="1194" y="410" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#86a0b8">files: templates/*.json + KERNEL_REGISTRY.json</text>

  <line x1="424" y1="362" x2="442" y2="362" stroke="#7a90a8" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="790" y1="362" x2="808" y2="362" stroke="#7a90a8" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="1156" y1="362" x2="1174" y2="362" stroke="#7a90a8" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="52" y="492" width="1496" height="524" rx="18" fill="url(#panel)" stroke="#2f4861"/>
  <text x="76" y="530" font-family="Inter, Segoe UI, Arial" font-size="24" fill="#d8e7f4">IR1 -> IR2 -> IR3 -> Codegen</text>
  <text x="76" y="558" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#95acc2">Each card shows exactly what goes in, what comes out, and what new guarantees are added.</text>

  <g filter="url(#shadow)">
    <rect x="76" y="586" width="356" height="396" rx="14" fill="url(#card)" stroke="#385779"/>
    <rect x="450" y="586" width="356" height="396" rx="14" fill="url(#card)" stroke="#385779"/>
    <rect x="824" y="586" width="356" height="396" rx="14" fill="url(#card)" stroke="#385779"/>
    <rect x="1198" y="586" width="326" height="396" rx="14" fill="url(#card)" stroke="#385779"/>
  </g>

  <text x="98" y="628" font-family="Inter, Segoe UI, Arial" font-size="28" fill="#ffb463">IR1</text>
  <text x="174" y="628" font-family="Inter, Segoe UI, Arial" font-size="22" fill="#d8e7f4">Validate</text>
  <text x="98" y="660" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Input</text>
  <text x="98" y="682" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">template + config + registry</text>
  <text x="98" y="716" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Output</text>
  <text x="98" y="738" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">ir1_decode.json / ir1_prefill.json</text>
  <text x="98" y="772" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Adds</text>
  <text x="98" y="794" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- legal op sequence</text>
  <text x="98" y="814" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- kernel IDs resolved</text>
  <text x="98" y="834" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- fail-fast for missing ops/maps</text>
  <text x="98" y="872" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#87a2ba">question answered:</text>
  <text x="98" y="892" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#87a2ba">"Is this a valid model graph for this engine?"</text>
  <text x="98" y="924" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#7b95ad">example snippet:</text>
  <text x="98" y="942" font-family="monospace" font-size="12" fill="#7b95ad">{"op":"qkv_proj","kernel_id":"gemv_q5_1"}</text>

  <text x="472" y="628" font-family="Inter, Segoe UI, Arial" font-size="28" fill="#ffb463">IR2</text>
  <text x="548" y="628" font-family="Inter, Segoe UI, Arial" font-size="22" fill="#d8e7f4">Dataflow</text>
  <text x="472" y="660" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Input</text>
  <text x="472" y="682" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">IR1 graph + quant/config traits</text>
  <text x="472" y="716" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Output</text>
  <text x="472" y="738" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">lowered_*.json (ordered ops + edges)</text>
  <text x="472" y="772" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Adds</text>
  <text x="472" y="794" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- producer/consumer wiring</text>
  <text x="472" y="814" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- optional conservative fusion</text>
  <text x="472" y="834" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- parallel-safe scheduling tags</text>
  <text x="472" y="872" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#87a2ba">question answered:</text>
  <text x="472" y="892" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#87a2ba">"Which tensor feeds which op, in what order?"</text>
  <text x="472" y="924" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#7b95ad">example edge:</text>
  <text x="472" y="942" font-family="monospace" font-size="12" fill="#7b95ad">{"q":{"from_op":12,"from_output":"q"}}</text>

  <text x="846" y="628" font-family="Inter, Segoe UI, Arial" font-size="28" fill="#ffb463">IR3</text>
  <text x="922" y="628" font-family="Inter, Segoe UI, Arial" font-size="22" fill="#d8e7f4">Layout + Calls</text>
  <text x="846" y="660" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Input</text>
  <text x="846" y="682" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">IR2 + BUMP metadata + context len</text>
  <text x="846" y="716" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Output</text>
  <text x="846" y="738" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">layout_*.json + lowered_*_call.json</text>
  <text x="846" y="772" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Adds</text>
  <text x="846" y="794" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- aligned arena offsets</text>
  <text x="846" y="814" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- scratch reuse lifetimes</text>
  <text x="846" y="834" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- final function argument expressions</text>
  <text x="846" y="872" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#87a2ba">question answered:</text>
  <text x="846" y="892" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#87a2ba">"Exactly where in memory is every pointer?"</text>
  <text x="846" y="924" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#7b95ad">example macros:</text>
  <text x="846" y="942" font-family="monospace" font-size="12" fill="#7b95ad">A_Q_SCRATCH, A_KV_CACHE, A_LOGITS</text>

  <text x="1220" y="628" font-family="Inter, Segoe UI, Arial" font-size="28" fill="#ffb463">Codegen</text>
  <text x="1220" y="660" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Input</text>
  <text x="1220" y="682" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">lowered_*_call.json + init_call.json</text>
  <text x="1220" y="716" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Output</text>
  <text x="1220" y="738" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">model_v6_6.c + shared library</text>
  <text x="1220" y="772" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#c8d8e9">Adds</text>
  <text x="1220" y="794" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- ordered C function calls</text>
  <text x="1220" y="814" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- no planning logic at runtime</text>
  <text x="1220" y="834" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9db4ca">- deterministic path from IR3</text>
  <text x="1220" y="872" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#87a2ba">question answered:</text>
  <text x="1220" y="892" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#87a2ba">"Can the runtime just execute now?"</text>
  <text x="1220" y="924" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#7b95ad">runtime hooks: ck_parallel_prefill/decode</text>

  <line x1="432" y1="784" x2="450" y2="784" stroke="#7a90a8" stroke-width="2.8" marker-end="url(#arrow)"/>
  <line x1="806" y1="784" x2="824" y2="784" stroke="#7a90a8" stroke-width="2.8" marker-end="url(#arrow)"/>
  <line x1="1180" y1="784" x2="1198" y2="784" stroke="#7a90a8" stroke-width="2.8" marker-end="url(#arrow)"/>

  <rect x="52" y="1040" width="1496" height="284" rx="18" fill="url(#panel)" stroke="#2f4861"/>
  <text x="76" y="1078" font-family="Inter, Segoe UI, Arial" font-size="24" fill="#d8e7f4">Where Memory Layout, Fusion, and Parallelism Actually Happen</text>

  <g filter="url(#shadow)">
    <rect x="76" y="1102" width="468" height="198" rx="14" fill="#102133" stroke="#355172"/>
    <rect x="566" y="1102" width="468" height="198" rx="14" fill="#102133" stroke="#355172"/>
    <rect x="1056" y="1102" width="468" height="198" rx="14" fill="#102133" stroke="#355172"/>
  </g>

  <text x="96" y="1140" font-family="Inter, Segoe UI, Arial" font-size="20" fill="#ffb463">Memory Layout (IR3)</text>
  <text x="96" y="1168" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- packs weights, activations, kv, rope, logits into one arena</text>
  <text x="96" y="1188" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- computes aligned offsets and reuse windows</text>
  <text x="96" y="1208" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- emits pointer expressions consumed by codegen</text>
  <text x="96" y="1240" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#88a2ba">arena example: [weights][acts/scratch][kv][rope][logits]</text>

  <text x="586" y="1140" font-family="Inter, Segoe UI, Arial" font-size="20" fill="#ffb463">Fusion and Scheduling (IR2)</text>
  <text x="586" y="1168" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- fusions are conservative in v6.6 (parity first)</text>
  <text x="586" y="1188" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- producer-consumer graph decides legal reorder</text>
  <text x="586" y="1208" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- parallel-safe regions are tagged for runtime</text>
  <text x="586" y="1240" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#88a2ba">example: qkv -> rope_qk -> attn chain</text>

  <text x="1076" y="1140" font-family="Inter, Segoe UI, Arial" font-size="20" fill="#ffb463">Execution (Runtime C)</text>
  <text x="1076" y="1168" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- thread pool executes prefill/decode regions</text>
  <text x="1076" y="1188" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- kernels dispatch scalar/avx/avx2/vnni variants</text>
  <text x="1076" y="1208" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#c8d8e9">- behavior is fixed by generated C order and args</text>
  <text x="1076" y="1240" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#88a2ba">files: ck_parallel_*.c + model_v6_6.c</text>

  <rect x="52" y="1348" width="1496" height="200" rx="18" fill="url(#panel)" stroke="#2f4861"/>
  <text x="76" y="1386" font-family="Inter, Segoe UI, Arial" font-size="24" fill="#d8e7f4">Artifacts You Inspect During Debug</text>
  <text x="76" y="1413" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9fb5ca">ir1_decode.json -> lowered_decode.json -> layout_decode.json -> lowered_decode_call.json -> model_v6_6.c</text>
  <text x="76" y="1436" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#9fb5ca">debug order: if output is wrong, trace right-to-left from emitted C call back to IR1 producer edge.</text>

  <rect x="76" y="1458" width="620" height="6" rx="3" fill="url(#accent)"/>
  <text x="1150" y="1494" font-family="Inter, Segoe UI, Arial" font-size="12" fill="#7c96ad">C-Kernel-Engine v6.6 operator diagram</text>
</svg>
