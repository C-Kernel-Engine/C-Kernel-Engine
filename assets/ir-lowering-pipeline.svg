<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 450">
  <defs>
    <linearGradient id="irHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb400"/>
      <stop offset="100%" style="stop-color:#ffc933"/>
    </linearGradient>
    <marker id="arrowIR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb400"/>
    </marker>
  </defs>

  <rect width="980" height="450" fill="#232323"/>

  <text x="490" y="32" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffb400" text-anchor="middle">IR Lowering Pipeline</text>
  <text x="490" y="52" font-family="Inter, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">IR1 to IR2 to Lowered IR with memory planning and runtime args</text>

  <g transform="translate(40, 95)">
    <rect width="180" height="90" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="180" height="26" rx="10" fill="url(#irHeader)"/>
    <text x="90" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">IR1</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Ops + dataflow</text>
    <text x="90" y="73" font-family="Inter, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Kernel IDs</text>
  </g>

  <g transform="translate(235, 140)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowIR)"/>
  </g>

  <g transform="translate(310, 95)">
    <rect width="180" height="90" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="180" height="26" rx="10" fill="url(#irHeader)"/>
    <text x="90" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">IR2</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Scheduling</text>
    <text x="90" y="73" font-family="Inter, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Kernel variants</text>
  </g>

  <g transform="translate(505, 140)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowIR)"/>
  </g>

  <g transform="translate(580, 95)">
    <rect width="180" height="90" rx="10" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="180" height="26" rx="10" fill="url(#irHeader)"/>
    <text x="90" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">IR Lower</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Resolve inputs</text>
    <text x="90" y="73" font-family="Inter, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Add runtime args</text>
  </g>

  <g transform="translate(775, 140)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowIR)"/>
  </g>

  <g transform="translate(850, 95)">
    <rect width="90" height="90" rx="10" fill="#2a2a2a" stroke="#47b475" stroke-width="3"/>
    <rect width="90" height="26" rx="10" fill="#47b475"/>
    <text x="45" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1d1d1d" text-anchor="middle">Lower 3</text>
    <text x="45" y="55" font-family="Inter, sans-serif" font-size="9" fill="#a0a0a0" text-anchor="middle">Args</text>
    <text x="45" y="70" font-family="Inter, sans-serif" font-size="9" fill="#a0a0a0" text-anchor="middle">Offsets</text>
  </g>

  <g transform="translate(40, 230)">
    <rect width="900" height="170" rx="12" fill="#1f1f1f" stroke="#333" stroke-width="2"/>

    <text x="30" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffb400">Memory planning</text>
    <text x="30" y="55" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0">Activations, KV cache, and logits are planned from IR + config. Layout is fully deterministic.</text>

    <rect x="30" y="78" width="260" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="160" y="103" font-family="Inter, sans-serif" font-size="10" fill="#c7c7c7" text-anchor="middle">layout.json</text>
    <text x="160" y="122" font-family="Inter, sans-serif" font-size="9" fill="#8a8a8a" text-anchor="middle">buffers + offsets + sizes</text>

    <rect x="330" y="78" width="260" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="460" y="103" font-family="Inter, sans-serif" font-size="10" fill="#c7c7c7" text-anchor="middle">init_call.json</text>
    <text x="460" y="122" font-family="Inter, sans-serif" font-size="9" fill="#8a8a8a" text-anchor="middle">rope init, kv init, tokenizer</text>

    <rect x="630" y="78" width="260" height="70" rx="8" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="760" y="103" font-family="Inter, sans-serif" font-size="10" fill="#c7c7c7" text-anchor="middle">lowered_ir.json</text>
    <text x="760" y="122" font-family="Inter, sans-serif" font-size="9" fill="#8a8a8a" text-anchor="middle">call args + pointers + dims</text>
  </g>
</svg>
