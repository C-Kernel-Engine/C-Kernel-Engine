1="256" x2="1760" y2="256" stroke="rgba(86,174,255,0.11)" stroke-width="1"/><line x1="0" y1="320" x2="1760" y2="320" stroke="rgba(86,174,255,0.11)" stroke-width="1"/><line x1="0" y1="384" x2="1760" y2="384" stroke="rgba(86,174,255,0.11)" stroke-width="1"/><line x1="0" y1="448" x2="1760" y2="448" stroke="rgba(86,174,255,0.11)" stroke-width="1"/><line x1="0" y1="512" x2="1760" y2="512" stroke="rgba(86,174,255,0.11)" stroke-width="1"/><line x1="0" y1="576" x2="1760" y2="576" stroke="rgba(86,174,255,0.11)" stroke-width="1"/><line x1="0" y1="640" x2="1760" y2="640" stroke="rgba(86,174,255,0.11)" stroke-width="1"/><line x1="0" y1="704" x2="1760" y2="704" stroke="rgba(86,174,255,0.11)" stroke-width="1"/><line x1="0" y1="768" x2="1760" y2="768" stroke="rgba(86,174,255,0.11)" stroke-width="1"/></g><rect x="56.0" y="56.0" width="1648.0" height="112" rx="22" fill="#0d2033" fill-opacity="0.18" stroke="#28577d" stroke-width="1.2"/><rect x="74.0" y="72.0" width="220" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="130.0" fill="#f8fafc" font-size="30" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">IR V2 Pipeline</tspan></text><text x="80.0" y="160.0" fill="#9dd5ff" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">The second-generation pipeline refines the handoffs between representation, lowering,</tspan><tspan x="80.0" dy="18.8">and runtime generation.</tspan></text><g class="flow-node"><rect x="56.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#56aefc" stroke-width="1.6"/><rect x="74.0" y="402.0" width="96" height="24" rx="12" fill="#56aefc" fill-opacity="0.14" stroke="#56aefc" stroke-width="1"/><text x="122.0" y="418.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="122.0" dy="0">STAGE</tspan></text><text x="74.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">IR Capture</tspan></text><text x="74.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="74.0" dy="0">Record richer graph semantics and explicit</tspan><tspan x="74.0" dy="15.0">family intent up front.</tspan></text><text x="78.0" y="498.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">semantics</tspan></text><text x="78.0" y="516.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">families</tspan></text></g><g class="flow-node"><rect x="400.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#56aefc" stroke-width="1.6"/><rect x="418.0" y="402.0" width="96" height="24" rx="12" fill="#56aefc" fill-opacity="0.14" stroke="#56aefc" stroke-width="1"/><text x="466.0" y="418.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="466.0" dy="0">STAGE</tspan></text><text x="418.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">IR Refine</tspan></text><text x="418.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="418.0" dy="0">Normalize and enrich the graph into a more</tspan><tspan x="418.0" dy="15.0">runnable intermediate form.</tspan></text><text x="422.0" y="498.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">normalize</tspan></text><text x="422.0" y="516.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="422.0" dy="0">enrich</tspan></text></g><g class="flow-node"><rect x="744.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#56aefc" stroke-width="1.6"/><rect x="762.0" y="402.0" width="96" height="24" rx="12" fill="#56aefc" fill-opacity="0.14" stroke="#56aefc" stroke-width="1"/><text x="810.0" y="418.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="810.0" dy="0">STAGE</tspan></text><text x="762.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Lowering</tspan></text><text x="762.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="762.0" dy="0">Lower refined IR into runtime-facing</tspan><tspan x="762.0" dy="15.0">artifacts with fewer ambiguities.</tspan></text><text x="766.0" y="498.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="766.0" dy="0">lower</tspan></text><text x="766.0" y="516.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="766.0" dy="0">metadata</tspan></text></g><g class="flow-node"><rect x="1088.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#56aefc" stroke-width="1.6"/><rect x="1106.0" y="402.0" width="96" height="24" rx="12" fill="#56aefc" fill-opacity="0.14" stroke="#56aefc" stroke-width="1"/><text x="1154.0" y="418.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1154.0" dy="0">STAGE</tspan></text><text x="1106.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Runtime Build</tspan></text><text x="1106.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1106.0" dy="0">Build the final callable runtime bundle</tspan><tspan x="1106.0" dy="15.0">from the lowered representation.</tspan></text><text x="1110.0" y="498.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1110.0" dy="0">bundle</tspan></text><text x="1110.0" y="516.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1110.0" dy="0">invoke</tspan></text></g><g class="flow-node"><rect x="1432.0" y="386.0" width="280.0" height="136.0" rx="16" fill="#0d2033" fill-opacity="0.94" stroke="#8bcaff" stroke-width="1.6"/><rect x="1450.0" y="402.0" width="96" height="24" rx="12" fill="#8bcaff" fill-opacity="0.14" stroke="#8bcaff" stroke-width="1"/><text x="1498.0" y="418.0" fill="#8bcaff" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1498.0" dy="0">OUTCOME</tspan></text><text x="1450.0" y="444.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">Operational Pipeline</tspan></text><text x="1450.0" y="470.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1450.0" dy="0">The v2 line is useful when every stage</tspan><tspan x="1450.0" dy="15.0">boundary becomes easier to reason about.</tspan></text></g><g class="flow-connectors"><path d="M 336.0 454.0 C 368.0 454.0, 368.0 454.0, 392.0 454.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="368.0" y="446.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">normalize</tspan></text><path d="M 680.0 454.0 C 712.0 454.0, 712.0 454.0, 736.0 454.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="712.0" y="446.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="712.0" dy="0">lower</tspan></text><path d="M 1024.0 454.0 C 1056.0 454.0, 1056.0 454.0, 1080.0 454.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="1056.0" y="446.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1056.0" dy="0">build</tspan></text><path d="M 1368.0 454.0 C 1400.0 454.0, 1400.0 454.0, 1424.0 454.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><text x="1400.0" y="446.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1400.0" dy="0">ship</tspan></text></g><rect x="56.0" y="748.0" width="1648.0" height="44" rx="14" fill="#16314d" fill-opacity="0.92" stroke="#28577d" stroke-width="1"/><text x="76.0" y="776.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Versioned pipelines are worth training because they force the model to preserve stage semantics.</tspan></text></svg>