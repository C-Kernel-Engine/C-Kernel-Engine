<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Inter', sans-serif; }
    </style>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#232323"/>

  <text x="600" y="45" font-size="28" font-weight="700" fill="#ffb400" text-anchor="middle">
    The Memory Equation: 0 × ∞ = 0
  </text>
  <text x="600" y="70" font-size="14" fill="#707070" text-anchor="middle">
    Why CPU-Only Wins for Large-Scale ML
  </text>

  <rect x="250" y="90" width="700" height="50" rx="6" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="120" font-size="20" font-weight="600" fill="#a0a0a0" text-anchor="middle">
    If model doesn't fit → Fast compute = <tspan fill="#ff6b6b">0</tspan>
  </text>

  <g transform="translate(80, 200)">
    <rect width="480" height="520" rx="8" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="30" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
      CPU CLUSTER
    </text>

    <rect x="60" y="70" width="160" height="120" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
    <text x="140" y="105" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      Socket 0
    </text>
    <text x="140" y="130" font-size="10" fill="#a0a0a0" text-anchor="middle">
      64 cores
    </text>
    <text x="140" y="150" font-size="10" fill="#a0a0a0" text-anchor="middle">
      2-3TB DDR5
    </text>

    <rect x="260" y="70" width="160" height="120" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
    <text x="340" y="105" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      Socket 1
    </text>
    <text x="340" y="130" font-size="10" fill="#a0a0a0" text-anchor="middle">
      64 cores
    </text>
    <text x="340" y="150" font-size="10" fill="#a0a0a0" text-anchor="middle">
      2-3TB DDR5
    </text>

    <rect x="215" y="130" width="50" height="40" rx="4" fill="#2a2a2a" stroke="#ffb400" stroke-width="1.5"/>
    <text x="240" y="153" font-size="10" fill="#ffb400" text-anchor="middle">
      +
    </text>

    <rect x="165" y="230" width="150" height="40" rx="4" fill="#2a2a2a" stroke="#ffb400" stroke-width="1.5"/>
    <text x="240" y="255" font-size="11" font-weight="600" fill="#ffb400" text-anchor="middle">
      RDMA 1.6TB/s
    </text>

    <rect x="40" y="310" width="400" height="70" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="340" font-size="18" font-weight="600" fill="#47b475" text-anchor="middle">
      4-6TB RAM
    </text>
    <text x="240" y="365" font-size="14" font-weight="600" fill="#47b475" text-anchor="middle">
      Models FIT! ✓
    </text>
  </g>

  <g transform="translate(680, 200)">
    <rect width="480" height="520" rx="8" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="30" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
      GPU CLUSTER
    </text>

    <rect x="140" y="70" width="200" height="120" rx="6" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2"/>
    <text x="240" y="105" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      A100
    </text>
    <text x="240" y="130" font-size="10" fill="#a0a0a0" text-anchor="middle">
      80GB VRAM
    </text>
    <text x="240" y="150" font-size="9" font-weight="600" fill="#ff6b6b" text-anchor="middle">
      (Won't fit 1TB model!)
    </text>

    <rect x="100" y="230" width="280" height="50" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2"/>
    <text x="240" y="262" font-size="13" font-weight="600" fill="#ff6b6b" text-anchor="middle">
      Need 10-20 GPUs
    </text>

    <rect x="40" y="320" width="400" height="70" rx="6" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="350" font-size="18" font-weight="600" fill="#ff6b6b" text-anchor="middle">
      80GB × ∞ GPUs
    </text>
    <text x="240" y="375" font-size="14" font-weight="600" fill="#ff6b6b" text-anchor="middle">
      = Still Won't Fit! ✗
    </text>
  </g>

  <circle cx="600" cy="450" r="35" fill="#ffb400"/>
  <text x="600" y="452" font-size="16" font-weight="700" fill="#232323" text-anchor="middle">
    VS
  </text>

  <rect x="150" y="740" width="900" height="45" rx="6" fill="#2a2a2a" stroke="#ffb400" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="770" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
    Being fast doesn't matter if your model doesn't fit!
  </text>
</svg>
