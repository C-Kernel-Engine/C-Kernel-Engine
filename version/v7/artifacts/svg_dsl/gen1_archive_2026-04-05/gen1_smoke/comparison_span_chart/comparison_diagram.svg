<svg width="1200" height="780" viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter></defs><rect x="0" y="0" width="1200" height="780" fill="url(#bgGrad)"/><g opacity="0.20"><circle cx="984.0" cy="156.0" r="180" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="2"/><circle cx="984.0" cy="156.0" r="250" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="1.5"/><circle cx="168.0" cy="639.6" r="120" fill="none" stroke="#ffb400" stroke-width="2"/></g><rect x="56.0" y="56.0" width="1088.0" height="108" rx="22" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="490.0" y="68.0" width="220" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="600.0" y="96.0" fill="#ffb400" font-size="13" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">Broader comparison</tspan></text><text x="600.0" y="128.0" fill="#f3f7fc" font-size="30" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">Comparison Diagram</tspan></text><text x="600.0" y="160.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">Compiler-first span board for the wider gen1 contract.</tspan></text><rect x="76.0" y="206.0" width="210.0" height="326.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="894.0" y="326.0" width="210.0" height="216.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="76.0" y="303.8" width="210.0" height="228.2" rx="18" fill="#ffb400" fill-opacity="0.16" stroke="#ffb400" stroke-width="1.5"/><rect x="894.0" y="474.0" width="210.0" height="68.0" rx="18" fill="#47b475" fill-opacity="0.16" stroke="#47b475" stroke-width="1.5"/><text x="181.0" y="248.0" fill="#ffb400" font-size="18" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="181.0" dy="0">Baseline path</tspan></text><text x="181.0" y="380.0" fill="#f3f7fc" font-size="24" font-weight="700" text-anchor="middle" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="181.0" dy="0">64 units</tspan></text><text x="181.0" y="506.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="181.0" dy="0">higher span</tspan></text><text x="181.0" y="482.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="181.0" dy="0">Comparison Diagram</tspan><tspan x="181.0" dy="13.8">keeps one</tspan><tspan x="181.0" dy="13.8">high-side</tspan><tspan x="181.0" dy="13.8">reference legible.</tspan></text><text x="999.0" y="364.0" fill="#47b475" font-size="18" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="999.0" dy="0">Constrained path</tspan></text><text x="999.0" y="458.0" fill="#f3f7fc" font-size="24" font-weight="700" text-anchor="middle" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="999.0" dy="0">18 units</tspan></text><text x="999.0" y="514.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="999.0" dy="0">closer floor</tspan></text><text x="999.0" y="490.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="999.0" dy="0">Comparison Diagram</tspan><tspan x="999.0" dy="13.8">also keeps the</tspan><tspan x="999.0" dy="13.8">lower-floor</tspan><tspan x="999.0" dy="13.8">comparison</tspan><tspan x="999.0" dy="13.8">visible.</tspan></text><line x1="600.0" y1="226.0" x2="600.0" y2="628.0" stroke="rgba(148,163,184,0.10)" stroke-width="2"/><text x="600.0" y="662.0" fill="#92a4b8" font-size="11" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">Comparison axis</tspan></text><text x="600.0" y="680.0" fill="#92a4b8" font-size="10" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">comparison_diagram</tspan><tspan x="600.0" dy="12.5">holds the same</tspan><tspan x="600.0" dy="12.5">board family while</tspan><tspan x="600.0" dy="12.5">the copy changes.</tspan></text><rect x="390.0" y="302.0" width="420.0" height="216.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><text x="600.0" y="346.0" fill="#ffb400" font-size="18" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">Comparison Diagram</tspan></text><text x="600.0" y="394.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">Broader training needs one stable comparison family</tspan><tspan x="600.0" dy="18.8">with externalized values.</tspan></text><text x="600.0" y="442.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">The model should learn the board structure, not</tspan><tspan x="600.0" dy="18.8">memorize raw SVG geometry.</tspan></text><path d="M 314.0 206.0 L 314.0 532.0 M 304.0 206.0 L 324.0 206.0 M 304.0 532.0 L 324.0 532.0" fill="none" stroke="#ffb400" stroke-width="2.2" stroke-dasharray="6 5"/><text x="366.0" y="357.0" fill="#ffb400" font-size="24" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="366.0" dy="0">5x</tspan></text><text x="366.0" y="385.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="366.0" dy="0">upper span</tspan></text><path d="M 850.0 326.0 L 850.0 542.0 M 840.0 326.0 L 860.0 326.0 M 840.0 542.0 L 860.0 542.0" fill="none" stroke="#47b475" stroke-width="2.2" stroke-dasharray="6 5"/><text x="798.0" y="422.0" fill="#47b475" font-size="24" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="798.0" dy="0">2x</tspan></text><text x="798.0" y="450.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="798.0" dy="0">lower span</tspan></text><rect x="56.0" y="642.0" width="1088.0" height="28" rx="8" fill="#121b29" fill-opacity="0.06" stroke="#334155" stroke-width="1"/><text x="600.0" y="660.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">The family should show one shared floor and two different spans.</tspan></text><circle cx="516.0" cy="218.0" r="7" fill="#ffb400"/><text x="530.0" y="222.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="530.0" dy="0">baseline</tspan></text><circle cx="628.0" cy="218.0" r="7" fill="#47b475"/><text x="642.0" y="222.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="642.0" dy="0">constrained</tspan></text><rect x="460.0" y="224.0" width="180" height="38" rx="14" fill="#ffb400" fill-opacity="0.10" stroke="#ffb400" stroke-width="1"/><text x="474.0" y="242.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="474.0" dy="0">Tradeoff</tspan></text><text x="474.0" y="256.0" fill="#92a4b8" font-size="10" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="474.0" dy="0">Comparison Diagram is</tspan><tspan x="474.0" dy="12.5">treated as one broader</tspan><tspan x="474.0" dy="12.5">comparison case.</tspan></text><line x1="68.0" y1="286.0" x2="1132.0" y2="286.0" stroke="rgba(148,163,184,0.10)" stroke-width="1.5" stroke-dasharray="7 6"/><rect x="68.0" y="688.0" width="1064.0" height="56" rx="18" fill="#121b29" fill-opacity="0.1" stroke="#ffb400" stroke-width="1"/><text x="600.0" y="723.0" fill="#f3f7fc" font-size="16" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">Comparison seeds are now generated compiler-first for broader training.</tspan></text><text x="600.0" y="764.0" fill="#92a4b8" font-size="13" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="600.0" dy="0">comparison_diagram comparison seed</tspan></text></svg>