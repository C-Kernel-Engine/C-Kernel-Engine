<svg width="1600" height="940" viewBox="0 0 1600 940" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1600" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06101c"/>
      <stop offset="1" stop-color="#0a1c2b"/>
    </linearGradient>
    <linearGradient id="memBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e2338"/>
      <stop offset="1" stop-color="#132c44"/>
    </linearGradient>
    <marker id="a3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7fd0ff"/>
    </marker>
  </defs>

  <rect width="1600" height="940" fill="url(#bg3)"/>
  <rect x="40" y="34" width="1520" height="872" rx="16" fill="#0a1725" stroke="#254560"/>

  <text x="82" y="92" fill="#ffb400" font-size="42" font-family="Segoe UI, Arial" font-weight="700">v7 Training Memory Layout and Canary Diagnostics</text>
  <text x="82" y="128" fill="#9eb7cd" font-size="22" font-family="Segoe UI, Arial">Contiguous arena, section boundaries, tensor slots, and phase checks</text>

  <rect x="80" y="164" width="1440" height="66" rx="12" fill="#0e2438" stroke="#2f607f"/>
  <text x="104" y="206" fill="#dcedf8" font-size="24" font-family="Segoe UI, Arial">g_memory = calloc(total_floats) with 64-byte alignment and deterministic offsets from layout_train.json</text>

  <rect x="80" y="258" width="1440" height="176" rx="12" fill="url(#memBar)" stroke="#2e5f84"/>

  <rect x="96" y="282" width="256" height="126" rx="10" fill="#224464" stroke="#4d8bbb"/>
  <text x="114" y="318" fill="#e8f6ff" font-size="23" font-family="Segoe UI, Arial" font-weight="700">weights</text>
  <text x="114" y="346" fill="#c0d9ea" font-size="17" font-family="Segoe UI, Arial">persistent model params</text>
  <text x="114" y="370" fill="#c0d9ea" font-size="17" font-family="Segoe UI, Arial">readonly in forward</text>

  <rect x="364" y="282" width="220" height="126" rx="10" fill="#2e5170" stroke="#6ea6d1"/>
  <text x="382" y="318" fill="#e8f6ff" font-size="23" font-family="Segoe UI, Arial" font-weight="700">activations</text>
  <text x="382" y="346" fill="#c0d9ea" font-size="17" font-family="Segoe UI, Arial">act.* and saved.*</text>
  <text x="382" y="370" fill="#c0d9ea" font-size="17" font-family="Segoe UI, Arial">produced in forward</text>

  <rect x="596" y="282" width="220" height="126" rx="10" fill="#2f5c4a" stroke="#72c3a0"/>
  <text x="614" y="318" fill="#e8fff5" font-size="23" font-family="Segoe UI, Arial" font-weight="700">grad_act</text>
  <text x="614" y="346" fill="#c7eadb" font-size="17" font-family="Segoe UI, Arial">grad.act.*</text>
  <text x="614" y="370" fill="#c7eadb" font-size="17" font-family="Segoe UI, Arial">produced in backward</text>

  <rect x="828" y="282" width="220" height="126" rx="10" fill="#3d5a3d" stroke="#8ec98e"/>
  <text x="846" y="318" fill="#f1ffe8" font-size="23" font-family="Segoe UI, Arial" font-weight="700">grad_weights</text>
  <text x="846" y="346" fill="#d9ebc7" font-size="17" font-family="Segoe UI, Arial">dW and tmp.dW</text>
  <text x="846" y="370" fill="#d9ebc7" font-size="17" font-family="Segoe UI, Arial">accumulated in IR2</text>

  <rect x="1060" y="282" width="220" height="126" rx="10" fill="#6a5a2a" stroke="#d4b86a"/>
  <text x="1078" y="318" fill="#fff8df" font-size="23" font-family="Segoe UI, Arial" font-weight="700">optimizer</text>
  <text x="1078" y="346" fill="#efe3bf" font-size="17" font-family="Segoe UI, Arial">adamw m and v</text>
  <text x="1078" y="370" fill="#efe3bf" font-size="17" font-family="Segoe UI, Arial">updated in step()</text>

  <rect x="1292" y="282" width="212" height="126" rx="10" fill="#5c365f" stroke="#b47dc1"/>
  <text x="1310" y="318" fill="#fdefff" font-size="23" font-family="Segoe UI, Arial" font-weight="700">temp + aux</text>
  <text x="1310" y="346" fill="#e6cfe8" font-size="17" font-family="Segoe UI, Arial">scratch and loss</text>
  <text x="1310" y="370" fill="#e6cfe8" font-size="17" font-family="Segoe UI, Arial">diagnostic metadata</text>

  <text x="84" y="462" fill="#8ec7ef" font-size="24" font-family="Segoe UI, Arial" font-weight="700">Canary Guards</text>
  <rect x="80" y="480" width="700" height="148" rx="12" fill="#11263a" stroke="#2f5d81"/>
  <text x="106" y="516" fill="#d8ebf7" font-size="20" font-family="Segoe UI, Arial">Per tensor slot metadata:</text>
  <text x="106" y="544" fill="#c2dced" font-size="18" font-family="Segoe UI, Arial">name, offset_floats, numel, canary_offset, section, writable_fwd, writable_bwd</text>
  <text x="106" y="572" fill="#c2dced" font-size="18" font-family="Segoe UI, Arial">guard pattern: 0xDEADBEEF (16 floats, 64 bytes)</text>
  <text x="106" y="600" fill="#c2dced" font-size="18" font-family="Segoe UI, Arial">tail canary catches overrun near allocator boundary</text>

  <text x="820" y="462" fill="#9fe5be" font-size="24" font-family="Segoe UI, Arial" font-weight="700">Diagnostic Phases</text>
  <rect x="816" y="480" width="704" height="148" rx="12" fill="#1a3023" stroke="#4a8861"/>
  <text x="842" y="516" fill="#eafff0" font-size="20" font-family="Segoe UI, Arial">1) plant canaries, snapshot weights</text>
  <text x="842" y="544" fill="#d2f1df" font-size="18" font-family="Segoe UI, Arial">2) run forward, check canaries, verify weights unchanged in forward</text>
  <text x="842" y="572" fill="#d2f1df" font-size="18" font-family="Segoe UI, Arial">3) run backward, check canaries</text>
  <text x="842" y="600" fill="#d2f1df" font-size="18" font-family="Segoe UI, Arial">4) run optimizer, final canary check, optional oracle compare</text>

  <line x1="430" y1="434" x2="430" y2="470" stroke="#7fd0ff" stroke-width="4" marker-end="url(#a3)"/>
  <line x1="1170" y1="434" x2="1170" y2="470" stroke="#7fd0ff" stroke-width="4" marker-end="url(#a3)"/>

  <rect x="80" y="660" width="1440" height="216" rx="12" fill="#0f2030" stroke="#325a79"/>
  <text x="106" y="700" fill="#ffcf67" font-size="28" font-family="Segoe UI, Arial" font-weight="700">Operational Checks</text>

  <text x="106" y="738" fill="#d9e8f3" font-size="20" font-family="Segoe UI, Arial">- layout_train_audit.json: overlap, bounds, alignment, section ownership</text>
  <text x="106" y="768" fill="#d9e8f3" font-size="20" font-family="Segoe UI, Arial">- memory_diagnostic_latest.json: phase, first_corrupt_idx, failed_op_id, rc code</text>
  <text x="106" y="798" fill="#d9e8f3" font-size="20" font-family="Segoe UI, Arial">- generated_train_runtime_summary_v7.json: emitted ops, slot map, callable kernels</text>
  <text x="106" y="828" fill="#d9e8f3" font-size="20" font-family="Segoe UI, Arial">- strict run: cks-v7-run train --backend ck --train-strict</text>
  <text x="106" y="858" fill="#95b6cd" font-size="18" font-family="Segoe UI, Arial">If a guard fails, use op trace plus slot map to find first write beyond declared tensor bounds.</text>
</svg>
