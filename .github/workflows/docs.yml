name: Build and Deploy Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'include/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/**'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Build C library (for test running)
        run: |
          make clean || true
          make
        continue-on-error: true  # Tests are optional for docs build

      - name: Build Documentation
        run: |
          cd docs/site
          chmod +x build.sh
          ./build.sh

      - name: Copy Doxygen HTML to site
        run: |
          # Remove symlink and copy actual files for deployment
          rm -f docs/site/doxygen
          cp -r docs/doxygen_output/html docs/site/doxygen

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/site
          keep_files: true
