8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">lowering</tspan></text><text x="917.0" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">artifact shape</tspan></text></g><g class="technical-node"><rect x="1311.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="1329.5" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="1372.5" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1372.5" dy="0">STEP 4</tspan></text><text x="1331.5" y="268.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">Artifact Output</tspan></text><text x="1331.5" y="294.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">The endpoint is a set of</tspan><tspan x="1331.5" dy="15.0">runtime-facing artifacts whose</tspan><tspan x="1331.5" dy="15.0">lineage should still be readable.</tspan></text><text x="1335.5" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">buffer lifetime</tspan></text><text x="1335.5" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">runtime handoff</tspan></text></g><g class="technical-connectors"><path d="M 430.5 297.0 C 461.5 297.0, 461.5 297.0, 492.5 297.0" stroke="#56aefc" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 849.0 297.0 C 