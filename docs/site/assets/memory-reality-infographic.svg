<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1420">
  <defs>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1e2e" />
      <stop offset="100%" style="stop-color:#2d2d3d" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24" />
      <stop offset="100%" style="stop-color:#f59e0b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1600" fill="#0f0f1a"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="1600" fill="url(#grid)" opacity="0.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="120" fill="url(#headerGrad)"/>
  <text x="600" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">LLM Memory Reality</text>
  <text x="600" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a0a0b0" text-anchor="middle">The Math That Marketing Won't Show You</text>

  <!-- Section 1: The First Principle -->
  <g transform="translate(50, 150)">
    <rect width="1100" height="180" rx="16" fill="#1a1a2e" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="180" rx="4" fill="url(#accentGrad)"/>

    <text x="40" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#fbbf24">First Principle</text>

    <text x="540" y="100" font-family="monospace" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">0 × ∞ = 0</text>

    <text x="540" y="150" font-family="system-ui, sans-serif" font-size="18" fill="#a0a0b0" text-anchor="middle">If your model doesn't fit in memory, compute speed is irrelevant.</text>
  </g>

  <!-- Section 2: Memory Capacity Comparison -->
  <g transform="translate(50, 360)">
    <rect width="1100" height="280" rx="16" fill="#1a1a2e" filter="url(#shadow)"/>

    <text x="40" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">Memory Capacity</text>

    <!-- GPU Bar -->
    <rect x="40" y="80" width="480" height="60" rx="8" fill="#2d2d3d"/>
    <rect x="40" y="80" width="80" height="60" rx="8" fill="url(#gpuGrad)"/>
    <text x="50" y="118" font-family="monospace" font-size="24" font-weight="bold" fill="#ffffff">80 GB</text>
    <text x="540" y="118" font-family="system-ui, sans-serif" font-size="18" fill="#a0a0b0" text-anchor="end">GPU VRAM (single device)</text>

    <!-- CPU Bar -->
    <rect x="40" y="160" width="1020" height="60" rx="8" fill="#2d2d3d"/>
    <rect x="40" y="160" width="1020" height="60" rx="8" fill="url(#cpuGrad)"/>
    <text x="50" y="198" font-family="monospace" font-size="24" font-weight="bold" fill="#ffffff">2,000 GB</text>
    <text x="1040" y="198" font-family="system-ui, sans-serif" font-size="18" fill="#a0a0b0" text-anchor="end">CPU RAM (single server)</text>

    <text x="550" y="260" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#4ade80" text-anchor="middle">25× More Memory Capacity</text>
  </g>

  <!-- Section 3: 70B Model + Context Fit Analysis -->
  <g transform="translate(50, 670)">
    <rect width="1100" height="380" rx="16" fill="#1a1a2e" filter="url(#shadow)"/>

    <text x="40" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">70B Model + Context: Does It Fit?</text>
    <text x="40" y="75" font-family="system-ui, sans-serif" font-size="14" fill="#a0a0b0">Llama 3.1 70B (GQA-8): 80 layers, 8 KV heads, head_dim=128, FP16 KV cache (320 KB/token)</text>

    <!-- Table Header -->
    <rect x="40" y="100" width="1020" height="50" rx="8" fill="#2d2d3d"/>
    <text x="140" y="132" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Context</text>
    <text x="300" y="132" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">KV Cache</text>
    <text x="460" y="132" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Total Need</text>
    <text x="650" y="132" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">GPU (80GB)</text>
    <text x="890" y="132" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">CPU (2TB)</text>

    <!-- Row 1: 8K -->
    <rect x="40" y="155" width="1020" height="45" rx="4" fill="#1e1e2e"/>
    <text x="140" y="185" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">8K</text>
    <text x="300" y="185" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">2.6 GB</text>
    <text x="460" y="185" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">143 GB</text>
    <text x="650" y="185" font-family="monospace" font-size="16" fill="#f87171" text-anchor="middle">2× GPUs</text>
    <circle cx="890" cy="180" r="12" fill="#4ade80"/>
    <text x="890" y="186" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f0f1a" text-anchor="middle">✓</text>

    <!-- Row 2: 32K -->
    <rect x="40" y="205" width="1020" height="45" rx="4" fill="#252535"/>
    <text x="140" y="235" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">32K</text>
    <text x="300" y="235" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">10 GB</text>
    <text x="460" y="235" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">150 GB</text>
    <text x="650" y="235" font-family="monospace" font-size="16" fill="#f87171" text-anchor="middle">2× GPUs</text>
    <circle cx="890" cy="230" r="12" fill="#4ade80"/>
    <text x="890" y="236" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f0f1a" text-anchor="middle">✓</text>

    <!-- Row 3: 128K -->
    <rect x="40" y="255" width="1020" height="45" rx="4" fill="#1e1e2e"/>
    <text x="140" y="285" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">128K</text>
    <text x="300" y="285" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">41 GB</text>
    <text x="460" y="285" font-family="monospace" font-size="16" fill="#ffffff" text-anchor="middle">181 GB</text>
    <text x="650" y="285" font-family="monospace" font-size="16" fill="#f87171" text-anchor="middle">3× GPUs</text>
    <circle cx="890" cy="280" r="12" fill="#4ade80"/>
    <text x="890" y="286" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f0f1a" text-anchor="middle">✓</text>

    <!-- Row 4: 1M (highlighted) -->
    <rect x="40" y="305" width="1020" height="50" rx="4" fill="#3d2d2d" stroke="#f87171" stroke-width="2"/>
    <text x="140" y="338" font-family="monospace" font-size="18" font-weight="bold" fill="#fbbf24" text-anchor="middle">1M</text>
    <text x="300" y="338" font-family="monospace" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">320 GB</text>
    <text x="460" y="338" font-family="monospace" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">460 GB</text>
    <text x="650" y="338" font-family="monospace" font-size="16" font-weight="bold" fill="#f87171" text-anchor="middle">6× GPUs</text>
    <circle cx="890" cy="330" r="12" fill="#4ade80"/>
    <text x="890" y="336" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f0f1a" text-anchor="middle">✓</text>
  </g>

  <!-- Section 4: Cost Comparison -->
  <g transform="translate(50, 1080)">
    <rect width="520" height="220" rx="16" fill="#2d1a1a" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="220" rx="4" fill="url(#gpuGrad)"/>

    <text x="40" y="45" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#f87171">GPU Path (70B + 1M context)</text>

    <text x="40" y="90" font-family="system-ui, sans-serif" font-size="16" fill="#a0a0b0">6× 80GB GPUs required</text>
    <text x="40" y="120" font-family="system-ui, sans-serif" font-size="16" fill="#a0a0b0">+ NVLink switches</text>
    <text x="40" y="150" font-family="system-ui, sans-serif" font-size="16" fill="#a0a0b0">+ Multi-node networking</text>

    <text x="40" y="195" font-family="monospace" font-size="36" font-weight="bold" fill="#f87171">$240,000+</text>
  </g>

  <g transform="translate(630, 1080)">
    <rect width="520" height="220" rx="16" fill="#1a2d1a" filter="url(#shadow)"/>
    <rect x="0" y="0" width="8" height="220" rx="4" fill="url(#cpuGrad)"/>

    <text x="40" y="45" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#4ade80">CPU Path (70B + 1M context)</text>

    <text x="40" y="90" font-family="system-ui, sans-serif" font-size="16" fill="#a0a0b0">1× server with 2TB RAM</text>
    <text x="40" y="120" font-family="system-ui, sans-serif" font-size="16" fill="#a0a0b0">Standard Ethernet</text>
    <text x="40" y="150" font-family="system-ui, sans-serif" font-size="16" fill="#a0a0b0">Room for 1.5TB more!</text>

    <text x="40" y="195" font-family="monospace" font-size="36" font-weight="bold" fill="#4ade80">$30,000</text>
  </g>

  <!-- Cost savings callout -->
  <g transform="translate(400, 1310)">
    <rect width="400" height="70" rx="35" fill="url(#accentGrad)" filter="url(#shadow)"/>
    <text x="200" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f0f1a" text-anchor="middle">8× Lower Cost</text>
  </g>

  <!-- Footer -->
  <text x="600" y="1395" font-family="system-ui, sans-serif" font-size="14" fill="#606070" text-anchor="middle">C-Kernel-Engine | CPU-First LLM Inference</text>
</svg>