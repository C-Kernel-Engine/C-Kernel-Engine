<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Inter', sans-serif; }
    </style>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#232323"/>

  <text x="600" y="45" font-size="28" font-weight="700" fill="#ffb400" text-anchor="middle">
    Theory of Constraints: Network Interconnect
  </text>
  <text x="600" y="70" font-size="14" fill="#707070" text-anchor="middle">
    The Real Bottleneck in Distributed ML
  </text>

  <g transform="translate(80, 120)">
    <rect width="480" height="560" rx="8" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="30" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
      NVLink (Expensive Path)
    </text>

    <rect x="80" y="80" width="160" height="140" rx="6" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2"/>
    <text x="160" y="115" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      GPU 0
    </text>
    <text x="160" y="140" font-size="10" fill="#a0a0a0" text-anchor="middle">
      A100/H100
    </text>
    <text x="160" y="170" font-size="10" fill="#a0a0a0" text-anchor="middle">
      $40,000
    </text>

    <rect x="250" y="130" width="90" height="40" rx="4" fill="#2a2a2a" stroke="#ffb400" stroke-width="1.5"/>
    <text x="295" y="153" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      900 GB/s
    </text>

    <rect x="360" y="80" width="160" height="140" rx="6" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2"/>
    <text x="440" y="115" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      GPU 1
    </text>
    <text x="440" y="140" font-size="10" fill="#a0a0a0" text-anchor="middle">
      A100/H100
    </text>
    <text x="440" y="170" font-size="10" fill="#a0a0a0" text-anchor="middle">
      $40,000
    </text>

    <rect x="50" y="380" width="380" height="150" rx="6" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="410" font-size="16" font-weight="600" fill="#ff6b6b" text-anchor="middle">
      Total Cost for 2 GPUs:
    </text>
    <text x="240" y="445" font-size="22" font-weight="700" fill="#ff6b6b" text-anchor="middle">
      $80,000
    </text>
    <text x="240" y="480" font-size="10" fill="#a0a0a0" text-anchor="middle">
      + NVLink licenses + special hardware
    </text>
  </g>

  <circle cx="600" cy="400" r="30" fill="#ffb400"/>
  <text x="600" y="402" font-size="14" font-weight="700" fill="#232323" text-anchor="middle">
    VS
  </text>

  <g transform="translate(680, 120)">
    <rect width="480" height="560" rx="8" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="30" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
      RDMA (Commodity Path)
    </text>

    <rect x="80" y="80" width="160" height="140" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
    <text x="160" y="115" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      CPU 0
    </text>
    <text x="160" y="140" font-size="10" fill="#a0a0a0" text-anchor="middle">
      Xeon/EPYC
    </text>
    <text x="160" y="170" font-size="10" fill="#a0a0a0" text-anchor="middle">
      $3,000
    </text>

    <rect x="250" y="130" width="90" height="40" rx="4" fill="#2a2a2a" stroke="#47b475" stroke-width="1.5"/>
    <text x="295" y="153" font-size="12" font-weight="600" fill="#47b475" text-anchor="middle">
      1.6 TB/s
    </text>

    <rect x="360" y="80" width="160" height="140" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2"/>
    <text x="440" y="115" font-size="12" font-weight="600" fill="#ffb400" text-anchor="middle">
      CPU 1
    </text>
    <text x="440" y="140" font-size="10" fill="#a0a0a0" text-anchor="middle">
      Xeon/EPYC
    </text>
    <text x="440" y="170" font-size="10" fill="#a0a0a0" text-anchor="middle">
      $3,000
    </text>

    <rect x="50" y="380" width="380" height="150" rx="6" fill="#2a2a2a" stroke="#47b475" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="410" font-size="16" font-weight="600" fill="#47b475" text-anchor="middle">
      Total Cost for 2 CPUs:
    </text>
    <text x="240" y="445" font-size="22" font-weight="700" fill="#47b475" text-anchor="middle">
      $6,000
    </text>
    <text x="240" y="480" font-size="10" fill="#a0a0a0" text-anchor="middle">
      + standard Ethernet + Linux
    </text>
  </g>

  <rect x="150" y="730" width="900" height="50" rx="6" fill="#2a2a2a" stroke="#ffb400" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="760" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
    THEORY OF CONSTRAINTS: Only 3x slower → Fix it with engineering, not more hardware!
  </text>
</svg>
