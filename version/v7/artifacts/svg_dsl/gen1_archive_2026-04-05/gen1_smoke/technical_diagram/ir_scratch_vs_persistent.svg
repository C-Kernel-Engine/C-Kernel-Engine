<svg width="1760" height="1060" viewBox="0 0 1760 1060" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#07131f"/><stop offset="100%" stop-color="#11253a"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#56aefc"/><stop offset="100%" stop-color="#8bcaff"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0d2033"/><stop offset="100%" stop-color="#16314d"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(8,22,38,0.55)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#56aefc"/></filter><marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 z" fill="#56aefc"/></marker></defs><rect x="0" y="0" width="1760" height="1060" fill="url(#bgGrad)"/><g opacity="0.24"><circle cx="316.8" cy="254.4" r="180" fill="#d8eeff"/><circle cx="1548.8" cy="190.8" r="140" fill="#d8eeff"/><circle cx="1196.8" cy="890.4" r="220" fill="#8bcaff" opacity="0.20"/></g><rect x="56.0" y="56.0" width="1648.0" height="118" rx="22" fill="#0d2033" fill-opacity="0.18" stroke="#28577d" stroke-width="1.2"/><rect x="74.0" y="72.0" width="240" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="120.0" fill="#f8fafc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">IR Scratch Vs Persistent</tspan></text><text x="80.0" y="158.0" fill="#9dd5ff" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Scratch versus persistent buffers is a structure choice, not just a memory number.</tspan></text><g class="technical-node"><rect x="56.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="117.0" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="117.0" dy="0">STEP 1</tspan></text><text x="76.0" y="268.0" fill="#f8fafc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Source Contract</tspan></text><text x="76.0" y="294.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">IR Scratch Vs Persistent begins</tspan><tspan x="76.0" dy="15.0">with a high-level intent or graph</tspan><tspan x="76.0" dy="15.0">contract that must remain visible.</tspan></text><text x="80.0" y="330.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">buffer lifetime</tspan></text><text x="80.0" y="348.0" fill="#8bcaff" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">reuse</tspan></text></g><g class="technical-node"><rect x="474.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><rect x="492.5" y="222.0" width="86" height="22" rx="11" fill="#56aefc" fill-opacity="0.12" stroke="#56aefc" stroke-width="1"/><text x="535.5" y="237.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="535.5" dy="0">STEP 2</tspan></text><text x="494.5" y="268.0" fill="#f8fafc" font-size="19" font-weight="700" tex