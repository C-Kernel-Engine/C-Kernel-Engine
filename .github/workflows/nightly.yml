name: Nightly Tests

on:
  # Run nightly at 2am UTC
  schedule:
    - cron: '0 2 * * *'

  # Also run on push to main and PRs
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

# Need write access to push to gh-pages
permissions:
  contents: write
  pages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Check CPU features
        run: |
          echo "=== CPU Info ==="
          lscpu | grep -E "(Model name|CPU\(s\)|Thread|Core|Socket|Flags)"
          echo "AVX2: $(grep -q avx2 /proc/cpuinfo && echo YES || echo NO)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-v7.txt
          pip install huggingface_hub torch

      - name: Build CK-Engine
        run: |
          make clean || true
          make -j$(nproc)
          make libck_parity.so
          echo ""
          echo "=== Built libraries ==="
          ls -la build/*.so 2>/dev/null || echo "No .so files"

      - name: Validate parity library ABI
        run: |
          echo "=== Validating libck_parity.so ABI ==="
          test -f build/libck_parity.so
          echo "Checking required exports..."
          nm -D build/libck_parity.so | grep -q ' ck_strict_parity_enabled$'
          nm -D build/libck_parity.so | grep -q ' ck_threadpool_global_destroy$'
          echo "Checking unresolved dynamic symbols..."
          if ldd -r build/libck_parity.so 2>&1 | grep -q "undefined symbol"; then
            echo "::error::Undefined symbols found in build/libck_parity.so"
            ldd -r build/libck_parity.so || true
            exit 1
          fi
          echo "libck_parity.so ABI checks passed"

      - name: Setup llama.cpp for parity testing
        run: |
          LLAMA_CPP_COMMIT="${LLAMA_CPP_COMMIT:-$(git ls-tree HEAD llama.cpp | awk '{print $3}')}"
          if [ -z "$LLAMA_CPP_COMMIT" ]; then
            echo "::error::Could not resolve llama.cpp gitlink from HEAD"
            exit 1
          fi

          rm -rf llama.cpp
          git clone --depth 200 https://github.com/ggerganov/llama.cpp.git llama.cpp

          cd llama.cpp
          git fetch origin "$LLAMA_CPP_COMMIT"
          git checkout --detach "$LLAMA_CPP_COMMIT"
          echo "llama.cpp at: $(git rev-parse --short HEAD)"

          # Apply patches
          if [ -f "../patches/llama.patch" ]; then
            git apply ../patches/llama.patch || echo "llama.patch already applied or not needed"
          fi
          if [ -f "../patches/test-kernel-parity.cpp" ]; then
            mkdir -p tests
            cp ../patches/test-kernel-parity.cpp tests/
          fi
          if [ -f "../patches/ck-engine-parity-bench.patch" ]; then
            git apply ../patches/ck-engine-parity-bench.patch || echo "ck-engine-parity-bench.patch already applied or not needed"
          fi

          # Build
          cmake -B build -DGGML_CPU=ON -DLLAMA_BUILD_TESTS=OFF -DLLAMA_CURL=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

          # Build kernel test library
          if [ -f "tests/test-kernel-parity.cpp" ]; then
            export LD_LIBRARY_PATH="$PWD/build/bin:$LD_LIBRARY_PATH"
            g++ -shared -fPIC -o libggml_kernel_test.so \
              tests/test-kernel-parity.cpp \
              -I ggml/include -I ggml/src \
              -L build/bin -lggml -lggml-cpu -lggml-base -lm -lpthread \
              -Wl,-rpath,'$ORIGIN/build/bin' || echo "Kernel test lib failed"
          fi
          cd ..

      - name: Run Kernel Parity Tests
        run: |
          echo "=== Running Kernel Parity Tests ==="
          export LD_LIBRARY_PATH="$PWD/llama.cpp/build/bin:$LD_LIBRARY_PATH"
          ./scripts/run_parity_smoketest.sh --quick 2>&1 | tee build/parity_test.log

      - name: Determine v7 Fast Regression Scope
        id: regression_scope
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          before = os.environ.get("GITHUB_EVENT_BEFORE", "")
          head = os.environ.get("GITHUB_SHA", "")
          pr_base = os.environ.get("PR_BASE_SHA", "")
          pr_head = os.environ.get("PR_HEAD_SHA", "")
          zero = "0" * 40

          def changed_files():
              if event in ("schedule", "workflow_dispatch"):
                  return None
              if event == "push":
                  if before and before != zero:
                      try:
                          out = subprocess.check_output(
                              ["git", "diff", "--name-only", before, head, "--"],
                              text=True,
                          )
                          paths = [line.strip() for line in out.splitlines() if line.strip()]
                          if paths:
                              return paths
                      except Exception:
                          pass
                  out = subprocess.check_output(
                      ["git", "diff-tree", "--root", "--no-commit-id", "--name-only", "-r", head, "--"],
                      text=True,
                  )
                  return [line.strip() for line in out.splitlines() if line.strip()]
              if event == "pull_request" and pr_base and pr_head:
                  try:
                      out = subprocess.check_output(
                          ["git", "diff", "--name-only", pr_base, pr_head, "--"],
                          text=True,
                      )
                      return [line.strip() for line in out.splitlines() if line.strip()]
                  except Exception:
                      return []
              return []

          def should_run(paths):
              if paths is None:
                  return True, f"{event} event"
              prefixes = (
                  "scripts/",
                  "src/",
                  "tests/",
                  "version/v7/scripts/",
                  "version/v7/templates/",
                  "version/v7/regression/",
                  "version/v7/src/",
              )
              exact = {
                  "Makefile",
                  ".githooks/pre-commit",
                  ".githooks/pre-push",
                  ".github/workflows/nightly.yml",
                  "version/v7/README.md",
              }
              for path in paths:
                  if path in exact or path.startswith(prefixes):
                      return True, f"changed path: {path}"
              return False, "no runtime/regression path changes"

          paths = changed_files()
          run, reason = should_run(paths)
          out_path = Path(os.environ["GITHUB_OUTPUT"])
          with out_path.open("a", encoding="utf-8") as f:
              f.write(f"should_run={'true' if run else 'false'}\n")
              f.write(f"reason={reason}\n")
          print(f"v7 regression-fast should_run={run} ({reason})")
          PY

      - name: Run v7 Fast Regression
        if: steps.regression_scope.outputs.should_run == 'true'
        env:
          CK_CACHE_DIR: ${{ runner.temp }}/ck-engine-v7/models
        run: |
          echo "=== Running v7 Fast Regression ==="
          echo "Reason: ${{ steps.regression_scope.outputs.reason }}"
          mkdir -p build/v7-regression-runs build/v7-regression-reports
          make regression-fast REGRESSION_ARGS="--run-root build/v7-regression-runs --report-root build/v7-regression-reports" 2>&1 | tee build/v7_regression_fast.log

      - name: Run Nightly Test Suite
        run: |
          echo "=== Running Full Nightly Test Suite ==="
          echo "Includes: 30+ kernel tests, BF16, quantization, training tests"

          # Create output directory (site/site/ because docs/site/ deploys to root)
          mkdir -p docs/site/site/nightly-results

          # Run tests and write to site/nightly-results/ path on gh-pages
          python scripts/nightly_runner.py --no-fail --json docs/site/site/nightly-results/latest.json 2>&1 | tee build/nightly_test.log

          # Also save to build for artifact upload
          cp docs/site/site/nightly-results/latest.json build/nightly_report.json 2>/dev/null || true

          # Show summary
          if [ -f docs/site/site/nightly-results/latest.json ]; then
            echo ""
            echo "=== Nightly Test Summary ==="
            python3 -c "import json; d=json.load(open('docs/site/site/nightly-results/latest.json')); s=d['summary']; print(f\"Passed: {s['passed']}\"); print(f\"Failed: {s['failed']}\"); print(f\"Total:  {s['total']}\")"
          fi

      - name: Attach v7 Fast Regression Summary
        env:
          REGRESSION_SHOULD_RUN: ${{ steps.regression_scope.outputs.should_run }}
          REGRESSION_REASON: ${{ steps.regression_scope.outputs.reason }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          latest_path = Path("docs/site/site/nightly-results/latest.json")
          if not latest_path.exists():
            raise SystemExit("missing nightly latest.json")

          data = json.loads(latest_path.read_text(encoding="utf-8"))
          reports_root = Path("build/v7-regression-reports")
          summary_files = sorted(reports_root.glob("*/summary.json"))
          repo_latest_path = Path("docs/site/nightly-results/latest.json")

          regression_payload = {
              "status": "not_run",
              "mode": "fast",
              "families_total": 0,
              "families_passed": 0,
              "families_failed": 0,
              "family_rows": [],
              "note": f"make regression-fast did not run for this workflow event ({os.environ.get('REGRESSION_REASON', 'not requested')}).",
          }

          if summary_files:
              latest_summary = max(summary_files, key=lambda p: p.stat().st_mtime)
              summary = json.loads(latest_summary.read_text(encoding="utf-8"))
              families = summary.get("families") or []
              family_rows = []
              for fam in families:
                  if not isinstance(fam, dict):
                      continue
                  family_rows.append({
                      "family_id": fam.get("family_id"),
                      "label": fam.get("label"),
                      "status": "PASS" if str(fam.get("failure_class", "pass")) == "pass" else "FAIL",
                      "build_status": fam.get("build_status"),
                      "smoke_status": fam.get("smoke_status"),
                      "coherence_status": fam.get("coherence_status"),
                      "contract_status": fam.get("contract_status"),
                      "first_token_status": fam.get("first_token_status"),
                      "failure_reason": fam.get("failure_reason"),
                      "failure_detail": fam.get("failure_detail"),
                  })
              families_passed = sum(1 for row in family_rows if row.get("status") == "PASS")
              regression_payload = {
                  "status": "pass" if str(summary.get("status", "")).upper() == "PASS" else "fail",
                  "mode": summary.get("mode", "fast"),
                  "generated_at": summary.get("generated_at"),
                  "report_dir": summary.get("report_dir"),
                  "summary_path": str(latest_summary),
                  "families_total": len(family_rows),
                  "families_passed": families_passed,
                  "families_failed": max(0, len(family_rows) - families_passed),
                  "failure_classes": summary.get("failure_classes", {}),
                  "family_rows": family_rows,
                  "note": f"Source: {latest_summary}",
              }
          elif repo_latest_path.exists():
              try:
                  repo_latest = json.loads(repo_latest_path.read_text(encoding="utf-8"))
                  prev = repo_latest.get("regression_fast")
                  if isinstance(prev, dict) and (prev.get("family_rows") or prev.get("families_total")):
                      regression_payload = dict(prev)
                      reason = os.environ.get("REGRESSION_REASON", "not requested")
                      regression_payload["note"] = (
                          f"{prev.get('note', 'Preserved previous regression-fast snapshot.')} "
                          f"Preserved because this workflow skipped regression-fast ({reason})."
                      ).strip()
              except Exception:
                  pass

          data["regression_fast"] = regression_payload
          latest_path.write_text(json.dumps(data, indent=2), encoding="utf-8")
          Path("build/nightly_report.json").write_text(json.dumps(data, indent=2), encoding="utf-8")
          print("Attached regression_fast to nightly latest.json")
          PY

      - name: Run v6.6 E2E Tests
        run: |
          echo "=== Running v6.6 E2E Tests ==="
          echo "Tests the v6.6 pipeline: download -> convert -> IR -> codegen -> compile -> test"

          # Run v6.6 E2E test
          make e2e-v66 2>&1 | tee build/v66_e2e.log || {
            echo "::warning::v6.6 E2E tests had issues"
            # Don't fail the build yet - v6.6 is still being stabilized
          }

          echo ""
          echo "=== v6.6 E2E Test Complete ==="

      - name: Run v6.6 Strict Parity Matrix (runtime-required)
        run: |
          echo "=== Running v6.6 Strict Parity Matrix ==="
          echo "Enforces runtime-required parity checks (no SKIP pass-through)."
          make v6.6-validate-parity-matrix-required 2>&1 | tee build/v66_parity_required.log || {
            echo "::warning::v6.6 strict parity matrix had issues"
            echo "::warning::See build/v66_parity_required.log artifact for details"
          }
          echo ""
          echo "=== v6.6 Strict Parity Matrix Complete ==="

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            build/*.log
            build/*.json
            build/v7-regression-reports/**
          retention-days: 7

      - name: Prepare nightly results for deployment
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          if [ -f docs/site/site/nightly-results/latest.json ]; then
            # Create dated report
            DATE=$(date +%Y-%m-%d)
            cp docs/site/site/nightly-results/latest.json "docs/site/site/nightly-results/report-${DATE}.json"

            # Fetch existing historical reports from gh-pages to preserve history
            echo "Fetching historical reports from gh-pages..."
            PAGES_URL="https://raw.githubusercontent.com/${{ github.repository }}/gh-pages"

            # Fetch existing index to get list of historical reports
            if curl -sf "${PAGES_URL}/site/nightly-results/index.json" -o /tmp/existing_index.json; then
              echo "Found existing index with historical data"

              # Download each historical report file that we don't already have
              for report_file in $(jq -r '.reports[].file' /tmp/existing_index.json 2>/dev/null); do
                if [ ! -f "docs/site/site/nightly-results/${report_file}" ]; then
                  echo "  Fetching ${report_file}..."
                  curl -sf "${PAGES_URL}/site/nightly-results/${report_file}" \
                    -o "docs/site/site/nightly-results/${report_file}" || true
                fi
              done
            else
              echo "No existing index found (first run or new repo)"
            fi

            # Update index.json with all report summaries (now includes historical)
            python3 scripts/nightly_runner.py --update-index --results-dir docs/site/site/nightly-results

            echo "=== Nightly results prepared ==="
            echo "Reports in directory:"
            ls -la docs/site/site/nightly-results/
            echo ""
            echo "Index contains $(jq '.reports | length' docs/site/site/nightly-results/index.json) reports"
          fi

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/site
          keep_files: true
