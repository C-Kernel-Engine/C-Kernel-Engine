<svg width="1280" height="920" viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1018"/><stop offset="100%" stop-color="#141d2b"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#ffd66b"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#121b29"/><stop offset="100%" stop-color="#192638"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(2,6,23,0.46)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter></defs><rect x="0" y="0" width="1280" height="920" fill="url(#bgGrad)"/><g opacity="0.20"><circle cx="1049.6" cy="184.0" r="180" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="2"/><circle cx="1049.6" cy="184.0" r="250" fill="none" stroke="rgba(148,163,184,0.10)" stroke-width="1.5"/><circle cx="179.2" cy="754.4" r="120" fill="none" stroke="#ffb400" stroke-width="2"/></g><rect x="56.0" y="56.0" width="1168.0" height="132" rx="26" fill="#121b29" fill-opacity="0.18" stroke="#334155" stroke-width="1.2"/><rect x="78.0" y="74.0" width="240" height="9" rx="4.5" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="82.0" y="102.0" fill="#ffb400" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Systems First Principles</tspan></text><text x="82.0" y="140.0" fill="#f3f7fc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">Two Principles</tspan></text><text x="82.0" y="172.0" fill="#92a4b8" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="82.0" dy="0">AI scaling is bounded first by whether the model fits, and then by whichever subsystem becomes</tspan><tspan x="82.0" dy="18.8">the active constraint.</tspan></text><rect x="56.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="56.0" y="212.0" width="8" height="226.0" rx="4" fill="#ffb400"/><rect x="78.0" y="232.0" width="527.0" height="28" rx="14" fill="#ffb400" fill-opacity="0.11" stroke="#ffb400" stroke-width="1"/><text x="88.0" y="251.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="88.0" dy="0">0 × infinity = 0</tspan></text><text x="86.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="86.0" dy="0">Infinite theoretical FLOPS do not matter if</tspan><tspan x="86.0" dy="16.2">the model cannot fit into the available</tspan><tspan x="86.0" dy="16.2">memory budget.</tspan></text><circle cx="92.0" cy="320.0" r="5" fill="#ffb400"/><text x="106.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Capacity gate first</tspan></text><circle cx="92.0" cy="348.0" r="5" fill="#ffb400"/><text x="106.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">GPU clusters appear early</tspan></text><circle cx="92.0" cy="376.0" r="5" fill="#ffb400"/><text x="106.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="106.0" dy="0">Utility is zero if it will not load</tspan></text><rect x="653.0" y="212.0" width="571.0" height="226.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="653.0" y="212.0" width="8" height="226.0" rx="4" fill="#ffd66b"/><rect x="675.0" y="232.0" width="527.0" height="28" rx="14" fill="#ffd66b" fill-opacity="0.11" stroke="#ffd66b" stroke-width="1"/><text x="685.0" y="251.0" fill="#ffd66b" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="685.0" dy="0">Theory of constraints</tspan></text><text x="683.0" y="284.0" fill="#f3f7fc" font-size="13" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="683.0" dy="0">Once capacity is solved, optimize the actual</tspan><tspan x="683.0" dy="16.2">active bottleneck instead of the most</tspan><tspan x="683.0" dy="16.2">fashionable metric.</tspan></text><circle cx="689.0" cy="320.0" r="5" fill="#ffd66b"/><text x="703.0" y="324.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Find the bottleneck</tspan></text><circle cx="689.0" cy="348.0" r="5" fill="#ffd66b"/><text x="703.0" y="352.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Exploit it</tspan></text><circle cx="689.0" cy="376.0" r="5" fill="#ffd66b"/><text x="703.0" y="380.0" fill="#92a4b8" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="703.0" dy="0">Re-evaluate after each fix</tspan></text><rect x="56.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="482.0" width="336.0" height="24" rx="12" fill="#ffb400" fill-opacity="0.10"/><text x="84.0" y="500.0" fill="#ffb400" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="84.0" dy="0">Principle</tspan></text><text x="80.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Memory is the gate</tspan></text><text x="80.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Fitting the model is a binary</tspan><tspan x="80.0" dy="15.0">prerequisite; throughput only</tspan><tspan x="80.0" dy="15.0">matters afterward.</tspan></text><circle cx="84.0" cy="600.0" r="4.5" fill="#ffb400"/><text x="98.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Capacity first</tspan></text><circle cx="84.0" cy="624.0" r="4.5" fill="#ffb400"/><text x="98.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">FLOPS second</tspan></text><circle cx="84.0" cy="648.0" r="4.5" fill="#ffb400"/><text x="98.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="98.0" dy="0">Clusters are a consequence</tspan></text><line x1="80.0" y1="646.0" x2="404.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="80.0" y="670.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">The gate opens before the</tspan><tspan x="80.0" dy="12.5">race starts.</tspan></text><rect x="454.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="472.0" y="482.0" width="336.0" height="24" rx="12" fill="#47b475" fill-opacity="0.10"/><text x="482.0" y="500.0" fill="#47b475" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="482.0" dy="0">Principle</tspan></text><text x="478.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Optimize the real</tspan><tspan x="478.0" dy="23.8">bottleneck</tspan></text><text x="478.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">The slowest or most constrained</tspan><tspan x="478.0" dy="15.0">subsystem sets the pace, not the</tspan><tspan x="478.0" dy="15.0">marketing headline.</tspan></text><circle cx="482.0" cy="600.0" r="4.5" fill="#47b475"/><text x="496.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Measure the hot path</tspan></text><circle cx="482.0" cy="624.0" r="4.5" fill="#47b475"/><text x="496.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Fix what actually binds</tspan></text><circle cx="482.0" cy="648.0" r="4.5" fill="#47b475"/><text x="496.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="496.0" dy="0">Re-profile after the change</tspan></text><line x1="478.0" y1="646.0" x2="802.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="478.0" y="670.0" fill="#47b475" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="478.0" dy="0">Constraints move as the</tspan><tspan x="478.0" dy="12.5">system evolves.</tspan></text><rect x="852.0" y="464.0" width="372.0" height="224.0" rx="24" fill="url(#panelGrad)" stroke="#ffd66b" stroke-width="1.5" filter="url(#softShadow)"/><rect x="870.0" y="482.0" width="336.0" height="24" rx="12" fill="#56aefc" fill-opacity="0.10"/><text x="880.0" y="500.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="880.0" dy="0">Principle</tspan></text><text x="876.0" y="534.0" fill="#f3f7fc" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Design follows evidence</tspan></text><text x="876.0" y="564.0" fill="#92a4b8" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">When both principles are</tspan><tspan x="876.0" dy="15.0">respected, architecture choices</tspan><tspan x="876.0" dy="15.0">become clearer and less</tspan><tspan x="876.0" dy="15.0">ideological.</tspan></text><circle cx="880.0" cy="600.0" r="4.5" fill="#56aefc"/><text x="894.0" y="604.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Use grounded tradeoffs</tspan></text><circle cx="880.0" cy="624.0" r="4.5" fill="#56aefc"/><text x="894.0" y="628.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Prefer simpler memory</tspan><tspan x="894.0" dy="13.8">stories</tspan></text><circle cx="880.0" cy="648.0" r="4.5" fill="#56aefc"/><text x="894.0" y="652.0" fill="#f3f7fc" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="894.0" dy="0">Scale with real measurements</tspan></text><line x1="876.0" y1="646.0" x2="1200.0" y2="646.0" stroke="#334155" stroke-width="1"/><text x="876.0" y="670.0" fill="#56aefc" font-size="10" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="876.0" dy="0">Method outlives the moment.</tspan></text><rect x="56.0" y="714.0" width="1168.0" height="104.0" rx="24" fill="#ffb400" fill-opacity="0.08" stroke="#ffb400" stroke-width="1.2"/><text x="80.0" y="744.0" fill="#ffb400" font-size="16" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Key takeaway</tspan></text><circle cx="80.0" cy="765.0" r="5" fill="#ffb400"/><text x="94.0" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="94.0" dy="0">Capacity is the first</tspan><tspan x="94.0" dy="13.8">gate.</tspan></text><circle cx="453.3" cy="765.0" r="5" fill="#ffb400"/><text x="467.3" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="467.3" dy="0">Constraint-following is</tspan><tspan x="467.3" dy="13.8">the second principle.</tspan></text><circle cx="826.7" cy="765.0" r="5" fill="#ffb400"/><text x="840.7" y="770.0" fill="#f3f7fc" font-size="11" font-weight="600" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="840.7" dy="0">Good training programs</tspan><tspan x="840.7" dy="13.8">need both instincts.</tspan></text><text x="1200.0" y="798.0" fill="#92a4b8" font-size="10" font-weight="700" text-anchor="end" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1200.0" dy="0">two_principles</tspan></text></svg>