<svg width="1760" height="1060" viewBox="0 0 1760 1060" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f3ede3"/><stop offset="100%" stop-color="#fbf7f0"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffb400"/><stop offset="100%" stop-color="#56aefc"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fffaf2"/><stop offset="100%" stop-color="#f8efe0"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(23,33,43,0.14)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffb400"/></filter><marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 z" fill="#ffb400"/></marker></defs><rect x="0" y="0" width="1760" height="1060" fill="url(#bgGrad)"/><g opacity="0.24"><circle cx="316.8" cy="254.4" r="180" fill="#ffe7a8"/><circle cx="1548.8" cy="190.8" r="140" fill="#ffe7a8"/><circle cx="1196.8" cy="890.4" r="220" fill="#56aefc" opacity="0.20"/></g><rect x="56.0" y="56.0" width="1648.0" height="118" rx="22" fill="#fffaf2" fill-opacity="0.18" stroke="#d8c7ad" stroke-width="1.2"/><rect x="74.0" y="72.0" width="240" height="8" rx="4" fill="url(#heroGrad)" filter="url(#accentGlow)"/><text x="80.0" y="120.0" fill="#17212b" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Tokenizer Hash Vs Trie</tspan></text><text x="80.0" y="158.0" fill="#64748b" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Hash-vs-trie should show the routing structure, not only a final pros-and-cons list.</tspan></text><g class="technical-node"><rect x="56.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="117.0" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="117.0" dy="0">STEP 1</tspan></text><text x="76.0" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Input Text</tspan></text><text x="76.0" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Tokenizer Hash Vs Trie begins with</tspan><tspan x="76.0" dy="15.0">a text surface whose boundaries</tspan><tspan x="76.0" dy="15.0">must stay explicit.</tspan></text><text x="80.0" y="330.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">lookup</tspan></text><text x="80.0" y="348.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">prefix path</tspan></text></g><g class="technical-node"><rect x="474.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="492.5" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="535.5" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="535.5" dy="0">STEP 2</tspan></text><text x="494.5" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">Candidate Split</tspan></text><text x="494.5" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">The system generates candidate</tspan><tspan x="494.5" dy="15.0">pieces or structures before</tspan><tspan x="494.5" dy="15.0">picking one stable path.</tspan></text><text x="498.5" y="330.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">prefix path</tspan></text><text x="498.5" y="348.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">collision</tspan></text></g><g class="technical-node"><rect x="893.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="911.0" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="954.0" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="954.0" dy="0">STEP 3</tspan></text><text x="913.0" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Rule / Merge</tspan></text><text x="913.0" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Rules or merge structures decide</tspan><tspan x="913.0" dy="15.0">which candidate becomes the</tspan><tspan x="913.0" dy="15.0">emitted token path.</tspan></text><text x="917.0" y="330.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">merge rule</tspan></text><text x="917.0" y="348.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">selection</tspan></text></g><g class="technical-node"><rect x="1311.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="1329.5" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="1372.5" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1372.5" dy="0">STEP 4</tspan></text><text x="1331.5" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">Token Emission</tspan></text><text x="1331.5" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">The final stage emits pieces or</tspan><tspan x="1331.5" dy="15.0">ids that downstream runtime code</tspan><tspan x="1331.5" dy="15.0">will trust exactly.</tspan></text><text x="1335.5" y="330.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">token ids</tspan></text><text x="1335.5" y="348.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">stable output</tspan></text></g><g class="technical-connectors"><path d="M 430.5 297.0 C 461.5 297.0, 461.5 297.0, 492.5 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 849.0 297.0 C 880.0 297.0, 880.0 297.0, 911.0 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 1267.5 297.0 C 1298.5 297.0, 1298.5 297.0, 1329.5 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/></g><g class="formula-strip"><rect x="56.0" y="416.0" width="1648.0" height="132.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="78.0" y="450.0" fill="#17212b" font-size="17" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">Technical Rule</tspan></text><text x="78.0" y="484.0" fill="#ffb400" font-size="14" font-weight="700" text-anchor="start" font-family="IBM Plex Mono, SFMono-Regular, monospace"><tspan x="78.0" dy="0">lookup = hash(text) | trie(prefix)</tspan></text><text x="78.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="78.0" dy="0">lookup</tspan></text><text x="368.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="368.0" dy="0">prefix path</tspan></text><text x="658.0" y="518.0" fill="#64748b" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="658.0" dy="0">collision</tspan></text></g><g class="artifact-panel"><rect x="56.0" y="574.0" width="811.0" height="196.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="76.0" y="608.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Tokenizer Surface</tspan></text><text x="76.0" y="634.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Expose the visible boundary markers,</tspan><tspan x="76.0" dy="15.0">prefix paths, or candidate pieces.</tspan></text><text x="80.0" y="678.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">surface tokens</tspan></text><text x="80.0" y="696.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">markers</tspan></text></g><g class="artifact-panel"><rect x="893.0" y="574.0" width="811.0" height="196.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><text x="913.0" y="608.0" fill="#17212b" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Emission Result</tspan></text><text x="913.0" y="634.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Connect the rule choice to the final</tspan><tspan x="913.0" dy="15.0">emitted pieces or lookup path.</tspan></text><text x="917.0" y="678.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">piece emit</tspan></text><text x="917.0" y="696.0" fill="#56aefc" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">lookup</tspan></text></g><g class="footer-note"><rect x="56.0" y="974.0" width="1648.0" height="48" rx="16" fill="#f8efe0" fill-opacity="0.94" stroke="#d8c7ad" stroke-width="1"/><text x="76.0" y="1003.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Tokenizer Hash Vs Trie belongs in the broader contract because the model needs dense technical layouts, not only charts and posters.</tspan></text></g></svg>