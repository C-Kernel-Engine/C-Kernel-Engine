<svg width="1600" height="1160" viewBox="0 0 1600 1160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1540" y2="1120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1623"/>
      <stop offset="1" stop-color="#111F2F"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152536"/>
      <stop offset="1" stop-color="#111D2B"/>
    </linearGradient>
    <linearGradient id="laneA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3A5C"/>
      <stop offset="1" stop-color="#18324D"/>
    </linearGradient>
    <linearGradient id="laneB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A4E73"/>
      <stop offset="1" stop-color="#1F3E5C"/>
    </linearGradient>
    <linearGradient id="laneC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#365D84"/>
      <stop offset="1" stop-color="#274968"/>
    </linearGradient>
    <linearGradient id="laneD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#446B94"/>
      <stop offset="1" stop-color="#315577"/>
    </linearGradient>
    <linearGradient id="laneE" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#517AA4"/>
      <stop offset="1" stop-color="#3A6184"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.2" flood-color="#000000"/>
    </filter>
    <style>
      .title { font: 800 46px 'Space Grotesk', 'Sora', 'Avenir Next', sans-serif; fill: #F7FBFF; }
      .subtitle { font: 500 20px 'IBM Plex Sans', 'Sora', sans-serif; fill: #B3C5D8; }
      .lane { font: 700 19px 'Space Grotesk', 'Sora', sans-serif; fill: #D5E6F7; }
      .card-title { font: 700 24px 'Space Grotesk', 'Sora', sans-serif; fill: #F6FBFF; }
      .cmd { font: 700 18px 'IBM Plex Mono', 'JetBrains Mono', monospace; fill: #84DAFF; }
      .body { font: 500 16px 'IBM Plex Sans', 'Sora', sans-serif; fill: #C7D8E9; }
      .kpi { font: 700 16px 'IBM Plex Sans', 'Sora', sans-serif; fill: #8EE0A4; }
      .small { font: 500 14px 'IBM Plex Sans', 'Sora', sans-serif; fill: #A8BCD1; }
      .json { font: 600 14px 'IBM Plex Mono', 'JetBrains Mono', monospace; fill: #9FC3E3; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1160" fill="url(#bg)"/>
  <rect x="32" y="32" width="1536" height="1096" rx="22" fill="none" stroke="#2A4057" stroke-width="2"/>

  <text x="80" y="108" class="title">v6.6 Validation + Parity Gates</text>
  <text x="80" y="146" class="subtitle">From template/IR contracts to nightly confidence: what each test does, where it runs, and what it blocks.</text>

  <!-- Lanes -->
  <rect x="80" y="194" width="220" height="150" rx="14" fill="url(#laneA)" stroke="#35577A"/>
  <text x="112" y="250" class="lane">L1. Contracts</text>
  <text x="112" y="280" class="small">IR/template/codegen</text>
  <text x="112" y="302" class="small">handoff invariants</text>

  <rect x="80" y="368" width="220" height="150" rx="14" fill="url(#laneB)" stroke="#3E6388"/>
  <text x="112" y="424" class="lane">L2. Matrix Build</text>
  <text x="112" y="454" class="small">kernel-map contracts +</text>
  <text x="112" y="476" class="small">Qwen2/Qwen3/Gemma</text>

  <rect x="80" y="542" width="220" height="150" rx="14" fill="url(#laneC)" stroke="#487198"/>
  <text x="112" y="598" class="lane">L3. Kernel Contracts</text>
  <text x="112" y="628" class="small">Sliding window +</text>
  <text x="112" y="650" class="small">numerical checks</text>

  <rect x="80" y="716" width="220" height="150" rx="14" fill="url(#laneD)" stroke="#5783AA"/>
  <text x="112" y="772" class="lane">L4. Parity + CI</text>
  <text x="112" y="802" class="small">llama.cpp parity +</text>
  <text x="112" y="824" class="small">nightly aggregation</text>

  <rect x="80" y="890" width="220" height="150" rx="14" fill="url(#laneE)" stroke="#6590B6"/>
  <text x="112" y="946" class="lane">L5. Tensor Flow</text>
  <text x="112" y="976" class="small">dimension-chain +</text>
  <text x="112" y="998" class="small">gibberish detector</text>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <rect x="340" y="194" width="1180" height="150" rx="16" fill="url(#panel)" stroke="#2E4861"/>
    <text x="374" y="242" class="card-title">Static Tooling Contracts</text>
    <text x="374" y="274" class="cmd">make v6.6-validate-contracts</text>
    <text x="374" y="306" class="body">Validates family maps, parity API kwargs, gemma harness CLI flags, probe contracts, and Make/CI integration before heavy runs.</text>
    <text x="1370" y="242" class="kpi">PASS / WARN / FAIL</text>
    <text x="1298" y="274" class="small" text-anchor="end">report:</text>
    <text x="1310" y="274" class="json">contract_report_latest.json</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="368" width="1180" height="150" rx="16" fill="url(#panel)" stroke="#2E4861"/>
    <text x="374" y="416" class="card-title">Kernel-Map Gate + Dynamic 3-Model Matrix</text>
    <text x="374" y="448" class="cmd">make v6.6-kernel-map-gate</text>
    <text x="374" y="476" class="cmd">make v6.6-validate-matrix</text>
    <text x="374" y="504" class="body">Runs registry drift check + map/header sync test + registry validation, then generate+compile per model with Gemma sliding-window lowering checks.</text>
    <text x="1188" y="416" class="kpi">maps | registry | Qwen2 | Qwen3 | Gemma</text>
    <text x="1288" y="448" class="small" text-anchor="end">report:</text>
    <text x="1300" y="448" class="json">model_matrix_report_latest.json</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="542" width="1180" height="150" rx="16" fill="url(#panel)" stroke="#2E4861"/>
    <text x="374" y="590" class="card-title">Matrix + Smoke Gate</text>
    <text x="374" y="622" class="cmd">make v6.6-validate-matrix-smoke</text>
    <text x="374" y="654" class="body">Adds runtime smoke on top of build validation to catch generated runtime regressions before parity deep-dives.</text>
    <text x="1326" y="590" class="kpi">build + smoke</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="716" width="780" height="150" rx="16" fill="url(#panel)" stroke="#2E4861"/>
    <text x="374" y="764" class="card-title">Sliding-Window Kernel Contract</text>
    <text x="374" y="796" class="cmd">make test-attention-sliding</text>
    <text x="374" y="828" class="body">Checks prefill/decode sliding kernels against a deterministic reference; also runs inside parity smoke flow.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1140" y="716" width="380" height="150" rx="16" fill="url(#panel)" stroke="#2E4861"/>
    <text x="1170" y="764" class="card-title">Nightly CI</text>
    <text x="1170" y="796" class="cmd">python scripts/nightly_runner.py</text>
    <text x="1170" y="828" class="body">Publishes pass/fail matrix + subtests.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="890" width="1180" height="150" rx="16" fill="url(#panel)" stroke="#2E4861"/>
    <text x="374" y="938" class="card-title">Tensor Flow + E2E Coherence Gate</text>
    <text x="374" y="970" class="cmd">make test-pipeline-l1-l5</text>
    <text x="374" y="998" class="cmd">make e2e</text>
    <text x="700" y="970" class="body">Single sweep for L1→L5 catches kernel, conversion, IR, codegen, and tensor-flow regressions; L6 validates full coherent output.</text>
    <text x="1342" y="938" class="kpi">L5 + L6</text>
  </g>

  <!-- Connectors -->
  <path d="M300 269 H328" stroke="#6AA9D6" stroke-width="2"/>
  <path d="M300 443 H328" stroke="#6AA9D6" stroke-width="2"/>
  <path d="M300 617 H328" stroke="#6AA9D6" stroke-width="2"/>
  <path d="M300 791 H328" stroke="#6AA9D6" stroke-width="2"/>
  <path d="M300 965 H328" stroke="#6AA9D6" stroke-width="2"/>

  <path d="M930 344 V356" stroke="#6AA9D6" stroke-width="2"/>
  <polygon points="930,360 924,350 936,350" fill="#6AA9D6"/>
  <path d="M930 518 V530" stroke="#6AA9D6" stroke-width="2"/>
  <polygon points="930,534 924,524 936,524" fill="#6AA9D6"/>
  <path d="M930 692 V704" stroke="#6AA9D6" stroke-width="2"/>
  <polygon points="930,708 924,698 936,698" fill="#6AA9D6"/>
  <path d="M930 866 V878" stroke="#6AA9D6" stroke-width="2"/>
  <polygon points="930,882 924,872 936,872" fill="#6AA9D6"/>
  <path d="M1120 791 H1130" stroke="#6AA9D6" stroke-width="2"/>
  <polygon points="1134,791 1124,785 1124,797" fill="#6AA9D6"/>

  <!-- Footer -->
  <rect x="80" y="1074" width="1440" height="44" rx="10" fill="#0E1A27" stroke="#2A4057"/>
  <text x="112" y="1102" class="small">Execution flow: local preflight → kernel-map gate → model build matrix → smoke/runtime checks → parity/nightly checks → tensor-flow + e2e coherence gate.</text>
</svg>
