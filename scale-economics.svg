<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Inter', sans-serif; }
    </style>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#232323"/>

  <text x="600" y="45" font-size="28" font-weight="700" fill="#ffb400" text-anchor="middle">
    Scale Economics: The Real World
  </text>
  <text x="600" y="70" font-size="14" fill="#707070" text-anchor="middle">
    Why CPU Clusters Win at Scale
  </text>

  <g transform="translate(80, 120)">
    <rect width="480" height="560" rx="8" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="30" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
      GPU CLUSTER SCALE
    </text>

    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="80" y="0" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="160" y="0" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="240" y="0" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>

      <rect x="0" y="70" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="80" y="70" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="160" y="70" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="240" y="70" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>

      <rect x="0" y="140" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="80" y="140" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="160" y="140" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="240" y="140" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>

      <rect x="0" y="210" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="80" y="210" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="160" y="210" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
      <rect x="240" y="210" width="70" height="60" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1.5"/>
    </g>

    <text x="240" y="360" font-size="14" fill="#a0a0a0" text-anchor="middle">
      100 GPUs to train 1TB model
    </text>

    <rect x="50" y="410" width="380" height="120" rx="6" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="240" y="440" font-size="18" font-weight="600" fill="#ff6b6b" text-anchor="middle">
      Total: $4 Billion
    </text>
    <text x="240" y="470" font-size="11" fill="#a0a0a0" text-anchor="middle">
      Only 5 companies in the world can afford this
    </text>
  </g>

  <circle cx="600" cy="400" r="30" fill="#ffb400"/>
  <text x="600" y="402" font-size="14" font-weight="700" fill="#232323" text-anchor="middle">
    VS
  </text>

  <g transform="translate(680, 120)">
    <rect width="480" height="560" rx="8" fill="#2a2a2a" stroke="#454545" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="30" font-size="16" font-weight="600" fill="#ffb400" text-anchor="middle">
