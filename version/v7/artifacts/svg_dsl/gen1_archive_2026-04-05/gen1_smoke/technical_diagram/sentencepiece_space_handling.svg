ill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="74.0" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="117.0" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="117.0" dy="0">STEP 1</tspan></text><text x="76.0" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Input Text</tspan></text><text x="76.0" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Sentencepiece Space Handling</tspan><tspan x="76.0" dy="15.0">begins with a text surface whose</tspan><tspan x="76.0" dy="15.0">boundaries must stay explicit.</tspan></text><text x="80.0" y="330.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">space marker</tspan></text><text x="80.0" y="348.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">boundary</tspan></text></g><g class="technical-node"><rect x="474.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="492.5" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="535.5" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="535.5" dy="0">STEP 2</tspan></text><text x="494.5" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">Candidate Split</tspan></text><text x="494.5" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="494.5" dy="0">The system generates candidate</tspan><tspan x="494.5" dy="15.0">pieces or structures before</tspan><tspan x="494.5" dy="15.0">picking one stable path.</tspan></text><text x="498.5" y="330.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">boundary</tspan></text><text x="498.5" y="348.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="498.5" dy="0">piece emit</tspan></text></g><g class="technical-node"><rect x="893.0" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="911.0" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="954.0" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="954.0" dy="0">STEP 3</tspan></text><text x="913.0" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Rule / Merge</tspan></text><text x="913.0" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="913.0" dy="0">Rules or merge structures decide</tspan><tspan x="913.0" dy="15.0">which candidate becomes the</tspan><tspan x="913.0" dy="15.0">emitted token path.</tspan></text><text x="917.0" y="330.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">merge rule</tspan></text><text x="917.0" y="348.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="917.0" dy="0">selection</tspan></text></g><g class="technical-node"><rect x="1311.5" y="206.0" width="392.5" height="182.0" rx="24" fill="url(#panelGrad)" stroke="#d8c7ad" stroke-width="1.5" filter="url(#softShadow)"/><rect x="1329.5" y="222.0" width="86" height="22" rx="11" fill="#ffb400" fill-opacity="0.12" stroke="#ffb400" stroke-width="1"/><text x="1372.5" y="237.0" fill="#ffb400" font-size="10" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1372.5" dy="0">STEP 4</tspan></text><text x="1331.5" y="268.0" fill="#17212b" font-size="19" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">Token Emission</tspan></text><text x="1331.5" y="294.0" fill="#64748b" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1331.5" dy="0">The final stage emits pieces or</tspan><tspan x="1331.5" dy="15.0">ids that downstream runtime code</tspan><tspan x="1331.5" dy="15.0">will trust exactly.</tspan></text><text x="1335.5" y="330.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">token ids</tspan></text><text x="1335.5" y="348.0" fill="#ffd66b" font-size="11" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1335.5" dy="0">stable output</tspan></text></g><g class="technical-connectors"><path d="M 430.5 297.0 C 461.5 297.0, 461.5 297.0, 492.5 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 849.0 297.0 C 880.0 297.0, 880.0 297.0, 911.0 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/><path d="M 1267.5 297.0 C 1298.5 297.0, 1298.5 297.0, 1329.5 297.0" stroke="#ffb400" stroke-width="3" fill="none" marker-e