<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360">
  <defs>
    <linearGradient id="cgHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb400"/>
      <stop offset="100%" style="stop-color:#ffc933"/>
    </linearGradient>
    <marker id="arrowCg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb400"/>
    </marker>
  </defs>

  <rect width="980" height="360" fill="#232323"/>

  <text x="490" y="32" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffb400" text-anchor="middle">Dumb Codegen</text>
  <text x="490" y="52" font-family="Inter, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">It prints what the IR says. No hidden logic.</text>

  <g transform="translate(70, 95)">
    <rect width="280" height="140" rx="12" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="280" height="30" rx="12" fill="url(#cgHeader)"/>
    <text x="140" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Input</text>
    <text x="140" y="65" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">lowered_ir.json</text>
    <text x="140" y="85" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">op list + args + offsets</text>
    <text x="140" y="105" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">layout.json + init_call.json</text>
  </g>

  <g transform="translate(370, 165)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ffb400" stroke-width="2" marker-end="url(#arrowCg)"/>
  </g>

  <g transform="translate(450, 95)">
    <rect width="440" height="140" rx="12" fill="#2a2a2a" stroke="#47b475" stroke-width="3"/>
    <rect width="440" height="30" rx="12" fill="#47b475"/>
    <text x="220" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Generated C</text>
    <text x="220" y="65" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Unrolled calls, explicit pointers, no branching</text>
    <text x="220" y="85" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">Same output every run for same IR</text>
    <text x="220" y="105" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a" text-anchor="middle">Fix IR or kernels, not codegen</text>
  </g>

  <g transform="translate(70, 260)">
    <rect width="820" height="70" rx="10" fill="#1f1f1f" stroke="#333" stroke-width="2"/>
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffb400">Hardcoded items left in v6.6</text>
    <text x="20" y="50" font-family="Inter, sans-serif" font-size="10" fill="#8a8a8a">RoPE scaling/layout, activation mapping, KV cache layout defaults, BUMP fallback layout</text>
  </g>
</svg>
