<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420">
  <defs>
    <linearGradient id="spHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb400"/>
      <stop offset="100%" style="stop-color:#ffc933"/>
    </linearGradient>
  </defs>

  <rect width="980" height="420" fill="#232323"/>

  <text x="490" y="32" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffb400" text-anchor="middle">Scratch vs Persistent Buffers</text>
  <text x="490" y="52" font-family="Inter, sans-serif" font-size="12" fill="#8a8a8a" text-anchor="middle">Scratch buffers are reused; persistent buffers survive across tokens</text>

  <g transform="translate(40, 90)">
    <rect width="420" height="300" rx="12" fill="#2a2a2a" stroke="#454545" stroke-width="2"/>
    <rect width="420" height="30" rx="12" fill="url(#spHeader)"/>
    <text x="210" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Scratch (Reusable)</text>

    <rect x="20" y="55" width="380" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">q_scratch / k_scratch / v_scratch</text>

    <rect x="20" y="105" width="380" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="130" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">attn_scratch</text>

    <rect x="20" y="155" width="380" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="180" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">mlp_scratch (gate/up/down)</text>

    <rect x="20" y="205" width="380" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="230" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">layer_input / layer_output</text>
  </g>

  <g transform="translate(520, 90)">
    <rect width="420" height="300" rx="12" fill="#2a2a2a" stroke="#47b475" stroke-width="3"/>
    <rect width="420" height="30" rx="12" fill="#47b475"/>
    <text x="210" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1d1d1d" text-anchor="middle">Persistent</text>

    <rect x="20" y="55" width="380" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="80" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">kv_cache (per-layer, per-head)</text>

    <rect x="20" y="105" width="380" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="130" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">rope_cache (cos/sin)</text>

    <rect x="20" y="155" width="380" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="180" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">logits buffer</text>

    <rect x="20" y="205" width="380" height="40" rx="8" fill="#1f1f1f" stroke="#333"/>
    <text x="210" y="230" font-family="Inter, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">weights (bump arena)</text>
  </g>
</svg>
