<svg width="1600" height="860" viewBox="0 0 1600 860" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#07131f"/><stop offset="100%" stop-color="#11253a"/></linearGradient><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#56aefc"/><stop offset="100%" stop-color="#8bcaff"/></linearGradient><linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0d2033"/><stop offset="100%" stop-color="#16314d"/></linearGradient><filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(8,22,38,0.55)"/></filter><filter id="accentGlow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#56aefc"/></filter><marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 z" fill="#56aefc"/></marker></defs><rect x="0" y="0" width="1600" height="860" fill="url(#bgGrad)"/><g opacity="0.24"><circle cx="288.0" cy="206.4" r="180" fill="#d8eeff"/><circle cx="1408.0" cy="154.8" r="140" fill="#d8eeff"/><circle cx="1088.0" cy="722.4" r="220" fill="#8bcaff" opacity="0.20"/></g><rect x="56.0" y="56.0" width="1488.0" height="112" rx="22" fill="#0d2033" fill-opacity="0.18" stroke="#28577d" stroke-width="1.2"/><text x="80.0" y="116.0" fill="#f8fafc" font-size="31" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Operator Spectrum Map</tspan></text><text x="80.0" y="154.0" fill="#9dd5ff" font-size="15" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="80.0" dy="0">Position operator families on one continuum instead of forcing a false binary.</tspan></text><g class="spectrum-map"><rect x="56.0" y="200.0" width="1488.0" height="520.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><path d="M 138.0 460.0 C 398.0 312.0, 1202.0 312.0, 1462.0 460.0" stroke="#56aefc" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="138.0" cy="460.0" r="28" fill="#56aefc" fill-opacity="0.18" stroke="#56aefc" stroke-width="3"/><text x="138.0" y="466.0" fill="#56aefc" font-size="16" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="138.0" dy="0">1</tspan></text><rect x="86.0" y="248.0" width="300.0" height="118.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><text x="104.0" y="282.0" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="104.0" dy="0">Hand-Tuned Kernels</tspan></text><text x="104.0" y="310.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="104.0" dy="0">Operators are highly specialized,</tspan><tspan x="104.0" dy="15.0">tightly controlled, and usually</tspan><tspan x="104.0" dy="15.0">shaped around a narrow runtime</tspan><tspan x="104.0" dy="15.0">contract.</tspan></text><circle cx="1462.0" cy="460.0" r="28" fill="#8bcaff" fill-opacity="0.18" stroke="#8bcaff" stroke-width="3"/><text x="1462.0" y="466.0" fill="#8bcaff" font-size="16" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1462.0" dy="0">2</tspan></text><rect x="1214.0" y="248.0" width="300.0" height="118.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><text x="1232.0" y="282.0" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1232.0" dy="0">Generic Operator</tspan><tspan x="1232.0" dy="22.5">Families</tspan></text><text x="1232.0" y="310.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1232.0" dy="0">Operators are more flexible,</tspan><tspan x="1232.0" dy="15.0">compositional, and easier to route</tspan><tspan x="1232.0" dy="15.0">across broader workloads.</tspan></text><line x1="328.0" y1="444.0" x2="328.0" y2="438.0" stroke="#28577d" stroke-width="2" stroke-dasharray="6 6"/><rect x="158.0" y="438.0" width="340.0" height="54.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><text x="174.0" y="462.0" fill="#f8fafc" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="174.0" dy="0">Registry Anchors</tspan></text><text x="174.0" y="480.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="174.0" dy="0">Stable named operators tie the left</tspan><tspan x="174.0" dy="13.8">side to deterministic runtime paths.</tspan></text><line x1="800.0" y1="444.0" x2="800.0" y2="500.0" stroke="#28577d" stroke-width="2" stroke-dasharray="6 6"/><rect x="630.0" y="500.0" width="340.0" height="54.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><text x="646.0" y="524.0" fill="#f8fafc" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="646.0" dy="0">Mixed Middle</tspan></text><text x="646.0" y="542.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="646.0" dy="0">Many useful operators blend fixed</tspan><tspan x="646.0" dy="13.8">kernels with configurable structure.</tspan></text><line x1="1272.0" y1="444.0" x2="1272.0" y2="562.0" stroke="#28577d" stroke-width="2" stroke-dasharray="6 6"/><rect x="1102.0" y="562.0" width="340.0" height="54.0" rx="24" fill="url(#panelGrad)" stroke="#8bcaff" stroke-width="1.5" filter="url(#softShadow)"/><text x="1118.0" y="586.0" fill="#f8fafc" font-size="13" font-weight="700" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1118.0" dy="0">Composable Surface</tspan></text><text x="1118.0" y="604.0" fill="#9dd5ff" font-size="11" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="1118.0" dy="0">The right side favors broader semantic</tspan><tspan x="1118.0" dy="13.8">composition over hand-tuned</tspan><tspan x="1118.0" dy="13.8">specialization.</tspan></text><text x="800.0" y="412.0" fill="#56aefc" font-size="14" font-weight="700" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="800.0" dy="0">Specialized &lt;-&gt; Composable</tspan></text><text x="800.0" y="686.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="800.0" dy="0">The useful lesson is not one winner, but where each operator family belongs on the line.</tspan></text></g><rect x="56.0" y="776.0" width="1488.0" height="46" rx="16" fill="#16314d" fill-opacity="0.94" stroke="#28577d" stroke-width="1"/><text x="76.0" y="804.0" fill="#9dd5ff" font-size="12" font-weight="500" text-anchor="start" font-family="IBM Plex Sans, Segoe UI, sans-serif"><tspan x="76.0" dy="0">Spectrum maps help the model reason about structured continua rather than only discrete family switches.</tspan></text></svg>